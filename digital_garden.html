<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garden — Digital Notes</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Martian+Mono:wght@200;300;400&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0b0b12;
      --surface: #10101a;
      --lift: #16162a;
      --border: rgba(255, 255, 255, 0.07);
      --ink: #dcd8f0;
      --ink-mid: #8a859e;
      --ink-dim: #4e4a62;
      --cyan: #00AAAA;
      --purple: #8b7fcf;
      --green: #4ec994;
      --yellow: #c9a96e;
      --red: #e0786a;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Martian Mono', monospace;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9000;
      opacity: 0.3;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    }

    /* TOPBAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 50px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      z-index: 100;
      position: relative;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: var(--cyan);
    }

    .garden-switcher {
      display: flex;
      align-items: center;
    }

    .garden-name-btn {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 300;
      color: var(--ink);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .garden-name-btn:hover {
      border-bottom-color: var(--purple);
    }

    .garden-dropdown-btn {
      background: none;
      border: none;
      color: var(--ink-dim);
      cursor: pointer;
      font-size: 0.6rem;
      padding: 2px 6px;
      transition: color 0.2s;
    }

    .garden-dropdown-btn:hover {
      color: var(--ink);
    }

    /* GARDEN POPUP */
    .garden-popup {
      position: absolute;
      top: 54px;
      left: 20px;
      z-index: 300;
      background: var(--surface);
      border: 1px solid var(--border);
      width: 280px;
      display: none;
    }

    .garden-popup.open {
      display: block;
    }

    .garden-popup-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.44rem;
      letter-spacing: 0.15em;
      color: var(--ink-dim);
      text-transform: uppercase;
    }

    .garden-list {
      max-height: 200px;
      overflow-y: auto;
    }

    .garden-item {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.15s;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .garden-item:last-child {
      border-bottom: none;
    }

    .garden-item:hover {
      background: var(--lift);
    }

    .garden-item.active {
      color: var(--cyan);
    }

    .garden-item-name {
      flex: 1;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
    }

    .garden-item-count {
      font-size: 0.44rem;
      color: var(--ink-dim);
    }

    .garden-item-del {
      font-size: 0.8rem;
      color: var(--ink-dim);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .garden-item:hover .garden-item-del {
      opacity: 0.5;
    }

    .garden-item-del:hover {
      color: var(--red) !important;
      opacity: 1 !important;
    }

    .garden-popup-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .garden-new-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      padding: 6px 10px;
      outline: none;
    }

    .garden-new-input:focus {
      border-color: var(--purple);
    }

    .garden-new-input::placeholder {
      color: var(--ink-dim);
      font-style: italic;
    }

    .topbar-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .tb-btn {
      font-family: 'Martian Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.12em;
      padding: 7px 14px;
      border: 1px solid var(--border);
      background: none;
      color: var(--ink-mid);
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .tb-btn:hover {
      color: var(--cyan);
      border-color: var(--cyan);
    }

    .tb-btn.primary {
      background: var(--cyan);
      color: var(--bg);
      border-color: var(--cyan);
    }

    .tb-btn.primary:hover {
      background: transparent;
      color: var(--cyan);
    }

    /* LAYOUT */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #graphCanvas {
      position: absolute;
      inset: 0;
      cursor: grab;
    }

    #graphCanvas.dragging {
      cursor: grabbing;
    }

    /* NOTE PANEL */
    .note-panel {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 380px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 50;
      overflow: hidden;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    .note-panel.open {
      transform: translateX(0);
    }

    .panel-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .panel-id {
      font-size: 0.44rem;
      letter-spacing: 0.15em;
      color: var(--ink-dim);
      text-transform: uppercase;
    }

    .panel-close {
      font-size: 0.5rem;
      color: var(--ink-dim);
      cursor: pointer;
      letter-spacing: 0.1em;
      padding: 4px 8px;
      border: 1px solid var(--border);
      background: none;
      font-family: 'Martian Mono', monospace;
      transition: color 0.2s;
      text-transform: uppercase;
    }

    .panel-close:hover {
      color: var(--ink);
    }

    #noteTitle {
      width: 100%;
      background: none;
      border: none;
      outline: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      color: var(--ink);
      letter-spacing: -0.01em;
      resize: none;
      line-height: 1.2;
      padding: 0;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      min-height: 0;
    }

    .panel-body::-webkit-scrollbar {
      width: 3px;
    }

    .panel-body::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    /* SECTION LABELS */
    .sec-label {
      font-size: 0.44rem;
      letter-spacing: 0.15em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sec-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* TAGS */
    .panel-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .meta-tag {
      font-size: 0.45rem;
      letter-spacing: 0.1em;
      padding: 3px 8px;
      border: 1px solid var(--border);
      color: var(--ink-dim);
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .meta-tag .tag-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .meta-tag.selected {
      border-color: var(--tag-color);
      color: var(--tag-color);
    }

    .meta-tag-add {
      font-size: 0.45rem;
      letter-spacing: 0.1em;
      padding: 3px 8px;
      border: 1px dashed var(--border);
      color: var(--ink-dim);
      cursor: pointer;
      transition: all 0.2s;
      background: none;
      font-family: 'Martian Mono', monospace;
    }

    .meta-tag-add:hover {
      border-color: var(--purple);
      color: var(--purple);
    }

    /* NEW TAG FORM */
    .new-tag-form {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin: 8px 0 12px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      background: var(--bg);
    }

    .new-tag-form.open {
      display: flex;
    }

    .new-tag-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .new-tag-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: 'Martian Mono', monospace;
      font-size: 0.52rem;
      padding: 5px 8px;
      outline: none;
    }

    .new-tag-input:focus {
      border-color: var(--purple);
    }

    .new-tag-input::placeholder {
      color: var(--ink-dim);
    }

    .color-swatches {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .color-swatch {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s;
      flex-shrink: 0;
    }

    .color-swatch.selected {
      border-color: var(--ink);
    }

    /* CONTENT */
    #noteContent {
      width: 100%;
      min-height: 100px;
      background: none;
      border: none;
      outline: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 300;
      color: var(--ink-mid);
      line-height: 1.8;
      resize: none;
      user-select: text;
      margin-bottom: 12px;
    }

    #noteContent::placeholder {
      color: var(--ink-dim);
      font-style: italic;
    }

    /* CONNECTIONS */
    .link-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      min-height: 36px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      color: var(--ink-mid);
      font-size: 0.75rem;
      font-family: 'Cormorant Garamond', serif;
    }

    .link-item:hover {
      border-color: var(--purple);
      color: var(--purple);
    }

    .link-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .link-remove {
      margin-left: auto;
      opacity: 0;
      font-size: 1.0rem;
      font-family: 'Martian Mono', monospace;
      line-height: 0;
      color: var(--red);
      transition: opacity 0.2s;
      flex-shrink: 0;
      padding: 0 4px;
      align-self: center;
    }

    .link-item:hover .link-remove {
      opacity: 0.7;
    }

    .link-search-wrap {
      position: relative;
      margin-top: 4px;
    }

    .link-search {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      padding: 9px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .link-search:focus {
      border-color: var(--purple);
    }

    .link-search::placeholder {
      color: var(--ink-dim);
      font-style: italic;
    }

    .link-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      z-index: 200;
      background: var(--lift);
      border: 1px solid var(--purple);
      border-top: none;
      max-height: 180px;
      overflow-y: auto;
      display: none;
    }

    .link-results.open {
      display: block;
    }

    .link-result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      cursor: pointer;
      transition: background 0.15s;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      color: var(--ink-mid);
    }

    .link-result-item:hover {
      background: var(--surface);
      color: var(--ink);
    }

    .link-result-item.already-linked {
      background: rgba(0, 170, 170, 0.05);
    }

    .link-results::-webkit-scrollbar {
      width: 3px;
    }

    .link-results::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    .panel-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
    }

    .del-btn {
      font-family: 'Martian Mono', monospace;
      font-size: 0.48rem;
      letter-spacing: 0.1em;
      background: none;
      border: 1px solid rgba(224, 120, 106, 0.2);
      color: var(--red);
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .del-btn:hover {
      background: rgba(224, 120, 106, 0.1);
    }

    .save-note-btn {
      font-family: 'Martian Mono', monospace;
      font-size: 0.48rem;
      letter-spacing: 0.1em;
      background: var(--cyan);
      color: var(--bg);
      border: none;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .save-note-btn:hover {
      opacity: 0.85;
    }

    /* MINIMAP */
    .minimap {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 50;
      width: 140px;
      height: 90px;
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .minimap canvas {
      width: 100%;
      height: 100%;
    }

    /* SEARCH */
    #searchInput {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: 'Martian Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.08em;
      padding: 8px 14px;
      outline: none;
      width: 200px;
      transition: border-color 0.2s;
    }

    #searchInput:focus {
      border-color: var(--purple);
    }

    #searchInput::placeholder {
      color: var(--ink-dim);
    }

    /* LEGEND */
    .legend {
      position: absolute;
      bottom: 20px;
      left: 170px;
      z-index: 50;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .legend-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.44rem;
      letter-spacing: 0.08em;
    }

    .legend-header:hover {
      background: var(--lift);
    }

    .legend-title {
      color: var(--ink-dim);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .legend-toggle {
      color: var(--ink-dim);
    }

    .legend-body {
      padding: 6px 12px 10px;
    }

    .legend-body.hidden {
      display: none;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--ink-dim);
      margin-bottom: 5px;
      font-size: 0.46rem;
      letter-spacing: 0.08em;
    }

    .legend-row:last-child {
      margin-bottom: 0;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--cyan);
      color: var(--bg);
      font-family: 'Martian Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      padding: 8px 20px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 9999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="topbar-left">
      <span class="brand">GARDEN</span>
      <div class="garden-switcher">
        <button class="garden-name-btn" id="gardenNameBtn" onclick="toggleGardenPopup()">Loading…</button>
        <button class="garden-dropdown-btn" onclick="toggleGardenPopup()">▾</button>
      </div>
    </div>
    <div class="topbar-right">
      <input type="text" id="searchInput" placeholder="search notes…">
      <button class="tb-btn" onclick="resetView()">Reset View</button>
      <button class="tb-btn primary" onclick="newNote()">+ New Note</button>
    </div>
  </div>

  <div class="garden-popup" id="gardenPopup">
    <div class="garden-popup-header">Your Gardens</div>
    <div class="garden-list" id="gardenList"></div>
    <div class="garden-popup-footer">
      <input class="garden-new-input" id="gardenNewInput" placeholder="New garden name…"
        onkeydown="if(event.key==='Enter')createGarden()">
      <button class="tb-btn" onclick="createGarden()" style="padding:6px 10px;font-size:0.46rem">Create</button>
    </div>
  </div>

  <div class="layout">
    <canvas id="graphCanvas"></canvas>

    <div class="note-panel" id="notePanel">
      <div class="panel-header">
        <div class="panel-title-row">
          <span class="panel-id" id="panelNoteId"></span>
          <button class="panel-close" onclick="closePanel()">close ×</button>
        </div>
        <textarea id="noteTitle" rows="1" placeholder="Note title…" oninput="autoResize(this);autoSave()"></textarea>
      </div>
      <div class="panel-body">
        <div class="sec-label">Tags</div>
        <div class="panel-meta" id="panelMeta"></div>
        <div class="new-tag-form" id="newTagForm">
          <div class="new-tag-row">
            <input class="new-tag-input" id="newTagName" placeholder="tag name…" maxlength="20"
              onkeydown="if(event.key==='Enter')createTag()">
            <button class="tb-btn" onclick="createTag()" style="padding:4px 8px;font-size:0.44rem">Add</button>
            <button class="tb-btn" onclick="closeNewTagForm()" style="padding:4px 6px;font-size:0.44rem">✕</button>
          </div>
          <div class="color-swatches" id="colorSwatches"></div>
        </div>

        <div class="sec-label" style="margin-top:8px">Content</div>
        <textarea id="noteContent" rows="5" placeholder="Write anything…" oninput="autoSave()"></textarea>

        <div class="sec-label">Connections</div>
        <div class="link-list" id="linkList"></div>
        <div class="link-search-wrap">
          <input class="link-search" id="linkSearch" type="text" placeholder="Search to connect a note…"
            autocomplete="off" oninput="onLinkSearch()" onfocus="onLinkSearch()">
          <div class="link-results" id="linkResults"></div>
        </div>
      </div>
      <div class="panel-footer">
        <button class="del-btn" onclick="deleteNote()">Delete note</button>
        <button class="save-note-btn" onclick="saveNote()">Save</button>
      </div>
    </div>

    <div class="minimap"><canvas id="minimapCanvas"></canvas></div>

    <div class="legend" id="legend">
      <div class="legend-header" onclick="toggleLegend()">
        <span class="legend-title">Tags</span>
        <span class="legend-toggle" id="legendToggle">▴</span>
      </div>
      <div class="legend-body" id="legendBody"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ═══════════════════════════════════════════════════════════════════
    //  CONSTANTS
    // ═══════════════════════════════════════════════════════════════════
    const SWATCH_COLORS = [
      '#00AAAA', '#8b7fcf', '#4ec994', '#c9a96e', '#e0786a',
      '#d4845a', '#4a9ebb', '#a67cc4', '#7eb8c9', '#b5cc6a',
      '#e8a0bf', '#6ab8e8', '#e8d46a', '#88c8a0', '#c4a07c',
    ];
    const DEFAULT_TAGS = [
      { id: 'idea', label: 'idea', color: '#00AAAA' },
      { id: 'question', label: 'question', color: '#8b7fcf' },
      { id: 'reference', label: 'reference', color: '#c9a96e' },
      { id: 'todo', label: 'todo', color: '#e0786a' },
      { id: 'insight', label: 'insight', color: '#4ec994' },
    ];

    // ═══════════════════════════════════════════════════════════════════
    //  STATE
    // ═══════════════════════════════════════════════════════════════════
    let gardens = {}, gardenIds = [], currentGardenId = null;
    let notes = [], links = [], nextId = 1, customTags = [];
    let selectedNote = null, hoveredNote = null;
    let vpX = 0, vpY = 0, vpScale = 1;
    let isDragging = false, dragStartX = 0, dragStartY = 0, dragVpX = 0, dragVpY = 0;
    let nodeDragging = null, nodeDragOffX = 0, nodeDragOffY = 0;
    let nodeDragMoved = false, nodeDragStartX = 0, nodeDragStartY = 0;
    let legendVisible = true;
    let dirty = true;
    let newTagColor = SWATCH_COLORS[0];

    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');
    const miniCanvas = document.getElementById('minimapCanvas');
    const miniCtx = miniCanvas.getContext('2d');

    // ═══════════════════════════════════════════════════════════════════
    //  STORAGE
    // ═══════════════════════════════════════════════════════════════════
    function saveAll() {
      if (currentGardenId && gardens[currentGardenId]) {
        gardens[currentGardenId].notes = notes;
        gardens[currentGardenId].links = links;
        gardens[currentGardenId].nextId = nextId;
        gardens[currentGardenId].customTags = customTags;
      }
      try {
        localStorage.setItem('gdn_v3_data', JSON.stringify({ gardens, gardenIds, currentGardenId }));
      } catch (e) { }
    }

    function loadAll() {
      try {
        const raw = localStorage.getItem('gdn_v3_data');
        if (raw) {
          const d = JSON.parse(raw);
          gardens = d.gardens || {};
          gardenIds = d.gardenIds || [];
          currentGardenId = d.currentGardenId && gardens[d.currentGardenId] ? d.currentGardenId : gardenIds[0];
          return gardenIds.length > 0;
        }
      } catch (e) { }
      return false;
    }

    // ═══════════════════════════════════════════════════════════════════
    //  SEED
    // ═══════════════════════════════════════════════════════════════════
    function makeSeed() {
      return {
        notes: [
          { id: 1, title: 'Digital Garden', content: 'A non-linear space for thinking. Unlike a blog, notes here evolve and link to each other.', tags: ['idea'], x: 0, y: 0 },
          { id: 2, title: 'Evergreen Notes', content: 'Notes that are concept-oriented rather than time-oriented. Kept up to date as thinking evolves.', tags: ['reference'], x: 220, y: -80 },
          { id: 3, title: 'Zettelkasten Method', content: 'A slip-box system. Every note links to others. The connections are more valuable than the notes.', tags: ['reference'], x: 220, y: 80 },
          { id: 4, title: 'Spaced Repetition', content: 'Reviewing information at increasing intervals. The forgetting curve works against you.', tags: ['insight'], x: 460, y: -120 },
          { id: 5, title: 'Why do we forget?', content: 'Is forgetting a failure of memory, or a feature? What does the brain choose to keep?', tags: ['question'], x: 460, y: 60 },
          { id: 6, title: 'Build a second brain', content: 'The idea of offloading memory to an external system. Frees working memory for synthesis.', tags: ['idea'], x: -180, y: 100 },
          { id: 7, title: 'Read before you write', content: 'You cannot make connections without raw material. Input before output.', tags: ['insight'], x: -180, y: -100 },
          { id: 8, title: 'Things to explore', content: '- Graph databases\n- Obsidian vs Roam\n- Twitter threads as public Zettelkasten', tags: ['todo'], x: -360, y: 0 },
        ],
        links: [[1, 2], [1, 3], [1, 6], [2, 3], [3, 4], [3, 5], [4, 5], [6, 7], [7, 8], [2, 7]].map(([a, b]) => ({ from: a, to: b })),
        nextId: 9, customTags: [],
      };
    }

    // ═══════════════════════════════════════════════════════════════════
    //  GARDEN ACTIVATION
    // ═══════════════════════════════════════════════════════════════════
    function activateGarden(id) {
      // Flush current only when switching away from a different garden
      if (currentGardenId && currentGardenId !== id && gardens[currentGardenId]) {
        gardens[currentGardenId].notes = notes;
        gardens[currentGardenId].links = links;
        gardens[currentGardenId].nextId = nextId;
        gardens[currentGardenId].customTags = customTags;
      }
      currentGardenId = id;
      const g = gardens[id];
      notes = g.notes || [];
      links = g.links || [];
      nextId = g.nextId || 1;
      customTags = g.customTags || [];

      vpX = 0; vpY = 0; vpScale = 1;
      selectedNote = null; hoveredNote = null;
      document.getElementById('gardenNameBtn').textContent = g.name;
      document.getElementById('notePanel').classList.remove('open');
      renderTagsPanel();
      renderLegend();
      markDirty();
    }

    // Init
    if (!loadAll()) {
      const id = 'g_' + Date.now();
      gardens = { [id]: { name: 'My Garden', ...makeSeed() } };
      gardenIds = [id];
      currentGardenId = id;
    }
    activateGarden(currentGardenId);

    // ═══════════════════════════════════════════════════════════════════
    //  GARDEN UI
    // ═══════════════════════════════════════════════════════════════════
    function toggleGardenPopup() {
      const p = document.getElementById('gardenPopup');
      p.classList.toggle('open');
      if (p.classList.contains('open')) renderGardenList();
    }

    function renderGardenList() {
      document.getElementById('gardenList').innerHTML = gardenIds.map(id => {
        const g = gardens[id], count = (g.notes || []).length;
        return `<div class="garden-item ${id === currentGardenId ? 'active' : ''}" onclick="switchGarden('${id}')">
      <span class="garden-item-name">${g.name}</span>
      <span class="garden-item-count">${count} note${count !== 1 ? 's' : ''}</span>
      ${gardenIds.length > 1 ? `<span class="garden-item-del" onclick="event.stopPropagation();deleteGarden('${id}')">×</span>` : ''}
    </div>`;
      }).join('');
    }

    function switchGarden(id) {
      document.getElementById('gardenPopup').classList.remove('open');
      // Flush current garden before switching
      if (currentGardenId && gardens[currentGardenId]) {
        gardens[currentGardenId].notes = notes;
        gardens[currentGardenId].links = links;
        gardens[currentGardenId].nextId = nextId;
        gardens[currentGardenId].customTags = customTags;
      }
      activateGarden(id);
      saveAll();
    }

    function createGarden() {
      const inp = document.getElementById('gardenNewInput');
      const name = inp.value.trim(); if (!name) return;
      const id = 'g_' + Date.now();
      gardens[id] = { name, ...makeSeed(), customTags: [] };
      gardenIds.push(id); inp.value = '';
      switchGarden(id);
    }

    function deleteGarden(id) {
      if (gardenIds.length <= 1) { toast('Cannot delete the last garden'); return; }
      if (!confirm(`Delete "${gardens[id].name}"? This cannot be undone.`)) return;
      gardenIds = gardenIds.filter(i => i !== id);
      delete gardens[id];
      if (currentGardenId === id) activateGarden(gardenIds[0]);
      else { saveAll(); renderGardenList(); }
    }

    // ═══════════════════════════════════════════════════════════════════
    //  TAGS
    // ═══════════════════════════════════════════════════════════════════
    function allTags() { return [...DEFAULT_TAGS, ...customTags]; }

    function tagColor(id) {
      const t = allTags().find(t => t.id === id);
      return t ? t.color : '#4e4a62';
    }

    function nodeColor(note) {
      if (!note.tags || !note.tags.length) return '#4e4a62';
      return tagColor(note.tags[0]);
    }

    function renderTagsPanel() {
      document.getElementById('panelMeta').innerHTML =
        allTags().map(t => `
      <div class="meta-tag" data-tag="${t.id}" style="--tag-color:${t.color}" onclick="toggleTag('${t.id}')">
        <span class="tag-dot"></span>${t.label}
      </div>`).join('') +
        `<button class="meta-tag-add" onclick="openNewTagForm()">+ tag</button>`;
    }

    function renderLegend() {
      document.getElementById('legendBody').innerHTML =
        allTags().map(t => `
      <div class="legend-row">
        <div class="legend-dot" style="background:${t.color}"></div><span>${t.label}</span>
      </div>`).join('') +
        `<div class="legend-row"><div class="legend-dot" style="background:#4e4a62"></div><span>untagged</span></div>`;
    }

    function toggleLegend() {
      legendVisible = !legendVisible;
      document.getElementById('legendBody').classList.toggle('hidden', !legendVisible);
      document.getElementById('legendToggle').textContent = legendVisible ? '▴' : '▾';
    }

    function openNewTagForm() {
      document.getElementById('newTagForm').classList.add('open');
      document.getElementById('newTagName').focus();
      document.getElementById('colorSwatches').innerHTML = SWATCH_COLORS.map(c =>
        `<div class="color-swatch ${c === newTagColor ? 'selected' : ''}" style="background:${c}"
      onclick="selectSwatch('${c}',this)"></div>`).join('');
    }

    function closeNewTagForm() {
      document.getElementById('newTagForm').classList.remove('open');
      document.getElementById('newTagName').value = '';
    }

    function selectSwatch(color, el) {
      newTagColor = color;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
    }

    function createTag() {
      const raw = document.getElementById('newTagName').value.trim();
      const name = raw.toLowerCase().replace(/\s+/g, '-');
      if (!name) return;
      if (allTags().find(t => t.id === name)) { toast('Tag already exists'); return; }
      customTags.push({ id: name, label: raw || name, color: newTagColor });
      closeNewTagForm();
      renderTagsPanel();
      renderLegend();
      if (selectedNote) {
        document.querySelectorAll('.meta-tag').forEach(el =>
          el.classList.toggle('selected', selectedNote.tags?.includes(el.dataset.tag)));
      }
      saveAll(); markDirty(); toast(`Tag "${raw}" created`);
    }

    function toggleTag(tag) {
      const el = document.querySelector(`.meta-tag[data-tag="${tag}"]`);
      if (el) el.classList.toggle('selected');
      autoSave();
    }

    // ═══════════════════════════════════════════════════════════════════
    //  COORDINATE HELPERS
    // ═══════════════════════════════════════════════════════════════════
    function worldToScreen(x, y) {
      return { x: (x + vpX) * vpScale + canvas.width / 2, y: (y + vpY) * vpScale + canvas.height / 2 };
    }
    function screenToWorld(x, y) {
      return { x: (x - canvas.width / 2) / vpScale - vpX, y: (y - canvas.height / 2) / vpScale - vpY };
    }
    function nodeRadius(note) {
      return 10 + links.filter(l => l.from === note.id || l.to === note.id).length * 3;
    }
    function canvasXY(e) {
      const r = canvas.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }
    function noteAt(cx, cy) {
      for (const n of [...notes].reverse()) {
        const s = worldToScreen(n.x, n.y);
        if (Math.hypot(s.x - cx, s.y - cy) < nodeRadius(n) * vpScale + 4) return n;
      }
      return null;
    }

    // ═══════════════════════════════════════════════════════════════════
    //  RENDER
    // ═══════════════════════════════════════════════════════════════════
    function resizeCanvas() {
      const r = canvas.parentElement.getBoundingClientRect();
      canvas.width = r.width; canvas.height = r.height; markDirty();
    }


    function markDirty() { dirty = true; }

    function draw() {
      if (dirty) {
        dirty = false;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const q = document.getElementById('searchInput').value.toLowerCase();

        links.forEach(l => {
          const f = notes.find(n => n.id === l.from), t = notes.find(n => n.id === l.to);
          if (!f || !t) return;
          const fs = worldToScreen(f.x, f.y), ts = worldToScreen(t.x, t.y);
          const sel = selectedNote && (selectedNote.id === l.from || selectedNote.id === l.to);
          ctx.beginPath(); ctx.moveTo(fs.x, fs.y); ctx.lineTo(ts.x, ts.y);
          ctx.strokeStyle = sel ? 'rgba(0,170,170,0.4)' : 'rgba(255,255,255,0.07)';
          ctx.lineWidth = sel ? 1.5 : 1; ctx.stroke();
        });

        notes.forEach(n => {
          const s = worldToScreen(n.x, n.y);
          const r = nodeRadius(n) * vpScale;
          const color = nodeColor(n);
          const isSel = selectedNote?.id === n.id;
          const isHov = hoveredNote?.id === n.id;
          const dimmed = q && !n.title.toLowerCase().includes(q) && !(n.content || '').toLowerCase().includes(q);
          ctx.globalAlpha = dimmed ? 0.15 : 1;
          if (isSel || isHov) {
            const grd = ctx.createRadialGradient(s.x, s.y, r, s.x, s.y, r * 3);
            grd.addColorStop(0, color + '40'); grd.addColorStop(1, 'transparent');
            ctx.beginPath(); ctx.arc(s.x, s.y, r * 3, 0, Math.PI * 2); ctx.fillStyle = grd; ctx.fill();
          }
          ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
          ctx.fillStyle = isSel ? color : color + '33'; ctx.fill();
          ctx.strokeStyle = isSel ? color : color + 'aa';
          ctx.lineWidth = isSel ? 2 : 1; ctx.stroke();
          if (vpScale > 0.4) {
            ctx.fillStyle = dimmed ? '#4e4a62' : (isSel ? '#dcd8f0' : '#8a859e');
            const fs2 = Math.max(9, Math.min(13, 11 * vpScale));
            ctx.font = `${fs2}px "Martian Mono",monospace`; ctx.textAlign = 'center';
            const label = n.title.length > 20 ? n.title.slice(0, 18) + '…' : n.title;
            ctx.fillText(label, s.x, s.y + r + 14 * vpScale);
          }
          ctx.globalAlpha = 1;
        });
        drawMinimap();
      }
      requestAnimationFrame(draw);
    }

    function drawMinimap() {
      const W = miniCanvas.width = 140, H = miniCanvas.height = 90;
      miniCtx.clearRect(0, 0, W, H); miniCtx.fillStyle = '#10101a'; miniCtx.fillRect(0, 0, W, H);
      if (!notes.length) return;
      const xs = notes.map(n => n.x), ys = notes.map(n => n.y);
      const minX = Math.min(...xs) - 60, maxX = Math.max(...xs) + 60;
      const minY = Math.min(...ys) - 60, maxY = Math.max(...ys) + 60;
      const sc = Math.min(W / (maxX - minX), H / (maxY - minY)) * 0.85;
      const ox = W / 2 - (minX + maxX) / 2 * sc, oy = H / 2 - (minY + maxY) / 2 * sc;
      links.forEach(l => {
        const f = notes.find(n => n.id === l.from), t = notes.find(n => n.id === l.to);
        if (!f || !t) return;
        miniCtx.beginPath(); miniCtx.moveTo(f.x * sc + ox, f.y * sc + oy); miniCtx.lineTo(t.x * sc + ox, t.y * sc + oy);
        miniCtx.strokeStyle = 'rgba(255,255,255,0.08)'; miniCtx.lineWidth = 0.5; miniCtx.stroke();
      });
      notes.forEach(n => {
        miniCtx.beginPath(); miniCtx.arc(n.x * sc + ox, n.y * sc + oy, 3, 0, Math.PI * 2);
        miniCtx.fillStyle = nodeColor(n) + 'cc'; miniCtx.fill();
      });
    }

    // ═══════════════════════════════════════════════════════════════════
    //  CANVAS INTERACTION
    // ═══════════════════════════════════════════════════════════════════
    canvas.addEventListener('mousedown', e => {
      markDirty();
      const { x: cx, y: cy } = canvasXY(e);
      const hit = noteAt(cx, cy);
      if (hit) {
        nodeDragging = hit; nodeDragMoved = false; nodeDragStartX = cx; nodeDragStartY = cy;
        const s = worldToScreen(hit.x, hit.y); nodeDragOffX = cx - s.x; nodeDragOffY = cy - s.y;
        canvas.classList.add('dragging');
      } else {
        isDragging = true; dragStartX = cx; dragStartY = cy; dragVpX = vpX; dragVpY = vpY;
        canvas.classList.add('dragging');
      }
    });

    canvas.addEventListener('mousemove', e => {
      markDirty();
      const { x: cx, y: cy } = canvasXY(e);
      if (nodeDragging) {
        if (Math.hypot(cx - nodeDragStartX, cy - nodeDragStartY) > 5) {
          nodeDragMoved = true;
          const w = screenToWorld(cx - nodeDragOffX, cy - nodeDragOffY);
          nodeDragging.x = w.x; nodeDragging.y = w.y;
        }
        return;
      }
      if (isDragging) {
        vpX = dragVpX + (cx - dragStartX) / vpScale; vpY = dragVpY + (cy - dragStartY) / vpScale; return;
      }
      hoveredNote = noteAt(cx, cy);
      canvas.style.cursor = hoveredNote ? 'pointer' : 'grab';
    });

    canvas.addEventListener('mouseup', e => {
      if (nodeDragging) {
        if (!nodeDragMoved) openNote(nodeDragging); else saveAll();
        nodeDragging = null; nodeDragMoved = false; canvas.classList.remove('dragging'); return;
      }
      if (isDragging) {
        const { x: cx, y: cy } = canvasXY(e);
        if (Math.abs(cx - dragStartX) < 4 && Math.abs(cy - dragStartY) < 4) closePanel();
        isDragging = false; canvas.classList.remove('dragging');
      }
    });

    canvas.addEventListener('dblclick', e => {
      const { x: cx, y: cy } = canvasXY(e);
      // Only create if not double-clicking an existing node
      if (noteAt(cx, cy)) return;
      const w = screenToWorld(cx, cy);
      const note = { id: nextId++, title: '', content: '', tags: [], x: w.x, y: w.y };
      notes.push(note); saveAll(); openNote(note);
      const titleEl = document.getElementById('noteTitle');
      titleEl.focus();
      titleEl.select();
    });

    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      vpScale = Math.max(0.2, Math.min(3, vpScale * (e.deltaY > 0 ? 0.9 : 1.1))); markDirty();
    }, { passive: false });

    // ═══════════════════════════════════════════════════════════════════
    //  NOTE PANEL
    // ═══════════════════════════════════════════════════════════════════
    function openNote(note) {
      selectedNote = note; markDirty();
      document.getElementById('notePanel').classList.add('open');
      document.getElementById('panelNoteId').textContent = `note #${note.id}`;
      document.getElementById('noteTitle').value = note.title || '';
      document.getElementById('noteContent').value = note.content || '';
      autoResize(document.getElementById('noteTitle'));
      renderTagsPanel();
      document.querySelectorAll('.meta-tag').forEach(el =>
        el.classList.toggle('selected', note.tags?.includes(el.dataset.tag)));
      renderLinkList(note);
      const ls = document.getElementById('linkSearch');
      if (ls) { ls.value = ''; closeLinkResults(); }
    }

    function closePanel() {
      document.getElementById('notePanel').classList.remove('open');
      selectedNote = null; markDirty();
    }

    function renderLinkList(note) {
      const connected = links
        .filter(l => l.from === note.id || l.to === note.id)
        .map(l => notes.find(n => n.id === (l.from === note.id ? l.to : l.from)))
        .filter(Boolean);
      document.getElementById('linkList').innerHTML = connected.map(n => `
    <div class="link-item" onclick="openNote(notes.find(x=>x.id===${n.id}))">
      <div class="link-dot" style="background:${nodeColor(n)}"></div>
      <span>${n.title || 'Untitled'}</span>
      <span class="link-remove" onclick="event.stopPropagation();removeLink(${note.id},${n.id})">×</span>
    </div>`).join('') ||
        `<div style="font-size:0.8rem;color:var(--ink-dim);font-family:'Cormorant Garamond',serif;font-style:italic;padding:4px 0">No connections yet</div>`;
    }

    function onLinkSearch() {
      if (!selectedNote) return;
      const q = document.getElementById('linkSearch').value.toLowerCase();
      const results = document.getElementById('linkResults');
      const isLinked = id => links.some(l => (l.from === selectedNote.id && l.to === id) || (l.from === id && l.to === selectedNote.id));
      const candidates = notes
        .filter(n => n.id !== selectedNote.id)
        .filter(n => !q || (n.title || 'Untitled').toLowerCase().includes(q));
      if (!candidates.length) {
        results.innerHTML = `<div style="padding:10px 14px;font-size:0.85rem;color:var(--ink-dim);font-family:'Cormorant Garamond',serif;font-style:italic">No notes found</div>`;
        results.classList.add('open'); return;
      }
      results.innerHTML = candidates.slice(0, 10).map(n => {
        const linked = isLinked(n.id);
        return `<div class="link-result-item ${linked ? 'already-linked' : ''}" onmousedown="event.preventDefault();addLinkById(${n.id})">
      <div class="link-dot" style="background:${nodeColor(n)}"></div>
      <span>${n.title || 'Untitled'}</span>
      ${linked ? `<span style="margin-left:auto;font-size:0.55rem;color:var(--cyan);font-family:'Martian Mono',monospace">✓</span>` : ''}
    </div>`;
      }).join('');
      results.classList.add('open');
    }

    function closeLinkResults() { document.getElementById('linkResults')?.classList.remove('open'); }

    function addLinkById(toId) {
      if (!selectedNote) return;
      const idx = links.findIndex(l => (l.from === selectedNote.id && l.to === toId) || (l.from === toId && l.to === selectedNote.id));
      if (idx >= 0) links.splice(idx, 1); else links.push({ from: selectedNote.id, to: toId });
      saveAll(); markDirty(); renderLinkList(selectedNote);
      onLinkSearch(); document.getElementById('linkSearch').focus();
    }

    function removeLink(a, b) {
      links = links.filter(l => !((l.from === a && l.to === b) || (l.from === b && l.to === a)));
      saveAll(); markDirty(); if (selectedNote) renderLinkList(selectedNote);
    }

    function autoSave() {
      if (!selectedNote) return;
      selectedNote.title = document.getElementById('noteTitle').value.trim() || 'Untitled';
      selectedNote.content = document.getElementById('noteContent').value;
      selectedNote.tags = [...document.querySelectorAll('.meta-tag.selected')].map(el => el.dataset.tag);
      markDirty(); saveAll();
    }

    function saveNote() { autoSave(); toast('Saved'); }

    function deleteNote() {
      if (!selectedNote) return;
      notes = notes.filter(n => n.id !== selectedNote.id);
      links = links.filter(l => l.from !== selectedNote.id && l.to !== selectedNote.id);
      saveAll(); closePanel(); markDirty(); toast('Note deleted');
    }

    function newNote() {
      const w = screenToWorld(canvas.width / 2 + (Math.random() - 0.5) * 200, canvas.height / 2 + (Math.random() - 0.5) * 200);
      const note = { id: nextId++, title: '', content: '', tags: [], x: w.x, y: w.y };
      notes.push(note); saveAll(); openNote(note);
      document.getElementById('noteTitle').focus();
    }

    function resetView() { vpX = 0; vpY = 0; vpScale = 1; markDirty(); }

    function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    document.getElementById('searchInput').addEventListener('input', markDirty);
    document.addEventListener('click', e => {
      if (!e.target.closest('.garden-switcher') && !e.target.closest('.garden-popup'))
        document.getElementById('gardenPopup').classList.remove('open');
      if (!e.target.closest('.link-search-wrap')) closeLinkResults();
    });

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    draw();
  </script>
</body>

</html>
