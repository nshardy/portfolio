<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garden — Digital Notes</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0b0b12;
      --surface: #10101a;
      --lift: #16162a;
      --border: rgba(255, 255, 255, 0.07);
      --ink: #dcd8f0;
      --ink-mid: #8a859e;
      --ink-dim: #4e4a62;
      --cyan: #00AAAA;
      --purple: #8b7fcf;
      --green: #4ec994;
      --yellow: #c9a96e;
      --red: #e0786a;
      --icon-sz: 0.75rem;
    }

    * {
      font-feature-settings: "liga" 1, "calt" 1;
    }

    html.light {
      --bg: #f4f2ee;
      --surface: #eceae4;
      --lift: #e2dfd8;
      --border: rgba(0, 0, 0, 0.09);
      --ink: #1c1a26;
      --ink-mid: #5a5670;
      --ink-dim: #a09cba;
      --cyan: #007a7a;
      --purple: #6b5fbf;
      --green: #2e8f5e;
      --yellow: #a07830;
      --red: #c0503e;
    }

    /* THEME TOGGLE */
    .theme-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--ink-mid);
      padding: 7px 14px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.12em;
    }

    .theme-btn:hover {
      color: var(--cyan);
      border-color: var(--cyan);
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9000;
      opacity: 0.3;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    }

    /* TOPBAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 50px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      z-index: 100;
      position: relative;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: var(--cyan);
    }

    .garden-switcher {
      display: flex;
      align-items: center;
    }

    .garden-name-btn {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 300;
      color: var(--ink);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .garden-name-btn:hover {
      border-bottom-color: var(--purple);
    }

    .garden-dropdown-btn {
      background: none;
      border: none;
      color: var(--ink-dim);
      cursor: pointer;
      font-size: var(--icon-sz);
      padding: 2px 6px;
      transition: color 0.2s;
    }

    .garden-dropdown-btn:hover {
      color: var(--ink);
    }

    /* TAG FILTER BAR */
    .tag-filter-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      padding: 0 20px;
      height: 0;
      overflow: hidden;
      background: var(--surface);
      border-bottom: 0px solid var(--border);
      transition: height 0.2s, padding 0.2s, border-width 0.2s;
      flex-shrink: 0;
    }

    .tag-filter-bar.has-tags {
      height: 38px;
      border-bottom-width: 1px;
    }

    .filter-label {
      font-size: 0.44rem;
      letter-spacing: 0.15em;
      color: var(--ink-dim);
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .filter-tag {
      font-size: 0.44rem;
      letter-spacing: 0.1em;
      padding: 2px 8px;
      border: 1px solid var(--border);
      color: var(--ink-dim);
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      font-family: 'JetBrains Mono', monospace;
      background: none;
    }

    .filter-tag .ftag-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .filter-tag.active {
      color: var(--ftag-color);
      border-color: var(--ftag-color);
      background: transparent;
    }

    .filter-tag:hover {
      border-color: var(--ftag-color);
    }

    .filter-clear {
      font-size: 0.44rem;
      letter-spacing: 0.1em;
      color: var(--ink-dim);
      cursor: pointer;
      padding: 2px 6px;
      border: none;
      background: none;
      font-family: 'JetBrains Mono', monospace;
      transition: color 0.15s;
      margin-left: auto;
      flex-shrink: 0;
    }

    .filter-clear:hover {
      color: var(--red);
    }

    /* GARDEN POPUP */
    .garden-popup {
      position: absolute;
      top: 54px;
      left: 20px;
      z-index: 300;
      background: var(--surface);
      border: 1px solid var(--border);
      width: 280px;
      display: none;
    }

    .garden-popup.open {
      display: block;
    }

    .garden-popup-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.44rem;
      letter-spacing: 0.15em;
      color: var(--ink-dim);
      text-transform: uppercase;
    }

    .garden-list {
      max-height: 200px;
      overflow-y: auto;
    }

    .garden-item {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.15s;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .garden-item:last-child {
      border-bottom: none;
    }

    .garden-item:hover {
      background: var(--lift);
    }

    .garden-item.active {
      color: var(--cyan);
    }

    .garden-item-name {
      flex: 1;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
    }

    .garden-item-count {
      font-size: 0.44rem;
      color: var(--ink-dim);
    }

    .garden-item-del {
      font-size: var(--icon-sz);
      color: var(--ink-dim);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .garden-item:hover .garden-item-del {
      opacity: 0.5;
    }

    .garden-item-del:hover {
      color: var(--red) !important;
      opacity: 1 !important;
    }

    .garden-item-ren {
      font-size: var(--icon-sz);
      color: var(--ink-dim);
      opacity: 0;
      transition: opacity 0.15s;
      margin-right: 2px;
    }

    .garden-item:hover .garden-item-ren {
      opacity: 0.5;
    }

    .garden-item-ren:hover {
      color: var(--cyan) !important;
      opacity: 1 !important;
    }

    /* Inline rename input */
    .garden-rename-input {
      flex: 1;
      background: var(--bg);
      border: none;
      border-bottom: 1px solid var(--cyan);
      color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      padding: 1px 4px;
      outline: none;
    }

    .garden-popup-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .garden-new-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      padding: 6px 10px;
      outline: none;
    }

    .garden-new-input:focus {
      border-color: var(--purple);
    }

    .garden-new-input::placeholder {
      color: var(--ink-dim);
      font-style: italic;
    }

    .topbar-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .color-mode-wrap {
      position: relative;
    }

    .color-mode-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.44rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 7px 10px;
      border: 1px solid var(--border);
      background: none;
      color: var(--ink-dim);
      cursor: pointer;
      transition: all 0.2s;
    }

    .color-mode-btn:hover {
      color: var(--ink);
      border-color: var(--ink-dim);
    }

    .color-mode-btn .cm-swatch {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: conic-gradient(#00AAAA 0deg 120deg, #8b7fcf 120deg 240deg, #4ec994 240deg 360deg);
      flex-shrink: 0;
    }

    .color-mode-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      z-index: 300;
      background: var(--lift);
      border: 1px solid var(--border);
      min-width: 160px;
      display: none;
      flex-direction: column;
    }

    .color-mode-dropdown.open {
      display: flex;
    }

    .cm-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      transition: background 0.15s;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.44rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-mid);
      border: none;
      background: none;
      text-align: left;
      width: 100%;
    }

    .cm-option:hover {
      background: var(--surface);
      color: var(--ink);
    }

    .cm-option.active {
      color: var(--cyan);
    }

    .cm-option .cm-node-preview {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      overflow: hidden;
    }

    .cm-node-preview.cm-arc {
      background: conic-gradient(#00AAAA 0deg 120deg, #8b7fcf 120deg 240deg, #e0786a 240deg 360deg);
    }

    .cm-node-preview.cm-dominant {
      background: #00AAAA;
    }

    .cm-node-preview.cm-oklab {
      background: #6ca4af;
    }

    .cm-node-preview.cm-rgb {
      background: #786ca2;
    }

    .tb-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.12em;
      padding: 7px 14px;
      border: 1px solid var(--border);
      background: none;
      color: var(--ink-mid);
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .tb-btn:hover {
      color: var(--cyan);
      border-color: var(--cyan);
    }

    .tb-btn.primary {
      background: var(--cyan);
      color: var(--bg);
      border-color: var(--cyan);
    }

    .tb-btn.primary:hover {
      background: transparent;
      color: var(--cyan);
    }

    /* LAYOUT */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #graphCanvas {
      position: absolute;
      inset: 0;
      cursor: grab;
    }

    #graphCanvas.dragging {
      cursor: grabbing;
    }

    /* NOTE PANEL */
    .note-panel {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 380px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 50;
      overflow: hidden;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    .note-panel.open {
      transform: translateX(0);
    }

    .panel-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .panel-id {
      font-size: 0.44rem;
      letter-spacing: 0.15em;
      color: var(--ink-dim);
      text-transform: uppercase;
    }

    .panel-close {
      font-size: 0.5rem;
      color: var(--ink-dim);
      cursor: pointer;
      letter-spacing: 0.1em;
      padding: 7px 14px;
      border: 1px solid var(--border);
      background: none;
      font-family: 'JetBrains Mono', monospace;
      transition: color 0.2s;
      text-transform: uppercase;
    }

    .panel-close:hover {
      color: var(--ink);
    }

    #noteTitle {
      width: 100%;
      background: none;
      border: none;
      outline: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      color: var(--ink);
      letter-spacing: -0.01em;
      resize: none;
      line-height: 1.2;
      padding: 0;
    }

    .panel-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .panel-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px 12px;
      min-height: 0;
    }

    .panel-scroll::-webkit-scrollbar {
      width: 3px;
    }

    .panel-scroll::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    .panel-connections {
      flex-shrink: 0;
      padding: 10px 20px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 280px;
    }

    .panel-connections .sec-label {
      margin-bottom: 6px;
    }

    .panel-connections .link-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column-reverse;
      gap: 6px;
      margin-bottom: 0;
      min-height: 0;
    }

    .panel-connections .link-list::-webkit-scrollbar {
      width: 3px;
    }

    .panel-connections .link-list::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    /* SECTION LABELS */
    .sec-label {
      font-size: 0.44rem;
      letter-spacing: 0.15em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sec-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* TAGS */
    .panel-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .meta-tag {
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      padding: 3px 8px;
      border: 1px solid var(--border);
      color: var(--ink-dim);
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .meta-tag .tag-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .meta-tag.selected {
      border-color: var(--tag-color);
      color: var(--tag-color);
    }

    .meta-tag-add {
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      padding: 3px 8px;
      border: 1px dashed var(--border);
      color: var(--ink-dim);
      cursor: pointer;
      transition: all 0.2s;
      background: none;
      font-family: 'JetBrains Mono', monospace;
    }

    .meta-tag-add:hover {
      border-color: var(--purple);
      color: var(--purple);
    }

    /* NEW TAG FORM */
    .new-tag-form {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin: 8px 0 12px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      background: var(--bg);
    }

    .new-tag-form.open {
      display: flex;
    }

    .new-tag-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .new-tag-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem;
      padding: 5px 8px;
      outline: none;
    }

    .new-tag-input:focus {
      border-color: var(--purple);
    }

    .new-tag-input::placeholder {
      color: var(--ink-dim);
    }

    .color-swatches {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .color-swatch {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s;
      flex-shrink: 0;
    }

    .color-swatch.selected {
      border-color: var(--ink);
    }

    /* PANEL RESIZE HANDLE */
    .panel-resize {
      position: absolute;
      top: 0;
      left: -4px;
      bottom: 0;
      width: 8px;
      cursor: col-resize;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel-resize::after {
      content: '';
      width: 2px;
      height: 40px;
      background: var(--border);
      border-radius: 2px;
      transition: background 0.2s;
    }

    .panel-resize:hover::after,
    .panel-resize.dragging::after {
      background: var(--cyan);
    }

    /* CONTENT */
    #noteContent {
      width: 100%;
      min-height: 100px;
      background: none;
      border: none;
      outline: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 300;
      color: var(--ink-mid);
      line-height: 1.8;
      resize: none;
      user-select: text;
      margin-bottom: 12px;
    }

    #noteContent::placeholder {
      color: var(--ink-dim);
      font-style: italic;
    }

    /* MARKDOWN PREVIEW */
    .md-preview {
      width: 100%;
      min-height: 100px;
      margin-bottom: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      font-weight: 300;
      color: var(--ink-mid);
      line-height: 1.8;
      display: none;
      cursor: text;
    }

    .md-preview.active {
      display: block;
    }

    .md-preview h1,
    .md-preview h2,
    .md-preview h3 {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      color: var(--ink);
      margin: 0.8em 0 0.3em;
      letter-spacing: -0.01em;
    }

    .md-preview h1 {
      font-size: 1.6rem;
    }

    .md-preview h2 {
      font-size: 1.3rem;
    }

    .md-preview h3 {
      font-size: 1.1rem;
    }

    .md-preview p {
      margin: 0 0 0.7em;
    }

    .md-preview p:last-child {
      margin-bottom: 0;
    }

    .md-preview strong {
      color: var(--ink);
      font-weight: 400;
    }

    .md-preview em {
      font-style: italic;
    }

    .md-preview code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78em;
      background: var(--lift);
      color: var(--cyan);
      padding: 1px 5px;
      border-radius: 2px;
    }

    .md-preview pre {
      background: var(--lift);
      padding: 10px 14px;
      margin: 0.6em 0;
      overflow-x: auto;
      border-left: 2px solid var(--cyan);
    }

    .md-preview pre code {
      background: none;
      padding: 0;
      color: var(--ink-mid);
      font-size: 0.82em;
    }

    .md-preview ul,
    .md-preview ol {
      padding-left: 1.4em;
      margin: 0.4em 0 0.7em;
    }

    .md-preview li {
      margin-bottom: 0.2em;
    }

    .md-preview blockquote {
      border-left: 2px solid var(--purple);
      margin: 0.6em 0;
      padding: 2px 0 2px 14px;
      color: var(--ink-dim);
      font-style: italic;
    }

    .md-preview hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.8em 0;
    }

    .md-preview a {
      color: var(--cyan);
      text-decoration: none;
    }

    .md-preview a:hover {
      text-decoration: underline;
    }

    /* GFM task list checkboxes */
    .md-preview ul.contains-task-list {
      list-style: none;
      padding-left: 0.4em;
    }

    .md-preview .task-list-item {
      display: flex;
      align-items: baseline;
      gap: 7px;
    }

    .md-preview .task-list-item input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 11px;
      height: 11px;
      border: 1px solid var(--border);
      background: none;
      cursor: default;
      flex-shrink: 0;
      margin: 0;
      position: relative;
      top: 1px;
      transition: all 0.15s;
    }

    .md-preview .task-list-item input[type="checkbox"]:checked {
      background: var(--cyan);
      border-color: var(--cyan);
    }

    .md-preview .task-list-item input[type="checkbox"]:checked::after {
      content: "";
      position: absolute;
      left: 2px;
      top: -1px;
      width: 5px;
      height: 8px;
      border: 2px solid var(--bg);
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .md-preview .task-list-item.checked>*:not(input) {
      opacity: 0.45;
      text-decoration: line-through;
    }

    /* highlight.js overrides to match design */
    .md-preview .hljs {
      background: var(--lift) !important;
      color: var(--ink-mid) !important;
      padding: 0 !important;
    }

    .md-preview img {
      max-width: 100%;
      height: auto;
      margin: 0.4em 0;
    }

    .md-preview del {
      opacity: 0.5;
      text-decoration: line-through;
    }

    .md-preview table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.6em 0;
      font-size: 0.92rem;
    }

    .md-preview th,
    .md-preview td {
      padding: 6px 12px;
      border: 1px solid var(--border);
      text-align: left;
    }

    .md-preview th {
      background: var(--lift);
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      font-weight: 400;
      text-transform: uppercase;
    }

    .md-preview td {
      color: var(--ink-mid);
    }

    .md-preview tr:nth-child(even) td {
      background: rgba(255, 255, 255, 0.02);
    }

    /* EDIT/PREVIEW TOGGLE */
    .content-mode-toggle {
      display: flex;
      gap: 0;
      margin-left: auto;
    }

    .mode-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.44rem;
      letter-spacing: 0.1em;
      padding: 1px 7px;
      border: 1px solid var(--border);
      background: none;
      color: var(--ink-dim);
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .mode-btn:first-child {
      border-right: none;
    }

    .mode-btn.active {
      background: var(--lift);
      color: var(--ink);
      border-color: var(--ink-dim);
    }

    .mode-btn:hover:not(.active) {
      color: var(--ink);
    }

    /* CONNECTIONS */
    .link-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      min-height: 36px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      color: var(--ink-mid);
      font-size: 0.75rem;
      font-family: 'Cormorant Garamond', serif;
    }

    .link-item:hover {
      border-color: var(--purple);
      color: var(--purple);
    }

    .link-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .link-remove {
      margin-left: auto;
      opacity: 0;
      font-size: var(--icon-sz);
      font-family: 'JetBrains Mono', monospace;
      line-height: 0;
      color: var(--red);
      transition: opacity 0.2s;
      flex-shrink: 0;
      padding: 0 4px;
      align-self: center;
    }

    .link-item:hover .link-remove {
      opacity: 0.7;
    }

    .link-search-wrap {
      position: relative;
      margin-top: 4px;
    }

    .link-search {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      padding: 9px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .link-search:focus {
      border-color: var(--purple);
    }

    .link-search::placeholder {
      color: var(--ink-dim);
      font-style: italic;
    }

    .link-results {
      position: absolute;
      bottom: 100%;
      left: 0;
      right: 0;
      z-index: 200;
      background: var(--lift);
      border: 1px solid var(--purple);
      border-bottom: none;
      border-top: 1px solid var(--purple);
      max-height: 180px;
      overflow-y: auto;
      display: none;
    }

    .link-results.open {
      display: block;
    }

    .link-result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      cursor: pointer;
      transition: background 0.15s;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      color: var(--ink-mid);
    }

    .link-result-item:hover {
      background: var(--surface);
      color: var(--ink);
    }

    .link-result-item.already-linked {
      background: rgba(0, 170, 170, 0.05);
    }

    .link-results::-webkit-scrollbar {
      width: 3px;
    }

    .link-results::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    .panel-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
    }

    .del-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      background: none;
      border: 1px solid rgba(224, 120, 106, 0.2);
      color: var(--red);
      padding: 7px 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .del-btn:hover {
      background: rgba(224, 120, 106, 0.1);
    }

    .save-note-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      background: var(--cyan);
      color: var(--bg);
      border: none;
      padding: 7px 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .save-note-btn:hover {
      opacity: 0.85;
    }

    /* MINIMAP */
    .minimap {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 50;
      width: 140px;
      height: 90px;
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .minimap canvas {
      width: 100%;
      height: 100%;
    }

    /* SEARCH */
    #searchInput {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.08em;
      padding: 7px 14px;
      outline: none;
      width: 200px;
      transition: border-color 0.2s;
    }

    #searchInput:focus {
      border-color: var(--purple);
    }

    #searchInput::placeholder {
      color: var(--ink-dim);
    }

    /* LEGEND */
    .legend {
      position: absolute;
      bottom: 20px;
      left: 170px;
      z-index: 50;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .legend-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.44rem;
      letter-spacing: 0.08em;
    }

    .legend-header:hover {
      background: var(--lift);
    }

    .legend-title {
      color: var(--ink-dim);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .legend-toggle {
      color: var(--ink-dim);
      font-size: var(--icon-sz);
    }

    .legend-body {
      padding: 6px 12px 10px;
    }

    .legend-body.hidden {
      display: none;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--ink-dim);
      margin-bottom: 5px;
      font-size: 0.46rem;
      letter-spacing: 0.08em;
    }

    .legend-row:last-child {
      margin-bottom: 0;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* DELETE MODAL */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 8000;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 32px 36px;
      max-width: 380px;
      width: 90%;
      transform: translateY(8px);
      transition: transform 0.2s;
    }

    .modal-backdrop.open .modal {
      transform: translateY(0);
    }

    .modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 300;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .modal-sub {
      font-size: 0.52rem;
      color: var(--ink-dim);
      letter-spacing: 0.06em;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .modal-note-name {
      color: var(--ink-mid);
      font-style: italic;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-bottom: 18px;
    }

    .modal-skip-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      color: var(--ink-dim);
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
    }

    .modal-skip-wrap:hover {
      color: var(--ink-mid);
    }

    .modal-checkbox {
      width: 11px;
      height: 11px;
      border: 1px solid var(--border);
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.15s;
    }

    .modal-checkbox.checked {
      border-color: var(--cyan);
      background: rgba(0, 170, 170, 0.15);
    }

    .modal-checkbox.checked::after {
      content: '✓';
      font-size: var(--icon-sz);
      color: var(--cyan);
      line-height: 1;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--cyan);
      color: var(--bg);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      padding: 8px 20px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 9999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="topbar-left">
      <span class="brand">GARDEN</span>
      <div class="garden-switcher">
        <button class="garden-name-btn" id="gardenNameBtn" onclick="toggleGardenPopup()">Loading…</button>
        <button class="garden-dropdown-btn" onclick="toggleGardenPopup()">▾</button>
      </div>
    </div>
    <div class="topbar-right">
      <input type="text" id="searchInput" placeholder="search notes…">
      <button class="tb-btn" onclick="resetView()">Reset View</button>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">☽</button>
      <div class="color-mode-wrap" id="colorModeWrap">
        <button class="color-mode-btn" onclick="toggleColorModeDropdown()">
          <span class="cm-swatch"></span><span id="colorModeLabel">oklab</span>
        </button>
        <div class="color-mode-dropdown" id="colorModeDropdown">
          <button class="cm-option active" data-mode="arc" onclick="setColorMode('arc')"> <span
              class="cm-node-preview cm-arc"></span>Arc segs</button>
          <button class="cm-option" data-mode="dominant" onclick="setColorMode('dominant')"><span
              class="cm-node-preview cm-dominant"></span>Dominant</button>
          <button class="cm-option" data-mode="oklab" onclick="setColorMode('oklab')"> <span
              class="cm-node-preview cm-oklab"></span>Oklab</button>
          <button class="cm-option" data-mode="rgb" onclick="setColorMode('rgb')"> <span
              class="cm-node-preview cm-rgb"></span>RGB avg</button>
        </div>
      </div>
      <button class="tb-btn primary" onclick="newNote()">+ New Note</button>
    </div>
  </div>

  <div class="garden-popup" id="gardenPopup">
    <div class="garden-popup-header">Your Gardens</div>
    <div class="garden-list" id="gardenList"></div>
    <div class="garden-popup-footer">
      <input class="garden-new-input" id="gardenNewInput" placeholder="New garden name…"
        onkeydown="if(event.key==='Enter')createGarden()">
      <button class="tb-btn" onclick="createGarden()" style="padding:6px 10px">Create</button>
    </div>
  </div>

  <div class="tag-filter-bar" id="tagFilterBar">
    <span class="filter-label">Filter</span>
  </div>

  <div class="layout">
    <canvas id="graphCanvas"></canvas>

    <div class="note-panel" id="notePanel">
      <div class="panel-resize" id="panelResize"></div>
      <div class="panel-header">
        <div class="panel-title-row">
          <span class="panel-id" id="panelNoteId"></span>
          <button class="panel-close" onclick="closePanel()">close ×</button>
        </div>
        <textarea id="noteTitle" rows="1" placeholder="Note title…" oninput="autoResize(this);autoSave()"></textarea>
      </div>
      <div class="panel-body">
        <div class="panel-scroll">
          <div class="sec-label">Tags</div>
          <div class="panel-meta" id="panelMeta"></div>
          <div class="new-tag-form" id="newTagForm">
            <div class="new-tag-row">
              <input class="new-tag-input" id="newTagName" placeholder="tag name…" maxlength="20"
                onkeydown="if(event.key==='Enter')createTag()">
              <button class="tb-btn" onclick="createTag()" style="padding:4px 8px">Add</button>
              <button class="tb-btn" onclick="closeNewTagForm()" style="padding:4px 6px">✕</button>
            </div>
            <div class="color-swatches" id="colorSwatches"></div>
          </div>

          <div class="sec-label" style="margin-top:8px">Content
            <div class="content-mode-toggle">
              <button class="mode-btn active" id="modeEdit" onclick="setContentMode('edit')">Edit</button>
              <button class="mode-btn" id="modePreview" onclick="setContentMode('preview')">Preview</button>
            </div>
          </div>
          <textarea id="noteContent" rows="5" placeholder="Write anything…" oninput="autoSave()"></textarea>
          <div class="md-preview" id="mdPreview"></div>
        </div>

        <div class="panel-connections">
          <div class="sec-label">Connections</div>
          <div class="link-list" id="linkList"></div>
          <div class="link-search-wrap">
            <input class="link-search" id="linkSearch" type="text" placeholder="Search to connect a note…"
              autocomplete="off" oninput="onLinkSearch()" onfocus="onLinkSearch()">
            <div class="link-results" id="linkResults"></div>
          </div>
        </div>
      </div>
      <div class="panel-footer">
        <button class="del-btn" onclick="deleteNote()">Delete note</button>
        <button class="save-note-btn" onclick="saveNote()">Save</button>
      </div>
    </div>

    <div class="minimap"><canvas id="minimapCanvas"></canvas></div>

    <div class="legend" id="legend">
      <div class="legend-header" onclick="toggleLegend()">
        <span class="legend-title">Tags</span>
        <span class="legend-toggle" id="legendToggle">▴</span>
      </div>
      <div class="legend-body" id="legendBody"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="gardenDeleteModal">
    <div class="modal">
      <div class="modal-title">Delete garden?</div>
      <div class="modal-sub">
        <span class="modal-note-name" id="gardenModalName"></span><br>
        All notes inside will be permanently lost.
      </div>
      <div class="modal-actions">
        <button class="tb-btn" onclick="cancelGardenDelete()">Cancel</button>
        <button class="tb-btn" style="border-color:var(--red);color:var(--red)"
          onclick="confirmGardenDelete()">Delete</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="deleteModal">
    <div class="modal">
      <div class="modal-title">Delete note?</div>
      <div class="modal-sub">
        <span class="modal-note-name" id="modalNoteName"></span><br>
        This cannot be undone.
      </div>
      <div class="modal-actions">
        <button class="tb-btn" onclick="cancelDelete()">Cancel</button>
        <button class="tb-btn" style="border-color:var(--red);color:var(--red)"
          onclick="confirmDelete()">Delete</button>
      </div>
      <div class="modal-skip-wrap" onclick="toggleSkipConfirm()">
        <div class="modal-checkbox" id="modalCheckbox"></div>
        Don't ask again
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script>
    // ═══════════════════════════════════════════════════════════════════
    //  CONSTANTS
    // ═══════════════════════════════════════════════════════════════════
    const SWATCH_COLORS = [
      '#00AAAA', '#8b7fcf', '#4ec994', '#c9a96e', '#e0786a',
      '#d4845a', '#4a9ebb', '#a67cc4', '#7eb8c9', '#b5cc6a',
      '#e8a0bf', '#6ab8e8', '#e8d46a', '#88c8a0', '#c4a07c',
    ];
    const DEFAULT_TAGS = [
      { id: 'idea', label: 'idea', color: '#00AAAA' },
      { id: 'question', label: 'question', color: '#8b7fcf' },
      { id: 'reference', label: 'reference', color: '#c9a96e' },
      { id: 'todo', label: 'todo', color: '#e0786a' },
      { id: 'insight', label: 'insight', color: '#4ec994' },
    ];

    // ═══════════════════════════════════════════════════════════════════
    //  STATE
    // ═══════════════════════════════════════════════════════════════════
    let gardens = {}, gardenIds = [], currentGardenId = null;
    let notes = [], links = [], nextId = 1, customTags = [];
    let selectedNote = null, hoveredNote = null;
    let activeTags = new Set();
    let vpX = 0, vpY = 0, vpScale = 1;
    let isDragging = false, dragStartX = 0, dragStartY = 0, dragVpX = 0, dragVpY = 0;
    let nodeDragging = null, nodeDragOffX = 0, nodeDragOffY = 0;
    let nodeDragMoved = false, nodeDragStartX = 0, nodeDragStartY = 0;
    let legendVisible = true;
    let dirty = true;
    let newTagColor = SWATCH_COLORS[0];

    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');
    const miniCanvas = document.getElementById('minimapCanvas');
    const miniCtx = miniCanvas.getContext('2d');

    // ═══════════════════════════════════════════════════════════════════
    //  STORAGE
    // ═══════════════════════════════════════════════════════════════════
    function saveAll() {
      if (currentGardenId && gardens[currentGardenId]) {
        gardens[currentGardenId].notes = notes;
        gardens[currentGardenId].links = links;
        gardens[currentGardenId].nextId = nextId;
        gardens[currentGardenId].customTags = customTags;
      }
      try {
        localStorage.setItem('gdn_v3_data', JSON.stringify({ gardens, gardenIds, currentGardenId }));
      } catch (e) { }
    }

    function loadAll() {
      try {
        const raw = localStorage.getItem('gdn_v3_data');
        if (raw) {
          const d = JSON.parse(raw);
          gardens = d.gardens || {};
          gardenIds = d.gardenIds || [];
          currentGardenId = d.currentGardenId && gardens[d.currentGardenId] ? d.currentGardenId : gardenIds[0];
          return gardenIds.length > 0;
        }
      } catch (e) { }
      return false;
    }

    // ═══════════════════════════════════════════════════════════════════
    //  SEED
    // ═══════════════════════════════════════════════════════════════════
    function makeSeed() {
      return {
        notes: [
          { id: 1, title: 'Digital Garden', content: 'A non-linear space for thinking. Unlike a blog, notes here evolve and link to each other.', tags: ['idea'], x: 0, y: 0 },
          { id: 2, title: 'Evergreen Notes', content: 'Notes that are concept-oriented rather than time-oriented. Kept up to date as thinking evolves.', tags: ['reference'], x: 220, y: -80 },
          { id: 3, title: 'Zettelkasten Method', content: 'A slip-box system. Every note links to others. The connections are more valuable than the notes.', tags: ['reference'], x: 220, y: 80 },
          { id: 4, title: 'Spaced Repetition', content: 'Reviewing information at increasing intervals. The forgetting curve works against you.', tags: ['insight'], x: 460, y: -120 },
          { id: 5, title: 'Why do we forget?', content: 'Is forgetting a failure of memory, or a feature? What does the brain choose to keep?', tags: ['question'], x: 460, y: 60 },
          { id: 6, title: 'Build a second brain', content: 'The idea of offloading memory to an external system. Frees working memory for synthesis.', tags: ['idea'], x: -180, y: 100 },
          { id: 7, title: 'Read before you write', content: 'You cannot make connections without raw material. Input before output.', tags: ['insight'], x: -180, y: -100 },
          { id: 8, title: 'Things to explore', content: '- Graph databases\n- Obsidian vs Roam\n- Twitter threads as public Zettelkasten', tags: ['todo'], x: -360, y: 0 },
        ],
        links: [[1, 2], [1, 3], [1, 6], [2, 3], [3, 4], [3, 5], [4, 5], [6, 7], [7, 8], [2, 7]].map(([a, b]) => ({ from: a, to: b })),
        nextId: 9, customTags: [],
      };
    }

    // ═══════════════════════════════════════════════════════════════════
    //  GARDEN ACTIVATION
    // ═══════════════════════════════════════════════════════════════════
    function activateGarden(id) {
      // Flush current only when switching away from a different garden
      if (currentGardenId && currentGardenId !== id && gardens[currentGardenId]) {
        gardens[currentGardenId].notes = notes;
        gardens[currentGardenId].links = links;
        gardens[currentGardenId].nextId = nextId;
        gardens[currentGardenId].customTags = customTags;
      }
      currentGardenId = id;
      const g = gardens[id];
      notes = g.notes || [];
      links = g.links || [];
      nextId = g.nextId || 1;
      customTags = g.customTags || [];

      vpX = 0; vpY = 0; vpScale = 1;
      selectedNote = null; hoveredNote = null;
      activeTags.clear();
      document.getElementById('gardenNameBtn').textContent = g.name;
      document.getElementById('notePanel').classList.remove('open');
      renderTagsPanel();
      renderFilterBar();
      renderLegend();
      markDirty();
    }

    // Init
    if (!loadAll()) {
      const id = 'g_' + Date.now();
      gardens = { [id]: { name: 'My Garden', ...makeSeed() } };
      gardenIds = [id];
      currentGardenId = id;
    }
    activateGarden(currentGardenId);

    // ═══════════════════════════════════════════════════════════════════
    //  GARDEN UI
    // ═══════════════════════════════════════════════════════════════════
    function toggleGardenPopup() {
      const p = document.getElementById('gardenPopup');
      p.classList.toggle('open');
      if (p.classList.contains('open')) renderGardenList();
    }

    function renderGardenList() {
      document.getElementById('gardenList').innerHTML = gardenIds.map(id => {
        const g = gardens[id], count = (g.notes || []).length;
        return `<div class="garden-item ${id === currentGardenId ? 'active' : ''}" data-garden-id="${id}" onclick="switchGarden('${id}')">
      <span class="garden-item-name">${g.name}</span>
      <span class="garden-item-count">${count} note${count !== 1 ? 's' : ''}</span>
      <span class="garden-item-ren" title="Rename" onclick="event.stopPropagation();startRenameGarden('${id}')">✎</span>
      ${gardenIds.length > 1 ? `<span class="garden-item-del" title="Delete" onclick="event.stopPropagation();deleteGarden('${id}')">×</span>` : ''}
    </div>`;
      }).join('');
    }

    function startRenameGarden(id) {
      const item = document.querySelector(`.garden-item[data-garden-id="${id}"]`);
      if (!item) return;
      const nameSpan = item.querySelector('.garden-item-name');
      const current = gardens[id].name;
      const inp = document.createElement('input');
      inp.className = 'garden-rename-input';
      inp.value = current;
      nameSpan.replaceWith(inp);
      inp.focus(); inp.select();
      // Hide action buttons while renaming
      item.querySelectorAll('.garden-item-ren,.garden-item-del,.garden-item-count').forEach(el => el.style.visibility = 'hidden');
      item.onclick = null;

      function commit() {
        const val = inp.value.trim();
        if (val) { gardens[id].name = val; saveAll(); }
        if (currentGardenId === id) document.getElementById('gardenNameBtn').textContent = gardens[id].name;
        renderGardenList();
      }
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); commit(); }
        if (e.key === 'Escape') { renderGardenList(); }
        e.stopPropagation();
      });
      inp.addEventListener('blur', commit);
      inp.addEventListener('click', e => e.stopPropagation());
    }

    function switchGarden(id) {
      document.getElementById('gardenPopup').classList.remove('open');
      // Flush current garden before switching
      if (currentGardenId && gardens[currentGardenId]) {
        gardens[currentGardenId].notes = notes;
        gardens[currentGardenId].links = links;
        gardens[currentGardenId].nextId = nextId;
        gardens[currentGardenId].customTags = customTags;
      }
      activateGarden(id);
      saveAll();
    }

    function createGarden() {
      const inp = document.getElementById('gardenNewInput');
      const name = inp.value.trim(); if (!name) return;
      const id = 'g_' + Date.now();
      gardens[id] = { name, ...makeSeed(), customTags: [] };
      gardenIds.push(id); inp.value = '';
      switchGarden(id);
    }

    let pendingGardenDelete = null;

    function deleteGarden(id) {
      if (gardenIds.length <= 1) { toast('Cannot delete the last garden'); return; }
      pendingGardenDelete = id;
      document.getElementById('gardenModalName').textContent = gardens[id].name;
      document.getElementById('gardenDeleteModal').classList.add('open');
    }

    function confirmGardenDelete() {
      const id = pendingGardenDelete;
      closeGardenDeleteModal();
      if (!id) return;
      gardenIds = gardenIds.filter(i => i !== id);
      delete gardens[id];
      if (currentGardenId === id) {
        activateGarden(gardenIds[0]);
        saveAll();
      } else {
        saveAll(); renderGardenList();
      }
      toast('Garden deleted');
    }

    function cancelGardenDelete() { closeGardenDeleteModal(); }
    function closeGardenDeleteModal() {
      document.getElementById('gardenDeleteModal').classList.remove('open');
      pendingGardenDelete = null;
    }

    // ═══════════════════════════════════════════════════════════════════
    //  TAGS
    // ═══════════════════════════════════════════════════════════════════
    function allTags() { return [...DEFAULT_TAGS, ...customTags]; }

    function tagColor(id) {
      const t = allTags().find(t => t.id === id);
      return t ? t.color : '#4e4a62';
    }

    // ── Color mode ──────────────────────────────────────────────────────
    let colorMode = localStorage.getItem('garden_color_mode') || 'arc';

    function hexToRgb(hex) {
      const h = hex.replace('#', '');
      return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
    }
    function rgbToHex(r, g, b) {
      return '#' + [r, g, b].map(v => Math.round(Math.max(0, Math.min(255, v))).toString(16).padStart(2, '0')).join('');
    }
    function rgbToOklab([r, g, b]) {
      r /= 255; g /= 255; b /= 255;
      r = r > 0.04045 ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
      g = g > 0.04045 ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
      b = b > 0.04045 ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;
      const l = Math.cbrt(0.4122214708 * r + 0.5363325363 * g + 0.0514459929 * b);
      const m = Math.cbrt(0.2119034982 * r + 0.6806995451 * g + 0.1073969566 * b);
      const s = Math.cbrt(0.0883024619 * r + 0.2817188376 * g + 0.6299787005 * b);
      return [0.2104542553 * l + 0.7936177850 * m - 0.0040720468 * s,
      1.9779984951 * l - 2.4285922050 * m + 0.4505937099 * s,
      0.0259040371 * l + 0.7827717662 * m - 0.8086757660 * s];
    }
    function oklabToRgb([L, a, b]) {
      const l = L + 0.3963377774 * a + 0.2158037573 * b;
      const m = L - 0.1055613458 * a - 0.0638541728 * b;
      const s = L - 0.0894841775 * a - 1.2914855480 * b;
      const rl = l * l * l, rm = m * m * m, rs = s * s * s;
      const gm = v => v > 0.0031308 ? 1.055 * Math.pow(v, 1 / 2.4) - 0.055 : 12.92 * v;
      return [gm(4.0767416621 * rl - 3.3077115913 * rm + 0.2309699292 * rs) * 255,
      gm(-1.2684380046 * rl + 2.6097574011 * rm - 0.3413193965 * rs) * 255,
      gm(-0.0041960863 * rl - 0.7034186147 * rm + 1.7076147010 * rs) * 255];
    }
    function blendOklab(hexColors) {
      const labs = hexColors.map(h => rgbToOklab(hexToRgb(h)));
      const avg = [0, 1, 2].map(i => labs.reduce((s, c) => s + c[i], 0) / labs.length);
      return rgbToHex(...oklabToRgb(avg));
    }
    function blendRgb(hexColors) {
      const rgbs = hexColors.map(hexToRgb);
      return rgbToHex(...[0, 1, 2].map(i => rgbs.reduce((s, c) => s + c[i], 0) / rgbs.length));
    }
    function nodeColor(note) {
      if (!note.tags || !note.tags.length) return '#4e4a62';
      const colors = note.tags.map(tagColor);
      if (colors.length === 1 || colorMode === 'dominant') return colors[0];
      if (colorMode === 'rgb') return blendRgb(colors);
      if (colorMode === 'arc') return colors[0];
      return blendOklab(colors);
    }
    function drawArcNode(ctx, sx, sy, r, colors, isSel) {
      if (colors.length <= 1) {
        ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.fillStyle = isSel ? colors[0] : colors[0] + '33'; ctx.fill(); return;
      }
      const slice = (Math.PI * 2) / colors.length;
      colors.forEach((c, i) => {
        ctx.beginPath(); ctx.moveTo(sx, sy);
        ctx.arc(sx, sy, r, -Math.PI / 2 + i * slice, -Math.PI / 2 + (i + 1) * slice);
        ctx.closePath(); ctx.fillStyle = isSel ? c : c + '55'; ctx.fill();
      });
    }
    function setColorMode(mode) {
      colorMode = mode; localStorage.setItem('garden_color_mode', mode);
      document.querySelectorAll('.cm-option').forEach(el => el.classList.toggle('active', el.dataset.mode === mode));
      document.getElementById('colorModeLabel').textContent = mode;
      document.getElementById('colorModeDropdown').classList.remove('open');
      markDirty();
    }
    function toggleColorModeDropdown() {
      document.getElementById('colorModeDropdown').classList.toggle('open');
    }
    document.addEventListener('click', e => {
      if (!e.target.closest('#colorModeWrap'))
        document.getElementById('colorModeDropdown')?.classList.remove('open');
    });
    function initColorMode() {
      document.querySelectorAll('.cm-option').forEach(el => el.classList.toggle('active', el.dataset.mode === colorMode));
      document.getElementById('colorModeLabel').textContent = colorMode;
    }

    function renderFilterBar() {
      const bar = document.getElementById('tagFilterBar');
      const tags = allTags();
      bar.innerHTML = `<span class="filter-label">Filter</span>` +
        tags.map(t => `
      <button class="filter-tag ${activeTags.has(t.id) ? 'active' : ''}"
        style="--ftag-color:${t.color}"
        onclick="toggleFilterTag('${t.id}')">
        <span class="ftag-dot" style="background:${t.color}"></span>${t.label}
      </button>`).join('') +
        (activeTags.size ? `<button class="filter-clear" onclick="clearTagFilter()">clear ×</button>` : '');
      bar.classList.toggle('has-tags', tags.length > 0);
    }

    function toggleFilterTag(id) {
      if (activeTags.has(id)) activeTags.delete(id);
      else activeTags.add(id);
      renderFilterBar();
      markDirty();
    }

    function clearTagFilter() {
      activeTags.clear();
      renderFilterBar();
      markDirty();
    }

    function renderTagsPanel() {
      document.getElementById('panelMeta').innerHTML =
        allTags().map(t => `
      <div class="meta-tag" data-tag="${t.id}" style="--tag-color:${t.color}" onclick="toggleTag('${t.id}')">
        <span class="tag-dot"></span>${t.label}
      </div>`).join('') +
        `<button class="meta-tag-add" onclick="openNewTagForm()">+ tag</button>`;
    }

    function renderLegend() {
      document.getElementById('legendBody').innerHTML =
        allTags().map(t => `
      <div class="legend-row">
        <div class="legend-dot" style="background:${t.color}"></div><span>${t.label}</span>
      </div>`).join('') +
        `<div class="legend-row"><div class="legend-dot" style="background:#4e4a62"></div><span>untagged</span></div>`;
    }

    function toggleLegend() {
      legendVisible = !legendVisible;
      document.getElementById('legendBody').classList.toggle('hidden', !legendVisible);
      document.getElementById('legendToggle').textContent = legendVisible ? '▴' : '▾';
    }

    function openNewTagForm() {
      document.getElementById('newTagForm').classList.add('open');
      document.getElementById('newTagName').focus();
      document.getElementById('colorSwatches').innerHTML = SWATCH_COLORS.map(c =>
        `<div class="color-swatch ${c === newTagColor ? 'selected' : ''}" style="background:${c}"
      onclick="selectSwatch('${c}',this)"></div>`).join('');
    }

    function closeNewTagForm() {
      document.getElementById('newTagForm').classList.remove('open');
      document.getElementById('newTagName').value = '';
    }

    function selectSwatch(color, el) {
      newTagColor = color;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
    }

    function createTag() {
      const raw = document.getElementById('newTagName').value.trim();
      const name = raw.toLowerCase().replace(/\s+/g, '-');
      if (!name) return;
      if (allTags().find(t => t.id === name)) { toast('Tag already exists'); return; }
      customTags.push({ id: name, label: raw || name, color: newTagColor });
      closeNewTagForm();
      renderTagsPanel();
      renderFilterBar();
      renderLegend();
      if (selectedNote) {
        document.querySelectorAll('.meta-tag').forEach(el =>
          el.classList.toggle('selected', selectedNote.tags?.includes(el.dataset.tag)));
      }
      saveAll(); markDirty(); toast(`Tag "${raw}" created`);
    }

    function toggleTag(tag) {
      const el = document.querySelector(`.meta-tag[data-tag="${tag}"]`);
      if (el) el.classList.toggle('selected');
      autoSave();
    }

    // ═══════════════════════════════════════════════════════════════════
    //  COORDINATE HELPERS
    // ═══════════════════════════════════════════════════════════════════
    function worldToScreen(x, y) {
      const dpr = window.devicePixelRatio || 1;
      return { x: (x + vpX) * vpScale + canvas.width / 2 / dpr, y: (y + vpY) * vpScale + canvas.height / 2 / dpr };
    }
    function screenToWorld(x, y) {
      const dpr2 = window.devicePixelRatio || 1;
      return { x: (x - canvas.width / 2 / dpr2) / vpScale - vpX, y: (y - canvas.height / 2 / dpr2) / vpScale - vpY };
    }
    function nodeRadius(note) {
      return 10 + links.filter(l => l.from === note.id || l.to === note.id).length * 3;
    }
    function canvasXY(e) {
      const r = canvas.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }
    function noteAt(cx, cy) {
      for (const n of [...notes].reverse()) {
        const s = worldToScreen(n.x, n.y);
        if (Math.hypot(s.x - cx, s.y - cy) < nodeRadius(n) * vpScale + 4) return n;
      }
      return null;
    }

    // ═══════════════════════════════════════════════════════════════════
    //  RENDER
    // ═══════════════════════════════════════════════════════════════════
    function resizeCanvas() {
      const r = canvas.parentElement.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = r.width * dpr;
      canvas.height = r.height * dpr;
      canvas.style.width = r.width + 'px';
      canvas.style.height = r.height + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      markDirty();
    }


    function markDirty() { dirty = true; }

    function draw() {
      if (dirty) {
        dirty = false;
        const lw = canvas.width / (window.devicePixelRatio || 1);
        const lh = canvas.height / (window.devicePixelRatio || 1);
        ctx.clearRect(0, 0, lw, lh);
        const q = document.getElementById('searchInput').value.toLowerCase();

        links.forEach(l => {
          const f = notes.find(n => n.id === l.from), t = notes.find(n => n.id === l.to);
          if (!f || !t) return;
          const fs = worldToScreen(f.x, f.y), ts = worldToScreen(t.x, t.y);
          const sel = selectedNote && (selectedNote.id === l.from || selectedNote.id === l.to);
          ctx.beginPath(); ctx.moveTo(fs.x, fs.y); ctx.lineTo(ts.x, ts.y);
          const lLight = document.documentElement.classList.contains('light');
          ctx.strokeStyle = sel ? 'rgba(0,120,120,0.4)' : (lLight ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.07)');
          ctx.lineWidth = sel ? 1.5 : 1; ctx.stroke();
        });

        notes.forEach(n => {
          const s = worldToScreen(n.x, n.y);
          const r = nodeRadius(n) * vpScale;
          const color = nodeColor(n);
          const isSel = selectedNote?.id === n.id;
          const isHov = hoveredNote?.id === n.id;
          const qMatch = !q || n.title.toLowerCase().includes(q) || (n.content || '').toLowerCase().includes(q);
          const tMatch = !activeTags.size || [...activeTags].every(t => (n.tags || []).includes(t));
          const dimmed = !qMatch || !tMatch;
          ctx.globalAlpha = dimmed ? 0.15 : 1;
          if (isSel || isHov) {
            const grd = ctx.createRadialGradient(s.x, s.y, r, s.x, s.y, r * 3);
            grd.addColorStop(0, color + '40'); grd.addColorStop(1, 'transparent');
            ctx.beginPath(); ctx.arc(s.x, s.y, r * 3, 0, Math.PI * 2); ctx.fillStyle = grd; ctx.fill();
          }
          if (colorMode === 'arc' && n.tags && n.tags.length > 1) {
            drawArcNode(ctx, s.x, s.y, r, n.tags.map(tagColor), isSel);
          } else {
            ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
            ctx.fillStyle = isSel ? color : color + '33'; ctx.fill();
          }
          ctx.strokeStyle = isSel ? color : color + 'aa';
          ctx.lineWidth = isSel ? 2 : 1; ctx.stroke();
          if (vpScale > 0.4) {
            const isLight = document.documentElement.classList.contains('light');
            ctx.fillStyle = dimmed
              ? (isLight ? '#a09cba' : '#4e4a62')
              : (isSel ? (isLight ? '#1c1a26' : '#dcd8f0') : (isLight ? '#5a5670' : '#8a859e'));
            const fs2 = Math.max(9, Math.min(13, 11 * vpScale));
            ctx.font = `${fs2}px "JetBrains Mono",monospace`; ctx.textAlign = 'center';
            const label = n.title.length > 20 ? n.title.slice(0, 18) + '…' : n.title;
            ctx.fillText(label, s.x, s.y + r + 14 * vpScale);
          }
          ctx.globalAlpha = 1;
        });
        drawMinimap();
      }
      requestAnimationFrame(draw);
    }

    function drawMinimap() {
      const W = miniCanvas.width = 140, H = miniCanvas.height = 90;
      const mLight = document.documentElement.classList.contains('light');
      miniCtx.clearRect(0, 0, W, H); miniCtx.fillStyle = mLight ? '#eceae4' : '#10101a'; miniCtx.fillRect(0, 0, W, H);
      if (!notes.length) return;
      const xs = notes.map(n => n.x), ys = notes.map(n => n.y);
      const minX = Math.min(...xs) - 60, maxX = Math.max(...xs) + 60;
      const minY = Math.min(...ys) - 60, maxY = Math.max(...ys) + 60;
      const sc = Math.min(W / (maxX - minX), H / (maxY - minY)) * 0.85;
      const ox = W / 2 - (minX + maxX) / 2 * sc, oy = H / 2 - (minY + maxY) / 2 * sc;
      links.forEach(l => {
        const f = notes.find(n => n.id === l.from), t = notes.find(n => n.id === l.to);
        if (!f || !t) return;
        miniCtx.beginPath(); miniCtx.moveTo(f.x * sc + ox, f.y * sc + oy); miniCtx.lineTo(t.x * sc + ox, t.y * sc + oy);
        miniCtx.strokeStyle = mLight ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.08)'; miniCtx.lineWidth = 0.5; miniCtx.stroke();
      });
      notes.forEach(n => {
        miniCtx.beginPath(); miniCtx.arc(n.x * sc + ox, n.y * sc + oy, 3, 0, Math.PI * 2);
        miniCtx.fillStyle = nodeColor(n) + 'cc'; miniCtx.fill();
      });
    }

    // ═══════════════════════════════════════════════════════════════════
    //  CANVAS INTERACTION
    // ═══════════════════════════════════════════════════════════════════
    canvas.addEventListener('mousedown', e => {
      markDirty();
      const { x: cx, y: cy } = canvasXY(e);
      const hit = noteAt(cx, cy);
      if (hit) {
        nodeDragging = hit; nodeDragMoved = false; nodeDragStartX = cx; nodeDragStartY = cy;
        const s = worldToScreen(hit.x, hit.y); nodeDragOffX = cx - s.x; nodeDragOffY = cy - s.y;
        canvas.classList.add('dragging');
      } else {
        isDragging = true; dragStartX = cx; dragStartY = cy; dragVpX = vpX; dragVpY = vpY;
        canvas.classList.add('dragging');
      }
    });

    canvas.addEventListener('mousemove', e => {
      markDirty();
      const { x: cx, y: cy } = canvasXY(e);
      if (nodeDragging) {
        if (Math.hypot(cx - nodeDragStartX, cy - nodeDragStartY) > 5) {
          nodeDragMoved = true;
          const w = screenToWorld(cx - nodeDragOffX, cy - nodeDragOffY);
          nodeDragging.x = w.x; nodeDragging.y = w.y;
        }
        return;
      }
      if (isDragging) {
        vpX = dragVpX + (cx - dragStartX) / vpScale; vpY = dragVpY + (cy - dragStartY) / vpScale; return;
      }
      hoveredNote = noteAt(cx, cy);
      canvas.style.cursor = hoveredNote ? 'pointer' : 'grab';
    });

    canvas.addEventListener('mouseup', e => {
      if (nodeDragging) {
        if (!nodeDragMoved) openNote(nodeDragging); else saveAll();
        nodeDragging = null; nodeDragMoved = false; canvas.classList.remove('dragging'); return;
      }
      if (isDragging) {
        const { x: cx, y: cy } = canvasXY(e);
        if (Math.abs(cx - dragStartX) < 4 && Math.abs(cy - dragStartY) < 4) closePanel();
        isDragging = false; canvas.classList.remove('dragging');
      }
    });

    canvas.addEventListener('dblclick', e => {
      const { x: cx, y: cy } = canvasXY(e);
      // Only create if not double-clicking an existing node
      if (noteAt(cx, cy)) return;
      const w = screenToWorld(cx, cy);
      const note = { id: nextId++, title: '', content: '', tags: [], x: w.x, y: w.y };
      notes.push(note); saveAll(); openNote(note);
      const titleEl = document.getElementById('noteTitle');
      titleEl.focus();
      titleEl.select();
    });

    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      vpScale = Math.max(0.2, Math.min(3, vpScale * (e.deltaY > 0 ? 0.9 : 1.1))); markDirty();
    }, { passive: false });

    // ═══════════════════════════════════════════════════════════════════
    //  NOTE PANEL
    // ═══════════════════════════════════════════════════════════════════
    function openNote(note) {
      selectedNote = note; markDirty();
      document.getElementById('notePanel').classList.add('open');
      document.getElementById('panelNoteId').textContent = `note #${note.id}`;
      document.getElementById('noteTitle').value = note.title || '';
      document.getElementById('noteContent').value = note.content || '';
      autoResize(document.getElementById('noteTitle'));
      renderTagsPanel();
      document.querySelectorAll('.meta-tag').forEach(el =>
        el.classList.toggle('selected', note.tags?.includes(el.dataset.tag)));
      renderLinkList(note);
      const ls = document.getElementById('linkSearch');
      if (ls) { ls.value = ''; closeLinkResults(); }
      // Open in preview if note has content, edit if blank so user can start typing
      setContentMode(note.content && note.content.trim() ? 'preview' : 'edit');
    }

    function closePanel() {
      document.getElementById('notePanel').classList.remove('open');
      selectedNote = null; markDirty();
    }

    function renderLinkList(note) {
      const connected = links
        .filter(l => l.from === note.id || l.to === note.id)
        .map(l => notes.find(n => n.id === (l.from === note.id ? l.to : l.from)))
        .filter(Boolean);
      document.getElementById('linkList').innerHTML = connected.map(n => `
    <div class="link-item" onclick="openNote(notes.find(x=>x.id===${n.id}))">
      <div class="link-dot" style="background:${nodeColor(n)}"></div>
      <span>${n.title || 'Untitled'}</span>
      <span class="link-remove" onclick="event.stopPropagation();removeLink(${note.id},${n.id})">×</span>
    </div>`).join('') ||
        `<div style="font-size:0.8rem;color:var(--ink-dim);font-family:'Cormorant Garamond',serif;font-style:italic;padding:4px 0">No connections yet</div>`;
    }

    function onLinkSearch() {
      if (!selectedNote) return;
      const q = document.getElementById('linkSearch').value.toLowerCase();
      const results = document.getElementById('linkResults');
      const isLinked = id => links.some(l => (l.from === selectedNote.id && l.to === id) || (l.from === id && l.to === selectedNote.id));
      const candidates = notes
        .filter(n => n.id !== selectedNote.id)
        .filter(n => !q || (n.title || 'Untitled').toLowerCase().includes(q));
      if (!candidates.length) {
        results.innerHTML = `<div style="padding:10px 14px;font-size:0.85rem;color:var(--ink-dim);font-family:'Cormorant Garamond',serif;font-style:italic">No notes found</div>`;
        results.classList.add('open'); return;
      }
      results.innerHTML = candidates.slice(0, 10).map(n => {
        const linked = isLinked(n.id);
        return `<div class="link-result-item ${linked ? 'already-linked' : ''}" onmousedown="event.preventDefault();addLinkById(${n.id})">
      <div class="link-dot" style="background:${nodeColor(n)}"></div>
      <span>${n.title || 'Untitled'}</span>
      ${linked ? `<span style="margin-left:auto;font-size:var(--icon-sz);color:var(--cyan);font-family:'JetBrains Mono',monospace">✓</span>` : ''}
    </div>`;
      }).join('');
      results.classList.add('open');
    }

    function closeLinkResults() { document.getElementById('linkResults')?.classList.remove('open'); }

    function addLinkById(toId) {
      if (!selectedNote) return;
      const idx = links.findIndex(l => (l.from === selectedNote.id && l.to === toId) || (l.from === toId && l.to === selectedNote.id));
      if (idx >= 0) links.splice(idx, 1); else links.push({ from: selectedNote.id, to: toId });
      saveAll(); markDirty(); renderLinkList(selectedNote);
      onLinkSearch(); document.getElementById('linkSearch').focus();
    }

    function removeLink(a, b) {
      links = links.filter(l => !((l.from === a && l.to === b) || (l.from === b && l.to === a)));
      saveAll(); markDirty(); if (selectedNote) renderLinkList(selectedNote);
    }

    function autoSave() {
      if (!selectedNote) return;
      selectedNote.title = document.getElementById('noteTitle').value.trim() || 'Untitled';
      selectedNote.content = document.getElementById('noteContent').value;
      selectedNote.tags = [...document.querySelectorAll('.meta-tag.selected')].map(el => el.dataset.tag);
      markDirty(); saveAll();
    }

    function saveNote() { autoSave(); toast('Saved'); }

    let skipDeleteConfirm = localStorage.getItem('garden_skip_delete') === 'true';
    let pendingDelete = false;

    function deleteNote(note) {
      const target = note || selectedNote;
      if (!target) return;
      if (skipDeleteConfirm) {
        doDelete(target); return;
      }
      // Show modal
      pendingDelete = target;
      document.getElementById('modalNoteName').textContent = target.title || 'Untitled';
      const cb = document.getElementById('modalCheckbox');
      cb.classList.toggle('checked', skipDeleteConfirm);
      document.getElementById('deleteModal').classList.add('open');
    }

    function confirmDelete() {
      if (pendingDelete) doDelete(pendingDelete);
      closeDeleteModal();
    }

    function cancelDelete() {
      pendingDelete = false;
      closeDeleteModal();
    }

    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.remove('open');
      pendingDelete = false;
    }

    function toggleSkipConfirm() {
      skipDeleteConfirm = !skipDeleteConfirm;
      localStorage.setItem('garden_skip_delete', String(skipDeleteConfirm));
      document.getElementById('modalCheckbox').classList.toggle('checked', skipDeleteConfirm);
    }

    function doDelete(note) {
      notes = notes.filter(n => n.id !== note.id);
      links = links.filter(l => l.from !== note.id && l.to !== note.id);
      if (selectedNote?.id === note.id) closePanel();
      saveAll(); markDirty(); toast('Note deleted');
    }

    function newNote() {
      const _dpr = window.devicePixelRatio || 1;
      const w = screenToWorld(canvas.width / 2 / _dpr + (Math.random() - 0.5) * 200, canvas.height / 2 / _dpr + (Math.random() - 0.5) * 200);
      const note = { id: nextId++, title: '', content: '', tags: [], x: w.x, y: w.y };
      notes.push(note); saveAll(); openNote(note);
      document.getElementById('noteTitle').focus();
    }

    function resetView() { vpX = 0; vpY = 0; vpScale = 1; markDirty(); }

    // ═══════════════════════════════════════════════════════════════════
    //  MARKDOWN
    // ═══════════════════════════════════════════════════════════════════
    // Set up marked once with a custom renderer for syntax highlighting
    (function () {
      const renderer = new marked.Renderer();
      renderer.code = function (code, lang) {
        // marked v9 passes an object or string depending on version
        const rawCode = typeof code === 'object' ? code.text : code;
        const rawLang = (typeof code === 'object' ? code.lang : lang) || '';
        const validLang = rawLang && hljs.getLanguage(rawLang) ? rawLang : null;
        const highlighted = validLang
          ? hljs.highlight(rawCode, { language: validLang }).value
          : hljs.highlightAuto(rawCode).value;
        const langClass = validLang ? ` class="language-${validLang}"` : '';
        return `<pre><code${langClass}>${highlighted}</code></pre>`;
      };
      marked.use({ renderer, gfm: true, breaks: true });
    })();

    function renderMarkdown(src) {
      if (!src || !src.trim()) return '<span style="font-style:italic;color:var(--ink-dim)">Nothing here yet…</span>';
      return marked.parse(src);
    }

    let contentMode = 'edit';

    function setContentMode(mode, caretPos) {
      contentMode = mode;
      const ta = document.getElementById('noteContent');
      const preview = document.getElementById('mdPreview');
      const btnEdit = document.getElementById('modeEdit');
      const btnPrev = document.getElementById('modePreview');
      if (mode === 'preview') {
        preview.innerHTML = renderMarkdown(ta.value);
        previewSourceMap = buildPreviewSourceMap(ta.value, preview);
        preview.classList.add('active');
        ta.style.display = 'none';
        btnEdit.classList.remove('active');
        btnPrev.classList.add('active');
      } else {
        preview.classList.remove('active');
        ta.style.display = '';
        btnEdit.classList.add('active');
        btnPrev.classList.remove('active');
        ta.focus();
        if (caretPos !== undefined) {
          ta.setSelectionRange(caretPos, caretPos);
        }
      }
    }

    // previewSourceMap[renderedCharIndex] = sourceCharIndex
    // Rebuilt each time setContentMode('preview') is called.
    let previewSourceMap = [];

    function buildPreviewSourceMap(src, previewEl) {
      const rendered = previewEl.textContent;
      const map = [];
      let si = 0;
      for (let ri = 0; ri < rendered.length; ri++) {
        const rc = rendered[ri];
        const rcWs = /\s/.test(rc);
        while (si < src.length) {
          const sc = src[si];
          if (sc === rc || (rcWs && /\s/.test(sc))) break;
          si++;
        }
        map.push(si);
        if (si < src.length) si++;
      }
      return map;
    }
    function previewPointToTextOffset(cx, cy) {
      let domNode = null, domOffset = 0;
      if (document.caretRangeFromPoint) {
        const r = document.caretRangeFromPoint(cx, cy);
        if (r) { domNode = r.startContainer; domOffset = r.startOffset; }
      } else if (document.caretPositionFromPoint) {
        const p = document.caretPositionFromPoint(cx, cy);
        if (p) { domNode = p.offsetNode; domOffset = p.offset; }
      }
      if (!domNode || !previewSourceMap.length) return null;

      // Count rendered plain-text characters before the click point
      const preview = document.getElementById('mdPreview');
      const walker = document.createTreeWalker(preview, NodeFilter.SHOW_TEXT);
      let renderedIdx = 0;
      let node;
      while ((node = walker.nextNode())) {
        if (node === domNode) {
          renderedIdx += domOffset;
          break;
        }
        renderedIdx += node.textContent.length;
      }

      if (renderedIdx < previewSourceMap.length) return previewSourceMap[renderedIdx];
      return previewSourceMap[previewSourceMap.length - 1] ?? null;
    }

    // Wire preview click: resolve caret position while preview is still visible,
    // then switch to edit and place cursor there
    document.getElementById('mdPreview').addEventListener('click', function (e) {
      const pos = previewPointToTextOffset(e.clientX, e.clientY);
      setContentMode('edit', pos ?? document.getElementById('noteContent').value.length);
    });

    // ═══════════════════════════════════════════════════════════════════
    //  PANEL RESIZE
    // ═══════════════════════════════════════════════════════════════════
    (function () {
      const handle = document.getElementById('panelResize');
      const panel = document.getElementById('notePanel');
      let resizing = false, startX = 0, startW = 0;

      handle.addEventListener('mousedown', e => {
        resizing = true; startX = e.clientX;
        startW = panel.offsetWidth;
        handle.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });

      document.addEventListener('mousemove', e => {
        if (!resizing) return;
        const delta = startX - e.clientX;
        const newW = Math.max(280, Math.min(700, startW + delta));
        panel.style.width = newW + 'px';
      });

      document.addEventListener('mouseup', () => {
        if (!resizing) return;
        resizing = false;
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      });
    })();

    function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    document.getElementById('searchInput').addEventListener('input', markDirty);
    document.addEventListener('click', e => {
      if (!e.target.closest('.garden-switcher') && !e.target.closest('.garden-popup'))
        document.getElementById('gardenPopup').classList.remove('open');
      if (!e.target.closest('.link-search-wrap')) closeLinkResults();
      // Close delete modal on backdrop click
      if (e.target.id === 'deleteModal') cancelDelete();
    });

    document.addEventListener('keydown', e => {
      // Backspace on a selected note (not while typing in an input/textarea)
      if (e.key === 'Backspace' || e.key === 'Delete') {
        const tag = document.activeElement.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA') return;
        if (selectedNote) { e.preventDefault(); deleteNote(selectedNote); }
      }
      // Escape closes modal or panel
      if (e.key === 'Escape') {
        if (document.getElementById('deleteModal').classList.contains('open')) { cancelDelete(); return; }
        closePanel();
      }
    });

    // ═══════════════════════════════════════════════════════════════════
    //  THEME
    // ═══════════════════════════════════════════════════════════════════
    let currentTheme = localStorage.getItem('garden_theme') || 'dark';

    function applyTheme(theme) {
      currentTheme = theme;
      if (theme === 'light') {
        document.documentElement.classList.add('light');
        document.getElementById('themeBtn').textContent = '○';
        document.getElementById('themeBtn').title = 'Switch to dark';
      } else {
        document.documentElement.classList.remove('light');
        document.getElementById('themeBtn').textContent = '☽';
        document.getElementById('themeBtn').title = 'Switch to light';
      }
      localStorage.setItem('garden_theme', theme);
      markDirty();
    }

    function toggleTheme() {
      applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
    }

    applyTheme(currentTheme);
    initColorMode();

    // ── close garden delete modal on backdrop click ──────────────────
    document.getElementById('gardenDeleteModal').addEventListener('click', e => {
      if (e.target.id === 'gardenDeleteModal') cancelGardenDelete();
    });

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    draw();
  </script>
</body>

</html>
