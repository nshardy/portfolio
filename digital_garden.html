    // ═══════════════════════════════════════════════════════════════════
    //  COORDINATE HELPERS
    // ═══════════════════════════════════════════════════════════════════
    function worldToScreen(x, y) {
      const dpr = window.devicePixelRatio || 1;
      return { x: (x + vpX) * vpScale + canvas.width / 2 / dpr, y: (y + vpY) * vpScale + canvas.height / 2 / dpr };
    }
    function screenToWorld(x, y) {
      const dpr2 = window.devicePixelRatio || 1;
      return { x: (x - canvas.width / 2 / dpr2) / vpScale - vpX, y: (y - canvas.height / 2 / dpr2) / vpScale - vpY };
    }
    function nodeRadius(note) {
      return 10 + links.filter(l => l.from === note.id || l.to === note.id).length * 3;
    }
    function canvasXY(e) {
      const r = canvas.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }
    function boxContaining(wx, wy) {
      for (let i = boxes.length - 1; i >= 0; i--) {
        const b = boxes[i];
        if (wx >= b.x && wx <= b.x + b.w && wy >= b.y && wy <= b.y + b.h) return b;
      }
      return null;
    }

    function boxAt(cx, cy) {
      // Returns {box, edge} if on a resize handle of selected box, else {box} if inside, else null
      for (let i = boxes.length - 1; i >= 0; i--) {
        const b = boxes[i];
        const tl = worldToScreen(b.x, b.y);
        const br = worldToScreen(b.x + b.w, b.y + b.h);
        const sw = br.x - tl.x, sh = br.y - tl.y;
        const mx = tl.x + sw / 2, my = tl.y + sh / 2;
        const hSz = 8;
        if (selectedBox?.id === b.id) {
          const handles = [
            { x: tl.x, y: tl.y, e: 'nw' }, { x: mx, y: tl.y, e: 'n' }, { x: br.x, y: tl.y, e: 'ne' },
            { x: tl.x, y: my, e: 'w' }, { x: br.x, y: my, e: 'e' },
            { x: tl.x, y: br.y, e: 'sw' }, { x: mx, y: br.y, e: 's' }, { x: br.x, y: br.y, e: 'se' }
          ];
          for (const h of handles) {
            if (Math.abs(cx - h.x) < hSz && Math.abs(cy - h.y) < hSz)
              return { box: b, edge: h.e };
          }
        }
        if (cx >= tl.x && cx <= br.x && cy >= tl.y && cy <= br.y)
          return { box: b, edge: null };
      }
      return null;
    }

    function boxCursor(edge) {
      const map = {
        nw: 'nw-resize', ne: 'ne-resize', sw: 'sw-resize', se: 'se-resize',
        n: 'n-resize', s: 's-resize', e: 'e-resize', w: 'w-resize'
      };
      return map[edge] || 'move';
    }

    function noteAt(cx, cy) {
      for (const n of [...notes].reverse()) {
        const s = worldToScreen(n.x, n.y);
        if (Math.hypot(s.x - cx, s.y - cy) < nodeRadius(n) * vpScale + 4) return n;
      }
      return null;
    }

    // ═══════════════════════════════════════════════════════════════════
    //  RENDER
    // ═══════════════════════════════════════════════════════════════════
    function resizeCanvas() {
      const r = canvas.parentElement.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = r.width * dpr;
      canvas.height = r.height * dpr;
      canvas.style.width = r.width + 'px';
      canvas.style.height = r.height + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      markDirty();
    }


    function markDirty() { dirty = true; }

    function draw() {
      if (dirty) {
        dirty = false;
        const lw = canvas.width / (window.devicePixelRatio || 1);
        const lh = canvas.height / (window.devicePixelRatio || 1);
        ctx.clearRect(0, 0, lw, lh);
        const q = document.getElementById('searchInput').value.toLowerCase();

        // ── Box-to-box connections ──────────────────────────────────
        boxLinks.forEach(l => {
          const a = boxes.find(b => b.id === l.from), b = boxes.find(b => b.id === l.to);
          if (!a || !b) return;
          const ac = worldToScreen(a.x + a.w / 2, a.y + a.h / 2);
          const bc = worldToScreen(b.x + b.w / 2, b.y + b.h / 2);
          const grad = ctx.createLinearGradient(ac.x, ac.y, bc.x, bc.y);
          grad.addColorStop(0, boxColor(a) + '99');
          grad.addColorStop(1, boxColor(b) + '99');
          ctx.beginPath(); ctx.moveTo(ac.x, ac.y); ctx.lineTo(bc.x, bc.y);
          ctx.strokeStyle = grad; ctx.lineWidth = 1.5;
          ctx.setLineDash([6, 3]); ctx.stroke(); ctx.setLineDash([]);
        });

        // ── Annotation boxes (drawn behind everything) ────────────
        boxes.forEach(b => {
          const tl = worldToScreen(b.x, b.y);
          const br = worldToScreen(b.x + b.w, b.y + b.h);
          const sw = br.x - tl.x, sh = br.y - tl.y;
          const isSel = selectedBox?.id === b.id;
          const isLight = document.documentElement.classList.contains('light');
          const bqMatch = !q || (b.title || 'Untitled Section').toLowerCase().includes(q);
          const btMatch = !activeTags.size || [...activeTags].every(t => (b.tags || []).includes(t));
          const bDimmed = !bqMatch || !btMatch;
          ctx.globalAlpha = bDimmed ? 0.08 : 1;
          // Fill
          ctx.beginPath(); ctx.rect(tl.x, tl.y, sw, sh);
          ctx.fillStyle = boxColor(b) + (isLight ? '18' : '14');
          ctx.fill();
          // Border
          ctx.strokeStyle = boxColor(b) + (isSel ? 'cc' : '55');
          ctx.lineWidth = isSel ? 1.5 : 1;
          ctx.setLineDash(isSel ? [] : [6, 4]);
          ctx.stroke(); ctx.setLineDash([]);
          // Title inline with top border
          if (b.title && vpScale > 0.3) {
            const fs = Math.max(9, Math.min(14, 12 * vpScale));
            ctx.font = `${fs}px "JetBrains Mono",monospace`;
            ctx.textAlign = 'left';
            const pad = 8;
            const tw = ctx.measureText(b.title).width;
            ctx.fillStyle = isLight ? 'rgba(248,244,235,0.92)' : 'rgba(11,11,18,0.88)';
            ctx.fillRect(tl.x + pad - 2, tl.y - fs / 2 - 1, tw + 8, fs + 2);
            ctx.fillStyle = boxColor(b);
            ctx.fillText(b.title, tl.x + pad, tl.y + fs * 0.35);
          }
          // Resize handles (8 corners + edges) when selected
          if (isSel) {
            const hSz = 6;
            const mx = tl.x + sw / 2, my = tl.y + sh / 2;
            [
              { x: tl.x, y: tl.y, e: 'nw' }, { x: mx, y: tl.y, e: 'n' }, { x: br.x, y: tl.y, e: 'ne' },
              { x: tl.x, y: my, e: 'w' }, { x: br.x, y: my, e: 'e' },
              { x: tl.x, y: br.y, e: 'sw' }, { x: mx, y: br.y, e: 's' }, { x: br.x, y: br.y, e: 'se' }
            ].forEach(h => {
              ctx.beginPath();
              ctx.rect(h.x - hSz / 2, h.y - hSz / 2, hSz, hSz);
              ctx.fillStyle = boxColor(b);
              ctx.strokeStyle = isLight ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.3)';
              ctx.lineWidth = 1;
              ctx.fill(); ctx.stroke();
            });
          }
          ctx.globalAlpha = 1;
        });

        links.forEach(l => {
          const f = notes.find(n => n.id === l.from), t = notes.find(n => n.id === l.to);
          if (!f || !t) return;
          const fs = worldToScreen(f.x, f.y), ts = worldToScreen(t.x, t.y);
          const sel = selectedNote && (selectedNote.id === l.from || selectedNote.id === l.to);
          ctx.beginPath(); ctx.moveTo(fs.x, fs.y); ctx.lineTo(ts.x, ts.y);
          const lLight = document.documentElement.classList.contains('light');
          ctx.strokeStyle = sel ? 'rgba(0,120,120,0.4)' : (lLight ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.07)');
          ctx.lineWidth = sel ? 1.5 : 1; ctx.stroke();
        });

        notes.forEach(n => {
          const s = worldToScreen(n.x, n.y);
          const r = nodeRadius(n) * vpScale;
          const color = nodeColor(n);
          const isSel = selectedNote?.id === n.id || selectedNotes.has(n.id);
          const isMultiSel = selectedNotes.has(n.id);
          const isHov = hoveredNote?.id === n.id;
          const qMatch = !q || n.title.toLowerCase().includes(q) || (n.content || '').toLowerCase().includes(q);
          const tMatch = !activeTags.size || [...activeTags].every(t => (n.tags || []).includes(t));
          const dimmed = !qMatch || !tMatch;
          ctx.globalAlpha = dimmed ? 0.15 : 1;
          if (isSel || isHov) {
            const grd = ctx.createRadialGradient(s.x, s.y, r, s.x, s.y, r * 3);
            grd.addColorStop(0, color + '40'); grd.addColorStop(1, 'transparent');
            ctx.beginPath(); ctx.arc(s.x, s.y, r * 3, 0, Math.PI * 2); ctx.fillStyle = grd; ctx.fill();
          }
          if (colorMode === 'arc' && n.tags && n.tags.length > 1) {
            drawArcNode(ctx, s.x, s.y, r, n.tags.map(tagColor), isSel);
          } else {
            ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
            ctx.fillStyle = isSel ? color : color + '33'; ctx.fill();
          }
          ctx.strokeStyle = isSel ? color : color + 'aa';
          ctx.lineWidth = isSel ? 2 : 1; ctx.stroke();
          if (isMultiSel) {
            ctx.beginPath(); ctx.arc(s.x, s.y, r + 4, 0, Math.PI * 2);
            ctx.strokeStyle = '#ffffff55'; ctx.lineWidth = 1.5;
            ctx.setLineDash([3, 3]); ctx.stroke(); ctx.setLineDash([]);
          }
          if (vpScale > 0.4) {
            const isLight = document.documentElement.classList.contains('light');
            ctx.fillStyle = dimmed
              ? (isLight ? '#a09cba' : '#4e4a62')
              : (isSel ? (isLight ? '#1c1a26' : '#dcd8f0') : (isLight ? '#5a5670' : '#8a859e'));
            const fs2 = Math.max(9, Math.min(13, 11 * vpScale));
            ctx.font = `${fs2}px "JetBrains Mono",monospace`; ctx.textAlign = 'center';
            const label = n.title.length > 20 ? n.title.slice(0, 18) + '…' : n.title;
            ctx.fillText(label, s.x, s.y + r + 14 * vpScale);
          }
          ctx.globalAlpha = 1;
        });
        // Box-select overlay
        if (isBoxSelecting) {
          const isLight = document.documentElement.classList.contains('light');
          ctx.beginPath();
          ctx.rect(
            Math.min(boxSelStartX, boxSelCurX), Math.min(boxSelStartY, boxSelCurY),
            Math.abs(boxSelCurX - boxSelStartX), Math.abs(boxSelCurY - boxSelStartY)
          );
          ctx.fillStyle = isLight ? 'rgba(0,100,100,0.06)' : 'rgba(0,170,170,0.08)';
          ctx.fill();
          ctx.strokeStyle = isLight ? 'rgba(0,100,100,0.4)' : 'rgba(0,170,170,0.5)';
          ctx.lineWidth = 1;
          ctx.setLineDash([4, 3]); ctx.stroke(); ctx.setLineDash([]);
        }
        drawMinimap();
      }
      requestAnimationFrame(draw);
    }

    // minimap world->mini coords (shared between draw and click handler)
    let _miniSc = 1, _miniOx = 0, _miniOy = 0;

    function drawMinimap() {
      const W = miniCanvas.width = 140, H = miniCanvas.height = 90;
      const mLight = document.documentElement.classList.contains('light');
      miniCtx.clearRect(0, 0, W, H); miniCtx.fillStyle = mLight ? '#eceae4' : '#10101a'; miniCtx.fillRect(0, 0, W, H);
      const allItems = [...notes.map(n => ({ x: n.x, y: n.y })),
      ...boxes.map(b => ({ x: b.x, y: b.y })), ...boxes.map(b => ({ x: b.x + b.w, y: b.y + b.h }))];
      if (!allItems.length) return;
      const xs = allItems.map(p => p.x), ys = allItems.map(p => p.y);
      const minX = Math.min(...xs) - 60, maxX = Math.max(...xs) + 60;
      const minY = Math.min(...ys) - 60, maxY = Math.max(...ys) + 60;
      const sc = Math.min(W / (maxX - minX), H / (maxY - minY)) * 0.85;
      const ox = W / 2 - (minX + maxX) / 2 * sc, oy = H / 2 - (minY + maxY) / 2 * sc;
      _miniSc = sc; _miniOx = ox; _miniOy = oy;
      // Draw boxes
      boxes.forEach(b => {
        const tx = b.x * sc + ox, ty = b.y * sc + oy;
        const bw = b.w * sc, bh = b.h * sc;
        miniCtx.beginPath(); miniCtx.rect(tx, ty, bw, bh);
        miniCtx.fillStyle = boxColor(b) + '22'; miniCtx.fill();
        miniCtx.strokeStyle = boxColor(b) + '88'; miniCtx.lineWidth = 0.5; miniCtx.stroke();
        // Title
        if (b.title && bw > 20) {
          miniCtx.fillStyle = boxColor(b);
          miniCtx.font = '5px "JetBrains Mono",monospace';
          miniCtx.textAlign = 'left';
          miniCtx.fillText(b.title.slice(0, 18), tx + 2, ty + 6);
        }
      });
      links.forEach(l => {
        const f = notes.find(n => n.id === l.from), t = notes.find(n => n.id === l.to);
        if (!f || !t) return;
        miniCtx.beginPath(); miniCtx.moveTo(f.x * sc + ox, f.y * sc + oy); miniCtx.lineTo(t.x * sc + ox, t.y * sc + oy);
        miniCtx.strokeStyle = mLight ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.08)'; miniCtx.lineWidth = 0.5; miniCtx.stroke();
      });
      notes.forEach(n => {
        miniCtx.beginPath(); miniCtx.arc(n.x * sc + ox, n.y * sc + oy, 3, 0, Math.PI * 2);
        miniCtx.fillStyle = nodeColor(n) + 'cc'; miniCtx.fill();
      });
    }

    // Minimap click: centre canvas on clicked world position,
    // or open box panel if clicked inside a box
    miniCanvas.addEventListener('click', e => {
      const rect = miniCanvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left) * (miniCanvas.width / rect.width);
      const my = (e.clientY - rect.top) * (miniCanvas.height / rect.height);
      // Convert minimap px -> world coords
      const wx = (mx - _miniOx) / _miniSc;
      const wy = (my - _miniOy) / _miniSc;
      // Check if click lands inside a box (reverse order = topmost first)
      for (let i = boxes.length - 1; i >= 0; i--) {
        const b = boxes[i];
        if (wx >= b.x && wx <= b.x + b.w && wy >= b.y && wy <= b.y + b.h) {
          // Centre canvas on box centre
          vpX = -(b.x + b.w / 2); vpY = -(b.y + b.h / 2);
          saveViewport(); markDirty();
          openBoxPanel(b);
          return;
        }
      }
      // Otherwise just centre on click point
      vpX = -wx; vpY = -wy;
      saveViewport(); markDirty();
    });

    // ═══════════════════════════════════════════════════════════════════
    //  CANVAS INTERACTION
    // ═══════════════════════════════════════════════════════════════════
    canvas.addEventListener('mousedown', e => {
      markDirty();
      const { x: cx, y: cy } = canvasXY(e);
      const noteHit = noteAt(cx, cy);
      if (noteHit) {
        if (e.metaKey || e.ctrlKey) {
          if (selectedNotes.has(noteHit.id)) selectedNotes.delete(noteHit.id);
          else selectedNotes.add(noteHit.id);
          selectedNote = selectedNotes.size === 1 ? notes.find(n => n.id === [...selectedNotes][0]) : null;
          markDirty(); return;
        }
        selectedNotes.clear();
        nodeDragging = noteHit; nodeDragMoved = false; nodeDragStartX = cx; nodeDragStartY = cy;
        const s = worldToScreen(noteHit.x, noteHit.y); nodeDragOffX = cx - s.x; nodeDragOffY = cy - s.y;
        canvas.classList.add('dragging');
        return;
      }
      const boxHit = boxAt(cx, cy);
      if (boxHit) {
        if (boxHit.edge) {
          // Start resize
          boxResizeHandle = boxHit;
          boxResizeStartX = cx; boxResizeStartY = cy;
          boxResizeOrigX = boxHit.box.x; boxResizeOrigY = boxHit.box.y;
          boxResizeOrigW = boxHit.box.w; boxResizeOrigH = boxHit.box.h;
          canvas.classList.add('dragging');
        } else {
          // Start move
          boxDragging = boxHit.box; boxDragMoved = false;
          boxDragStartX = cx; boxDragStartY = cy;
          const tl = worldToScreen(boxHit.box.x, boxHit.box.y);
          boxDragOffX = cx - tl.x; boxDragOffY = cy - tl.y;
          canvas.classList.add('dragging');
        }
        return;
      }
      lastMousedownSelection = new Set(selectedNotes);
      if (e.metaKey || e.ctrlKey) {
        isBoxSelecting = true; boxSelStartX = cx; boxSelStartY = cy; boxSelCurX = cx; boxSelCurY = cy;
        canvas.classList.add('dragging');
      } else {
        selectedNotes.clear();
        isDragging = true; dragStartX = cx; dragStartY = cy; dragVpX = vpX; dragVpY = vpY;
        canvas.classList.add('dragging');
      }
    });

    canvas.addEventListener('mousemove', e => {
      markDirty();
      const { x: cx, y: cy } = canvasXY(e);
      if (boxResizeHandle) {
        const b = boxResizeHandle.box;
        const dw = screenToWorld(cx, cy);
        const d0 = screenToWorld(boxResizeStartX, boxResizeStartY);
        const dx = dw.x - d0.x, dy = dw.y - d0.y;
        const edge = boxResizeHandle.edge;
        if (edge.includes('e')) b.w = Math.max(40, boxResizeOrigW + dx);
        if (edge.includes('s')) b.h = Math.max(40, boxResizeOrigH + dy);
        if (edge.includes('w')) { b.x = boxResizeOrigX + dx; b.w = Math.max(40, boxResizeOrigW - dx); }
        if (edge.includes('n')) { b.y = boxResizeOrigY + dy; b.h = Math.max(40, boxResizeOrigH - dy); }
        updateBoxPosFields();
        return;
      }
      if (boxDragging) {
        if (Math.hypot(cx - boxDragStartX, cy - boxDragStartY) > 4) {
          if (!boxDragMoved) {
            // Record note offsets relative to box origin on first move
            boxDragging._noteOffsets = notes
              .filter(n => n.boxId === boxDragging.id)
              .map(n => ({ note: n, dx: n.x - boxDragging.x, dy: n.y - boxDragging.y }));
          }
          boxDragMoved = true;
          const w = screenToWorld(cx - boxDragOffX, cy - boxDragOffY);
          boxDragging.x = w.x; boxDragging.y = w.y;
          // Move sticky notes with the box
          if (boxDragging._noteOffsets) {
            boxDragging._noteOffsets.forEach(({ note, dx, dy }) => {
              note.x = boxDragging.x + dx;
              note.y = boxDragging.y + dy;
            });
          }
          updateBoxPosFields();
        }
        return;
      }
      if (nodeDragging) {
        if (Math.hypot(cx - nodeDragStartX, cy - nodeDragStartY) > 5) {
          nodeDragMoved = true;
          const w = screenToWorld(cx - nodeDragOffX, cy - nodeDragOffY);
          nodeDragging.x = w.x; nodeDragging.y = w.y;
          if (selectedNote?.id === nodeDragging.id) updatePosFields();
        }
        return;
      }
      if (isBoxSelecting) {
        boxSelCurX = cx; boxSelCurY = cy; return;
      }
      if (isDragging) {
        vpX = dragVpX + (cx - dragStartX) / vpScale; vpY = dragVpY + (cy - dragStartY) / vpScale;
        saveViewport(); return;
      }
      hoveredNote = noteAt(cx, cy);
      if (e.metaKey || e.ctrlKey) { canvas.style.cursor = 'crosshair'; return; }
      if (hoveredNote) { canvas.style.cursor = 'pointer'; return; }
      const bh = boxAt(cx, cy);
      canvas.style.cursor = bh ? boxCursor(bh.edge) : 'grab';
    });

    canvas.addEventListener('mouseup', e => {
      if (boxResizeHandle) {
        saveAll(); markDirty();
        boxResizeHandle = null; canvas.classList.remove('dragging'); return;
      }
      if (boxDragging) {
        if (!boxDragMoved) {
          openBoxPanel(boxDragging);
        } else {
          delete boxDragging._noteOffsets;
          saveAll();
        }
        boxDragging = null; boxDragMoved = false; canvas.classList.remove('dragging'); return;
      }
      if (nodeDragging) {
        if (!nodeDragMoved) {
          if (selectedNotes.size === 0) openNote(nodeDragging);
        } else {
          // Assign note to whatever section it now sits inside
          const containing = boxContaining(nodeDragging.x, nodeDragging.y);
          nodeDragging.boxId = containing ? containing.id : null;
          saveAll();
          if (selectedBox) { renderBoxNotesList(selectedBox); }
        }
        nodeDragging = null; nodeDragMoved = false; canvas.classList.remove('dragging'); return;
      }
      if (isBoxSelecting) {
        // Select all notes whose world position falls inside the box
        const wx0 = Math.min(boxSelStartX, boxSelCurX), wx1 = Math.max(boxSelStartX, boxSelCurX);
        const wy0 = Math.min(boxSelStartY, boxSelCurY), wy1 = Math.max(boxSelStartY, boxSelCurY);
        const w0 = screenToWorld(wx0, wy0), w1 = screenToWorld(wx1, wy1);
        notes.forEach(n => {
          if (n.x >= w0.x && n.x <= w1.x && n.y >= w0.y && n.y <= w1.y) selectedNotes.add(n.id);
        });
        selectedNote = selectedNotes.size === 1 ? notes.find(n => n.id === [...selectedNotes][0]) : null;
        isBoxSelecting = false; canvas.classList.remove('dragging'); markDirty(); return;
      }
      if (isDragging) {
        const { x: cx, y: cy } = canvasXY(e);
        if (Math.abs(cx - dragStartX) < 4 && Math.abs(cy - dragStartY) < 4) closeAllPanels();
        isDragging = false; canvas.classList.remove('dragging');
      }
    });

    canvas.addEventListener('dblclick', e => {
      const { x: cx, y: cy } = canvasXY(e);
      if (noteAt(cx, cy)) return;  // double-clicking a note does nothing extra
      if (e.metaKey || e.ctrlKey) return;  // cmd+dblclick reserved for box-select, no note creation
      const w = screenToWorld(cx, cy);
      const containing = boxContaining(w.x, w.y);
      const note = { id: nextId++, title: '', content: '', tags: [], x: w.x, y: w.y, boxId: containing?.id || null };
      notes.push(note);
      const connectTo = lastMousedownSelection.size ? lastMousedownSelection : selectedNotes;
      connectTo.forEach(sid => {
        if (!links.find(l => (l.from === sid && l.to === note.id) || (l.from === note.id && l.to === sid)))
          links.push({ from: sid, to: note.id });
      });
      selectedNotes.clear(); lastMousedownSelection.clear();
      saveAll(); openNote(note);
      const titleEl = document.getElementById('noteTitle');
      titleEl.focus(); titleEl.select();
    });

    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      vpScale = Math.max(0.2, Math.min(3, vpScale * (e.deltaY > 0 ? 0.9 : 1.1))); saveViewport(); markDirty();
    }, { passive: false });

    // ═══════════════════════════════════════════════════════════════════
    //  NOTE PANEL
    // ═══════════════════════════════════════════════════════════════════
    function openNote(note) {
      // Close box panel if open
      document.getElementById('boxPanel').classList.remove('open');
      selectedBox = null;
      selectedNote = note; markDirty();
      document.getElementById('notePanel').classList.add('open');
      document.getElementById('panelNoteId').textContent = `note #${note.id}`;
      document.getElementById('noteTitle').value = note.title || '';
      if (cmInstance) setCMValue(note.content || '');
      else document.addEventListener('cmReady', () => setCMValue(note.content || ''), { once: true });
      autoResize(document.getElementById('noteTitle'));
      renderTagsPanel();
      document.querySelectorAll('.meta-tag').forEach(el =>
        el.classList.toggle('selected', note.tags?.includes(el.dataset.tag)));
      renderLinkList(note);
      const ls = document.getElementById('linkSearch');
      if (ls) { ls.value = ''; closeLinkResults(); }
      // Open in preview if note has content, edit if blank so user can start typing
      setContentMode('preview');
      posLocked = true;
      document.getElementById('posLock').textContent = '🔒';
      document.getElementById('posLock').classList.remove('unlocked');
      document.getElementById('posX').disabled = true;
      document.getElementById('posY').disabled = true;
      updatePosFields();
      applyAcAttrs();
    }

    // ── Position widget ─────────────────────────────────────────────────
    let posLocked = true;

    function togglePosLock() {
      posLocked = !posLocked;
      const btn = document.getElementById('posLock');
      const px = document.getElementById('posX');
      const py = document.getElementById('posY');
      btn.textContent = posLocked ? '🔒' : '🔓';
      btn.classList.toggle('unlocked', !posLocked);
      px.disabled = posLocked;
      py.disabled = posLocked;
      if (!posLocked) px.focus();
    }

    function updatePosFields() {
      if (!selectedNote) return;
      const px = document.getElementById('posX');
      const py = document.getElementById('posY');
      // Only update if not currently being edited to avoid cursor jump
      if (document.activeElement !== px)
        px.value = parseFloat(selectedNote.x.toFixed(2));
      if (document.activeElement !== py)
        py.value = parseFloat(selectedNote.y.toFixed(2));
    }

    // Wire inputs: commit position on change, clamp and save
    document.getElementById('posX').addEventListener('input', () => {
      if (!selectedNote || posLocked) return;
      const v = parseFloat(document.getElementById('posX').value);
      if (isFinite(v)) { selectedNote.x = v; markDirty(); }
    });
    document.getElementById('posY').addEventListener('input', () => {
      if (!selectedNote || posLocked) return;
      const v = parseFloat(document.getElementById('posY').value);
      if (isFinite(v)) { selectedNote.y = v; markDirty(); }
    });
    // Save on blur/enter
    ['posX', 'posY'].forEach(id => {
      const el = document.getElementById(id);
      el.addEventListener('blur', () => { if (!posLocked) saveAll(); });
      el.addEventListener('keydown', e => { if (e.key === 'Enter') { el.blur(); } });
    });

    function closePanel() {
      document.getElementById('notePanel').classList.remove('open');
      selectedNote = null; markDirty();
    }

    function closeAllPanels() {
      document.getElementById('notePanel').classList.remove('open');
      document.getElementById('boxPanel').classList.remove('open');
      selectedNote = null; selectedBox = null; markDirty();
    }

    function renderLinkList(note) {
      const connected = links
        .filter(l => l.from === note.id || l.to === note.id)
        .map(l => notes.find(n => n.id === (l.from === note.id ? l.to : l.from)))
        .filter(Boolean);
      document.getElementById('linkList').innerHTML = connected.map(n => `
    <div class="link-item" onclick="openNote(notes.find(x=>x.id===${n.id}))">
      <div class="link-dot" style="background:${nodeColor(n)}"></div>
      <span>${n.title || 'Untitled'}</span>
      <span class="link-remove" onclick="event.stopPropagation();removeLink(${note.id},${n.id})">×</span>
    </div>`).join('') ||
        `<div style="font-size:0.8rem;color:var(--ink-dim);font-family:'Cormorant Garamond',serif;font-style:italic;padding:4px 0">No connections yet</div>`;
    }

    function onLinkSearch() {
      if (!selectedNote) return;
      const q = document.getElementById('linkSearch').value.toLowerCase();
      const results = document.getElementById('linkResults');
      const isLinked = id => links.some(l => (l.from === selectedNote.id && l.to === id) || (l.from === id && l.to === selectedNote.id));
      const candidates = notes
        .filter(n => n.id !== selectedNote.id)
        .filter(n => !q || (n.title || 'Untitled').toLowerCase().includes(q));
      if (!candidates.length) {
        results.innerHTML = `<div style="padding:10px 14px;font-size:0.85rem;color:var(--ink-dim);font-family:'Cormorant Garamond',serif;font-style:italic">No notes found</div>`;
        results.classList.add('open'); return;
      }
      results.innerHTML = candidates.slice(0, 10).map(n => {
        const linked = isLinked(n.id);
        return `<div class="link-result-item ${linked ? 'already-linked' : ''}" onmousedown="event.preventDefault();addLinkById(${n.id})">
      <div class="link-dot" style="background:${nodeColor(n)}"></div>
      <span>${n.title || 'Untitled'}</span>
      ${linked ? `<span style="margin-left:auto;font-size:var(--icon-sz);color:var(--cyan);font-family:'JetBrains Mono',monospace">✓</span>` : ''}
    </div>`;
      }).join('');
      results.classList.add('open');
    }

    function closeLinkResults() { document.getElementById('linkResults')?.classList.remove('open'); }

    function addLinkById(toId) {
      if (!selectedNote) return;
      const idx = links.findIndex(l => (l.from === selectedNote.id && l.to === toId) || (l.from === toId && l.to === selectedNote.id));
      if (idx >= 0) links.splice(idx, 1); else links.push({ from: selectedNote.id, to: toId });
      saveAll(); markDirty(); renderLinkList(selectedNote);
      onLinkSearch(); document.getElementById('linkSearch').focus();
    }

    function removeLink(a, b) {
      links = links.filter(l => !((l.from === a && l.to === b) || (l.from === b && l.to === a)));
      saveAll(); markDirty(); if (selectedNote) renderLinkList(selectedNote);
    }

    function autoSave() {
      if (!selectedNote) return;
      selectedNote.title = document.getElementById('noteTitle').value.trim() || 'Untitled';
      selectedNote.content = getCMValue();
      selectedNote.tags = [...document.querySelectorAll('.meta-tag.selected')].map(el => el.dataset.tag);
      markDirty(); saveAll();
    }

    function saveNote() { autoSave(); toast('Saved'); }

    let skipDeleteConfirm = localStorage.getItem('garden_skip_delete') === 'true';
    let pendingDelete = false;

    function deleteNote(note) {
      const target = note || selectedNote;
      if (!target) return;
      if (skipDeleteConfirm) {
        doDelete(target); return;
      }
      // Show modal
      pendingDelete = target;
      document.getElementById('modalNoteName').textContent = target.title || 'Untitled';
      const cb = document.getElementById('modalCheckbox');
      cb.classList.toggle('checked', skipDeleteConfirm);
      document.getElementById('deleteModal').classList.add('open');
    }

    function confirmDelete() {
      if (pendingDelete?._multi) {
        pendingDelete.ids.forEach(id => { const n = notes.find(x => x.id === id); if (n) doDelete(n); });
        selectedNotes.clear();
      } else if (pendingDelete) {
        doDelete(pendingDelete);
      }
      closeDeleteModal();
    }

    function cancelDelete() {
      pendingDelete = false;
      closeDeleteModal();
    }

    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.remove('open');
      pendingDelete = false;
    }

    function toggleSkipConfirm() {
      skipDeleteConfirm = !skipDeleteConfirm;
      localStorage.setItem('garden_skip_delete', String(skipDeleteConfirm));
      document.getElementById('modalCheckbox').classList.toggle('checked', skipDeleteConfirm);
    }

    function doDelete(note) {
      notes = notes.filter(n => n.id !== note.id);
      links = links.filter(l => l.from !== note.id && l.to !== note.id);
      if (selectedNote?.id === note.id) closePanel();
      saveAll(); markDirty(); toast('Note deleted');
    }

    function deleteMultiSelected() {
      const ids = [...selectedNotes];
      if (skipDeleteConfirm) {
        ids.forEach(id => { const n = notes.find(x => x.id === id); if (n) doDelete(n); });
        selectedNotes.clear(); markDirty(); return;
      }
      pendingDelete = { _multi: true, ids };
      const count = ids.length;
      document.getElementById('modalNoteName').textContent =
        count === 1 ? (notes.find(n => n.id === ids[0])?.title || 'Untitled') : `${count} notes`;
      document.getElementById('modalCheckbox').classList.toggle('checked', skipDeleteConfirm);
      document.getElementById('deleteModal').classList.add('open');
    }

    // ── Box panel ────────────────────────────────────────────────────
    let boxPosLocked = true;

    let boxNewTagColor = SWATCH_COLORS[0];

    function openBoxNewTagForm() {
      const form = document.getElementById('boxNewTagForm');
      form.classList.add('open');
      document.getElementById('boxNewTagSwatches').innerHTML = SWATCH_COLORS.map(col =>
        `<span class="color-swatch ${col === boxNewTagColor ? 'selected' : ''}" style="background:${col}"
      onclick="boxNewTagColor='${col}';openBoxNewTagForm()"></span>`).join('');
      document.getElementById('boxNewTagName').focus();
    }

    function closeBoxNewTagForm() {
      document.getElementById('boxNewTagForm').classList.remove('open');
      document.getElementById('boxNewTagName').value = '';
    }

    function createBoxTag() {
      const raw = document.getElementById('boxNewTagName').value.trim().toLowerCase().replace(/\s+/g, '-');
      if (!raw) return;
      if (allTags().find(t => t.id === raw)) { toast('Tag already exists'); return; }
      const tag = { id: raw, label: raw, color: boxNewTagColor };
      customTags.push(tag);
      closeBoxNewTagForm();
      renderFilterBar(); renderLegend();
      if (selectedBox) { renderBoxTags(selectedBox); }
      saveAll();
      toast(`Tag "${raw}" created`);
    }

    function renderBoxTags(box) {
      document.getElementById('boxPanelMeta').innerHTML =
        allTags().map(t => `
      <div class="meta-tag ${(box.tags || []).includes(t.id) ? 'selected' : ''}"
           data-tag="${t.id}" style="--tag-color:${t.color}" onclick="toggleBoxTag('${t.id}')">
        <span class="tag-dot"></span>${t.label}
      </div>`).join('') +
        `<button class="meta-tag-add" onclick="openBoxNewTagForm()">+ tag</button>`;
    }

    function toggleBoxTag(tagId) {
      if (!selectedBox) return;
      if (!selectedBox.tags) selectedBox.tags = [];
      const idx = selectedBox.tags.indexOf(tagId);
      if (idx >= 0) selectedBox.tags.splice(idx, 1);
      else selectedBox.tags.push(tagId);
      renderBoxTags(selectedBox);
      saveAll(); markDirty();
    }

    function updateBoxPosFields() {
      if (!selectedBox) return;
      const px = document.getElementById('boxPosX');
      const py = document.getElementById('boxPosY');
      const pw = document.getElementById('boxPosW');
      const ph = document.getElementById('boxPosH');
      if (document.activeElement !== px) px.value = parseFloat(selectedBox.x.toFixed(2));
      if (document.activeElement !== py) py.value = parseFloat(selectedBox.y.toFixed(2));
      if (document.activeElement !== pw) pw.value = parseFloat(selectedBox.w.toFixed(2));
      if (document.activeElement !== ph) ph.value = parseFloat(selectedBox.h.toFixed(2));
    }

    function toggleBoxPosLock() {
      boxPosLocked = !boxPosLocked;
      const btn = document.getElementById('boxPosLock');
      btn.textContent = boxPosLocked ? '🔒' : '🔓';
      btn.classList.toggle('unlocked', !boxPosLocked);
      ['boxPosX', 'boxPosY', 'boxPosW', 'boxPosH'].forEach(id =>
        document.getElementById(id).disabled = boxPosLocked);
      if (!boxPosLocked) document.getElementById('boxPosX').focus();
    }

    ['boxPosX', 'boxPosY', 'boxPosW', 'boxPosH'].forEach(id => {
      const el = document.getElementById(id);
      el.addEventListener('input', () => {
        if (!selectedBox || boxPosLocked) return;
        const v = parseFloat(el.value);
        if (!isFinite(v)) return;
        if (id === 'boxPosX') selectedBox.x = v;
        if (id === 'boxPosY') selectedBox.y = v;
        if (id === 'boxPosW') selectedBox.w = Math.max(40, v);
        if (id === 'boxPosH') selectedBox.h = Math.max(40, v);
        markDirty();
      });
      el.addEventListener('blur', () => { if (!boxPosLocked) saveAll(); });
      el.addEventListener('keydown', e => { if (e.key === 'Enter') el.blur(); });
    });

    function openBoxPanel(box) {
      // Close note panel
      document.getElementById('notePanel').classList.remove('open');
      selectedNote = null;
      selectedBox = box;
      markDirty();
      document.getElementById('boxPanel').classList.add('open');
      document.getElementById('boxPanelId').textContent = `box #${box.id}`;
      document.getElementById('boxTitle').value = box.title || '';
      boxPosLocked = true;
      document.getElementById('boxPosLock').textContent = '🔒';
      document.getElementById('boxPosLock').classList.remove('unlocked');
      ['boxPosX', 'boxPosY', 'boxPosW', 'boxPosH'].forEach(id =>
        document.getElementById(id).disabled = true);
      updateBoxPosFields();
      renderBoxTags(box);
      renderBoxNotesList(box);
      renderBoxConnections(box);
      document.getElementById('boxLinkSearch').value = '';
      closeBoxLinkResults();
    }

    function renderBoxNotesList(box) {
      const inside = notes.filter(n => n.boxId === box.id);
      document.getElementById('boxNotesList').innerHTML = inside.length
        ? inside.map(n => `
        <div class="link-item" onclick="openNote(notes.find(x=>x.id===${n.id}))">
          <div class="link-dot" style="background:${nodeColor(n)}"></div>
          <span>${n.title || 'Untitled'}</span>
        </div>`).join('')
        : `<span style="font-size:0.5rem;color:var(--ink-dim);font-family:'JetBrains Mono',monospace">No notes inside</span>`;
    }

    function renderBoxConnections(box) {
      const connected = boxLinks
        .filter(l => l.from === box.id || l.to === box.id)
        .map(l => boxes.find(b => b.id === (l.from === box.id ? l.to : l.from)))
        .filter(Boolean);
      document.getElementById('boxConnectionsList').innerHTML = connected.length
        ? connected.map(b => `
        <div class="link-item" onclick="openBoxPanel(boxes.find(x=>x.id===${b.id}))">
          <div class="link-dot" style="background:${boxColor(b)}"></div>
          <span>${b.title || 'Untitled Section'}</span>
          <span class="link-remove" onclick="event.stopPropagation();removeBoxLink(${box.id},${b.id})">×</span>
        </div>`).join('')
        : `<span style="font-size:0.5rem;color:var(--ink-dim);font-family:'JetBrains Mono',monospace">No connections</span>`;
    }

    function removeBoxLink(a, b) {
      boxLinks = boxLinks.filter(l => !((l.from === a && l.to === b) || (l.from === b && l.to === a)));
      if (selectedBox) renderBoxConnections(selectedBox);
      saveAll(); markDirty();
    }

    function addBoxLink(targetId) {
      if (!selectedBox || targetId === selectedBox.id) return;
      const idx = boxLinks.findIndex(l => (l.from === selectedBox.id && l.to === targetId) || (l.from === targetId && l.to === selectedBox.id));
      if (idx >= 0) boxLinks.splice(idx, 1); else boxLinks.push({ from: selectedBox.id, to: targetId });
      renderBoxConnections(selectedBox);
      onBoxLinkSearch(); // refresh dropdown to update ✓
      saveAll(); markDirty();
    }

    function onBoxLinkSearch() {
      if (!selectedBox) return;
      const q = document.getElementById('boxLinkSearch').value.toLowerCase();
      const res = document.getElementById('boxLinkResults');
      const isLinked = id => boxLinks.some(l => (l.from === selectedBox.id && l.to === id) || (l.from === id && l.to === selectedBox.id));
      const candidates = boxes
        .filter(b => b.id !== selectedBox.id)
        .filter(b => !q || (b.title || 'Untitled Section').toLowerCase().includes(q));
      if (!candidates.length) {
        res.innerHTML = `<div style="padding:10px 14px;font-size:0.85rem;color:var(--ink-dim);font-family:'Cormorant Garamond',serif;font-style:italic">No sections found</div>`;
        res.classList.add('open'); return;
      }
      res.innerHTML = candidates.slice(0, 10).map(b => {
        const linked = isLinked(b.id);
        return `<div class="link-result-item ${linked ? 'already-linked' : ''}" onmousedown="event.preventDefault();addBoxLink(${b.id})">
      <div class="link-dot" style="background:${b.color}"></div>
      <span>${b.title || 'Untitled Section'}</span>
      ${linked ? `<span style="margin-left:auto;font-size:var(--icon-sz);color:var(--cyan);font-family:'JetBrains Mono',monospace">✓</span>` : ''}
    </div>`;
      }).join('');
      res.classList.add('open');
    }

    function closeBoxLinkResults() {
      const r = document.getElementById('boxLinkResults');
      r.classList.remove('open'); r.innerHTML = '';
    }

    // Close box link results on outside click
    document.addEventListener('click', e => {
      if (!e.target.closest('#boxLinkSearch') && !e.target.closest('#boxLinkResults'))
        closeBoxLinkResults();
    });

    function closeBoxPanel() {
      document.getElementById('boxPanel').classList.remove('open');
      selectedBox = null; markDirty();
    }

    function autoSaveBox() {
      if (!selectedBox) return;
      selectedBox.title = document.getElementById('boxTitle').value;
      markDirty(); saveAll();
    }

    function deleteBox() {
      if (!selectedBox) return;
      boxes = boxes.filter(b => b.id !== selectedBox.id);
      closeBoxPanel(); saveAll(); markDirty();
      toast('Box deleted');
    }

    function newBox() {
      const dpr = window.devicePixelRatio || 1;
      const cx = canvas.width / 2 / dpr, cy = canvas.height / 2 / dpr;
      const tl = screenToWorld(cx - 100, cy - 80);
      const box = {
        id: nextId++, title: 'New Section',
        color: '#4e4a62',
        x: tl.x, y: tl.y, w: 300, h: 200, tags: []
      };
      boxes.push(box); saveAll(); openBoxPanel(box);
      document.getElementById('boxTitle').select();
    }

    function newNote() {
      const _dpr = window.devicePixelRatio || 1;
      const w = screenToWorld(canvas.width / 2 / _dpr + (Math.random() - 0.5) * 200, canvas.height / 2 / _dpr + (Math.random() - 0.5) * 200);
      const containing2 = boxContaining(w.x, w.y);
      const note = { id: nextId++, title: '', content: '', tags: [], x: w.x, y: w.y, boxId: containing2?.id || null };
      notes.push(note); saveAll(); openNote(note);
      document.getElementById('noteTitle').focus();
    }

    function saveViewport() {
      if (currentGardenId && gardens[currentGardenId])
        gardens[currentGardenId].viewport = { vpX, vpY, vpScale };
      // Debounced localStorage write
      clearTimeout(saveViewport._t);
      saveViewport._t = setTimeout(saveAll, 400);
    }

    function resetView() {
      if (!notes.length) { vpX = 0; vpY = 0; vpScale = 1; markDirty(); return; }
      const dpr = window.devicePixelRatio || 1;
      const cw = canvas.width / dpr, ch = canvas.height / dpr;
      const xs = notes.map(n => n.x), ys = notes.map(n => n.y);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
      const pad = 100;
      const rangeX = maxX - minX + pad * 2 || pad * 2;
      const rangeY = maxY - minY + pad * 2 || pad * 2;
      // Scale to fit all notes, accounting for node radius
      const nodeR = 24; // generous node radius buffer in world units
      vpScale = Math.min(3, Math.max(0.15, Math.min(cw / (rangeX + nodeR * 2), ch / (rangeY + nodeR * 2))));
      // Centre on bounding box midpoint, not centroid, so outliers aren't cut off
      vpX = -cx; vpY = -cy;
      saveViewport(); markDirty();
    }

    // ═══════════════════════════════════════════════════════════════════
    //  MARKDOWN
    // ═══════════════════════════════════════════════════════════════════
    // Set up marked once with a custom renderer for syntax highlighting
    (function () {
      const renderer = new marked.Renderer();
      renderer.code = function (code, lang) {
        // marked v9 passes an object or string depending on version
        const rawCode = typeof code === 'object' ? code.text : code;
        const rawLang = (typeof code === 'object' ? code.lang : lang) || '';
        const validLang = rawLang && hljs.getLanguage(rawLang) ? rawLang : null;
        const highlighted = validLang
          ? hljs.highlight(rawCode, { language: validLang }).value
          : hljs.highlightAuto(rawCode).value;
        const langClass = validLang ? ` class="language-${validLang}"` : '';
        return `<pre><code${langClass}>${highlighted}</code></pre>`;
      };
      marked.use({ renderer, gfm: true, breaks: true });
    })();

    function renderMarkdown(src) {
      if (!src || !src.trim()) return '<span style="font-style:italic;color:var(--ink-dim)">Nothing here yet…</span>';
      return marked.parse(src);
    }

    // ═══════════════════════════════════════════════════════════════════
    //  CODEMIRROR EDITOR
    // ═══════════════════════════════════════════════════════════════════
    let cmInstance = null;

    function initCM() {
      const el = document.getElementById('cmEditor');
      cmInstance = CodeMirror(el, {
        mode: { name: 'markdown', fencedCodeBlockHighlighting: true, highlightFormatting: true },
        theme: 'garden',
        lineWrapping: true,
        autofocus: false,
        indentWithTabs: false,
        extraKeys: { "Enter": "newlineAndIndentContinueMarkdownList" },
        placeholder: 'Write anything…',
      });
      cmInstance.on('change', () => {
        if (selectedNote) {
          selectedNote.content = cmInstance.getValue();
          saveAll();
        }
        renderCMWidgets();
        scheduleCMHighlight();
      });
      // fence styling on 'change' only
      // Fit CM to container height
      cmInstance.setSize('100%', '100%');
    }

    // ── CM widgets: checkboxes + clickable links ────────────────────────
    const _cmMarks = [];
    let _cmWidgetTimer = null;
    const _cmEditingLines = new Set(); // lines where user is editing raw syntax
    function renderCMWidgets() {
      clearTimeout(_cmWidgetTimer);
      _cmWidgetTimer = setTimeout(_doRenderCMWidgets, 80);
    }
    function _doRenderCMWidgets() {
      if (!cmInstance) return;
      // Clear previous marks
      _cmMarks.forEach(m => { try { m.clear(); } catch (e) { } });
      _cmMarks.length = 0;
      const doc = cmInstance.getDoc();
      const lineCount = doc.lineCount();
      for (let i = 0; i < lineCount; i++) {
        if (_cmEditingLines.has(i)) continue; // user is editing raw syntax here
        const text = doc.getLine(i);
        // Task list checkboxes: "- [ ] " or "- [x] "
        const cbMatch = text.match(/^(\s*[-*+]\s+)(\[([ xX])\])(\s)/);
        if (cbMatch) {
          const start = cbMatch[1].length;
          const end = start + cbMatch[2].length;
          const checked = cbMatch[3].toLowerCase() === 'x';
          const el = document.createElement('input');
          el.type = 'checkbox'; el.checked = checked;
          el.className = 'cm-task-checkbox';
          el.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); });
          el.addEventListener('click', e => {
            e.preventDefault();
            const line = doc.getLine(i);
            const newLine = el.checked
              ? line.replace(/\[[ ]\]/, '[x]')
              : line.replace(/\[[xX]\]/, '[ ]');
            doc.replaceRange(newLine, { line: i, ch: 0 }, { line: i, ch: line.length });
          });
          const mark = doc.markText(
            { line: i, ch: start }, { line: i, ch: end },
            { replacedWith: el, handleMouseEvents: true }
          );
          _cmMarks.push(mark);
        }
        // Transclusion: ![[Note Title]] or ![[Note Title#Heading]]
        // Use addLineWidget (not replacedWith) so CM knows the widget height
        // and cursor mapping stays correct for all lines below.
        const transRe = /!\[\[([^\]]+)\]\]/g;
        let tm;
        while ((tm = transRe.exec(text)) !== null) {
          const fullStart = tm.index;
          const fullEnd = fullStart + tm[0].length;
          const ref = tm[1];
          const hashIdx = ref.indexOf('#');
          const noteTitle = hashIdx >= 0 ? ref.slice(0, hashIdx) : ref;
          const heading = hashIdx >= 0 ? ref.slice(hashIdx + 1) : null;
          const target = notes.find(n => n.title === noteTitle);

          // Build the card
          const wrap = document.createElement('div');
          wrap.className = 'cm-transclude';
          const header = document.createElement('div');
          header.className = 'cm-transclude-header';
          header.innerHTML = `<span class="tc-icon">⎘</span>${noteTitle}${heading ? ` <span style="opacity:.6">#${heading}</span>` : ''}`;
          wrap.appendChild(header);
          const body = document.createElement('div');
          if (target) {
            let content = target.content || '';
            if (heading) {
              const contentLines = content.split('\n');
              const slugify = h => h.toLowerCase().replace(/[_-]/g, ' ').replace(/[^a-z0-9 ]/g, '').trim();
              const slug = slugify(heading);
              let inSection = false, sectionLines = [], headingLevel = 0;
              for (const ln of contentLines) {
                const hm = ln.match(/^(#{1,6})\s+(.+)/);
                if (hm) {
                  const lvl = hm[1].length, title = slugify(hm[2]);
                  if (!inSection && title === slug) { inSection = true; headingLevel = lvl; sectionLines.push(ln); }
                  else if (inSection && lvl <= headingLevel) break;
                  else if (inSection) sectionLines.push(ln);
                } else if (inSection) sectionLines.push(ln);
              }
              content = sectionLines.length ? sectionLines.join('\n') : '*(Heading not found)*';
            }
            body.className = 'cm-transclude-body';
            body.innerHTML = renderMarkdown(content);
            // Prevent transclusion scroll from bubbling to CM
            body.addEventListener('wheel', e => e.stopPropagation(), { passive: true });
          } else {
            body.className = 'cm-transclude-missing';
            body.textContent = `Note "${noteTitle}" not found`;
          }
          wrap.appendChild(body);

          // Hide the raw ![[...]] syntax with a zero-width mark
          const hideMark = doc.markText(
            { line: i, ch: fullStart }, { line: i, ch: fullEnd },
            { collapsed: true, handleMouseEvents: false }
          );
          _cmMarks.push(hideMark);

          // Add a proper line widget below the (now-hidden) syntax line
          const lineWidget = cmInstance.addLineWidget(i, wrap, {
            handleMouseEvents: true,
            noHScroll: true,
            above: false,
          });
          // Store as a pseudo-mark object so _cmMarks.forEach(m=>m.clear()) works
          _cmMarks.push({ clear: () => { lineWidget.clear(); hideMark.clear(); }, find: () => ({ from: { line: i, ch: fullStart } }) });

          // Cmd+click opens note; plain click exposes raw syntax
          wrap.addEventListener('click', e => {
            e.preventDefault(); e.stopPropagation();
            if (e.metaKey || e.ctrlKey) { if (target) openNote(target); return; }
            // Expose raw syntax: clear the hide mark and widget
            hideMark.clear();
            lineWidget.clear();
            const idx = _cmMarks.findIndex(m => { try { return m.find && m.find()?.from?.line === i; } catch (e) { return false; } });
            if (idx >= 0) _cmMarks.splice(idx, 1);
            cmInstance.focus(); cmInstance.setCursor({ line: i, ch: fullStart });
            _cmEditingLines.add(i);
            const onCursor = () => {
              if (cmInstance.getCursor().line !== i) {
                cmInstance.off('cursorActivity', onCursor); cmInstance.off('blur', onCursor);
                _cmEditingLines.delete(i);
                renderCMWidgets();
              }
            };
            cmInstance.on('cursorActivity', onCursor); cmInstance.on('blur', onCursor);
          });
          wrap.addEventListener('mousedown', e => e.stopPropagation());
        }

        // Wikilinks: [[Note Title]] or [[Note Title#Heading]]
        // Must not be preceded by ! (those are handled as transclusions above)
        const wikiRe = /(?<!!)\[\[([^\]]+)\]\]/g;
        let wm;
        while ((wm = wikiRe.exec(text)) !== null) {
          const fullStart = wm.index;
          const fullEnd = fullStart + wm[0].length;
          const ref = wm[1];
          const hashIdx = ref.indexOf('#');
          const noteTitle = hashIdx >= 0 ? ref.slice(0, hashIdx) : ref;
          const heading = hashIdx >= 0 ? ref.slice(hashIdx + 1) : null;
          const target = notes.find(n => n.title === noteTitle);

          const span = document.createElement('span');
          span.textContent = heading ? `${noteTitle} › ${heading}` : noteTitle;
          span.className = 'cm-wikilink' + (target ? '' : ' missing');
          span.title = target ? `Cmd+click to open "${noteTitle}"` : `Note "${noteTitle}" not found`;

          span.addEventListener('click', e => {
            e.preventDefault(); e.stopPropagation();
            if (e.metaKey || e.ctrlKey) {
              if (!target) return;
              openNote(target);
              // Scroll to heading after note opens
              if (heading) {
                setTimeout(() => {
                  if (!cmInstance) return;
                  const slugify2 = h => h.toLowerCase().replace(/[_-]/g, ' ').replace(/[^a-z0-9 ]/g, '').trim();
                  const slug = slugify2(heading);
                  const d = cmInstance.getDoc();
                  for (let ln = 0; ln < d.lineCount(); ln++) {
                    const txt = slugify2(d.getLine(ln).replace(/^#+\s*/, ''));
                    if (txt === slug) {
                      cmInstance.scrollIntoView({ line: ln, ch: 0 }, 40);
                      cmInstance.setCursor({ line: ln, ch: 0 });
                      return;
                    }
                  }
                }, 120); // wait for openNote to load content
              }
              return;
            }
            // Plain click: expose raw syntax for editing
            const pos = wikilinkMark.find();
            if (pos) {
              wikilinkMark.clear();
              _cmMarks.splice(_cmMarks.indexOf(wikilinkMark), 1);
              cmInstance.focus();
              cmInstance.setCursor(pos.from);
              const editLine = pos.from.line;
              _cmEditingLines.add(editLine);
              const onCursor = () => {
                if (cmInstance.getCursor().line !== editLine) {
                  cmInstance.off('cursorActivity', onCursor);
                  cmInstance.off('blur', onCursor);
                  _cmEditingLines.delete(editLine);
                  renderCMWidgets();
                }
              };
              cmInstance.on('cursorActivity', onCursor);
              cmInstance.on('blur', onCursor);
            }
          });
          span.addEventListener('mousedown', e => e.stopPropagation());

          let wikilinkMark;
          wikilinkMark = doc.markText(
            { line: i, ch: fullStart }, { line: i, ch: fullEnd },
            { replacedWith: span, handleMouseEvents: true }
          );
          _cmMarks.push(wikilinkMark);
        }

        // Inline links: [text](url) — make the visible text cyan + underline

        const linkRe = /\[([^\]]+)\]\(([^)]+)\)/g;
        let lm;
        while ((lm = linkRe.exec(text)) !== null) {
          const fullStart = lm.index;
          const fullEnd = fullStart + lm[0].length;
          const label = lm[1], url = lm[2];
          const span = document.createElement('span');
          span.textContent = label;
          span.className = 'cm-link-widget';
          span.title = url;
          span.addEventListener('click', e => {
            e.preventDefault(); e.stopPropagation();
            if (e.metaKey || e.ctrlKey) {
              // Cmd+click: follow the link
              if (url.startsWith('http')) { window.open(url, '_blank', 'noopener'); return; }
              if (url.startsWith('#')) {
                const slugify3 = h => h.toLowerCase().replace(/[_-]/g, ' ').replace(/[^a-z0-9 ]/g, '').trim();
                const slug = slugify3(url.slice(1));
                const doc = cmInstance.getDoc();
                for (let ln = 0; ln < doc.lineCount(); ln++) {
                  const txt = slugify3(doc.getLine(ln).replace(/^#+\s*/, ''));
                  if (txt === slug) {
                    cmInstance.scrollIntoView({ line: ln, ch: 0 }, 40);
                    cmInstance.setCursor({ line: ln, ch: 0 });
                    return;
                  }
                }
              }
              // Cmd+click on note link
              const target = notes.find(n => n.title === label || n.title === url);
              if (target) { openNote(target); return; }
              return;
            }
            // Regular click: clear this mark so raw markdown is exposed for editing
            const pos = mark.find();
            if (pos) {
              mark.clear();
              _cmMarks.splice(_cmMarks.indexOf(mark), 1);
              cmInstance.focus();
              cmInstance.setCursor(pos.from);
              // Re-render when cursor leaves this line (click away or arrow key)
              const editLine = pos.from.line;
              _cmEditingLines.add(editLine);
              const onCursor = () => {
                if (cmInstance.getCursor().line !== editLine) {
                  cmInstance.off('cursorActivity', onCursor);
                  cmInstance.off('blur', onCursor);
                  _cmEditingLines.delete(editLine);
                  renderCMWidgets();
                }
              };
              cmInstance.on('cursorActivity', onCursor);
              cmInstance.on('blur', onCursor);
            }
          });
          let mark;
          mark = doc.markText(
            { line: i, ch: fullStart }, { line: i, ch: fullEnd },
            { replacedWith: span, handleMouseEvents: true }
          );
          _cmMarks.push(mark);
        }
      }
    }

    // Track fenced code block lines and add background class
    let _hlTimer = null;
    function fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      try { document.execCommand('copy'); } catch (e) { }
      document.body.removeChild(ta);
    }

    function scheduleCMHighlight() {
      clearTimeout(_hlTimer);
      _hlTimer = setTimeout(applyFencedCodeStyling, 400);
    }

    // Fence copy-button widgets
    const _fenceWidgets = [];

    function applyFencedCodeStyling() {
      if (!cmInstance) return;
      _fenceWidgets.forEach(w => { try { w.clear(); } catch (e) { } });
      _fenceWidgets.length = 0;
      const doc = cmInstance.getDoc();
      let inFence = false, fenceLang = '';
      for (let i = 0; i < doc.lineCount(); i++) {
        const text = doc.getLine(i);
        const fm = text.trim().match(/^```(\w*)$/);
        if (fm && !inFence) {
          inFence = true; fenceLang = fm[1] || 'code';
          cmInstance.addLineClass(i, 'text', 'cm-fenced-code-open');
          cmInstance.removeLineClass(i, 'text', 'cm-fenced-code');
          cmInstance.removeLineClass(i, 'text', 'cm-fenced-code-close');
          // Replace the entire fence open line with a header widget
          ; (function (lineIdx, lang) {
            const header = document.createElement('div');
            header.className = 'cm-fence-header-widget';
            const langEl = document.createElement('span');
            langEl.textContent = lang || 'code';
            langEl.className = 'cm-fence-lang';
            const btn = document.createElement('button');
            btn.className = 'cm-fence-copy';
            btn.textContent = 'copy';
            btn.addEventListener('mousedown', function (e) { e.stopPropagation(); });
            btn.addEventListener('click', function (e) {
              e.stopPropagation(); e.preventDefault();
              let body = [], j = lineIdx + 1;
              while (j < doc.lineCount() && !doc.getLine(j).trim().startsWith('```')) {
                body.push(doc.getLine(j++));
              }
              var text = body.join('\n');
              if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).catch(function () { fallbackCopy(text); });
              } else { fallbackCopy(text); }
              btn.textContent = 'copied!';
              setTimeout(function () { btn.textContent = 'copy'; }, 1500);
            });
            header.appendChild(langEl);
            header.appendChild(btn);
            const lineLen = doc.getLine(lineIdx).length;
            const m = doc.markText(
              { line: lineIdx, ch: 0 }, { line: lineIdx, ch: lineLen },
              { replacedWith: header, handleMouseEvents: true }
            );
            _fenceWidgets.push({ clear: function () { m.clear(); } });
          })(i, fenceLang);
        } else if (fm && inFence) {
          inFence = false;
          cmInstance.addLineClass(i, 'text', 'cm-fenced-code-close');
          cmInstance.removeLineClass(i, 'text', 'cm-fenced-code');
          cmInstance.removeLineClass(i, 'text', 'cm-fenced-code-open');
        } else if (inFence) {
          cmInstance.addLineClass(i, 'text', 'cm-fenced-code');
          cmInstance.removeLineClass(i, 'text', 'cm-fenced-code-open');
          cmInstance.removeLineClass(i, 'text', 'cm-fenced-code-close');
        } else {
          cmInstance.removeLineClass(i, 'text', 'cm-fenced-code');
          cmInstance.removeLineClass(i, 'text', 'cm-fenced-code-open');
          cmInstance.removeLineClass(i, 'text', 'cm-fenced-code-close');
        }
      }
    }

    function setCMValue(val) {
      if (!cmInstance) return;
      cmInstance.setValue(val || '');
      cmInstance.clearHistory();
      renderCMWidgets();
      applyFencedCodeStyling();
    }

    function getCMValue() {
      return cmInstance ? cmInstance.getValue() : '';
    }

    // AC toggle wired to CM
    let acEnabled = localStorage.getItem('garden_ac') !== 'false';

    function toggleAutocorrect() {
      acEnabled = !acEnabled;
      localStorage.setItem('garden_ac', String(acEnabled));
      applyAcAttrs();
      document.getElementById('acBtn').classList.toggle('active', acEnabled);
    }

    function applyAcAttrs() {
      if (!cmInstance) return;
      const ta = cmInstance.getInputField();
      const on = acEnabled ? 'on' : 'off';
      ta.setAttribute('spellcheck', String(acEnabled));
      ta.setAttribute('autocorrect', on);
      ta.setAttribute('autocapitalize', acEnabled ? 'sentences' : 'off');
    }

    function initAcBtn() {
      document.getElementById('acBtn').classList.toggle('active', acEnabled);
      // CM is not ready yet at this point — applyAcAttrs called after initCM
    }

    // setContentMode is a no-op now — CM handles everything
    function setContentMode() { }


    // ═══════════════════════════════════════════════════════════════════
    //  PANEL RESIZE
    // ═══════════════════════════════════════════════════════════════════
    // Note panel resize
    (function () {
      const handle = document.getElementById('panelResize');
      const panel = document.getElementById('notePanel');
      let resizing = false, startX = 0, startW = 0;

      handle.addEventListener('mousedown', e => {
        resizing = true; startX = e.clientX;
        startW = panel.offsetWidth;
        handle.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });

      document.addEventListener('mousemove', e => {
        if (!resizing) return;
        const delta = startX - e.clientX;
        const newW = Math.max(280, Math.min(700, startW + delta));
        panel.style.width = newW + 'px';
      });

      document.addEventListener('mouseup', () => {
        if (!resizing) return;
        resizing = false;
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      });
    })();

    // Box panel resize
    (function () {
      const handle = document.getElementById('boxPanelResize');
      const panel = document.getElementById('boxPanel');
      let resizing = false, startX = 0, startW = 0;
      handle.addEventListener('mousedown', e => {
        resizing = true; startX = e.clientX; startW = panel.offsetWidth;
        handle.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });
      document.addEventListener('mousemove', e => {
        if (!resizing) return;
        panel.style.width = Math.max(280, Math.min(700, startW + (startX - e.clientX))) + 'px';
      });
      document.addEventListener('mouseup', () => {
        if (!resizing) return;
        resizing = false; handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      });
    })();

    function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    document.getElementById('searchInput').addEventListener('input', markDirty);
    document.addEventListener('click', e => {
      if (!e.target.closest('.garden-switcher') && !e.target.closest('.garden-popup'))
        document.getElementById('gardenPopup').classList.remove('open');
      if (!e.target.closest('.link-search-wrap')) closeLinkResults();
      // Close delete modal on backdrop click
      if (e.target.id === 'deleteModal') cancelDelete();
    });

    document.addEventListener('keydown', e => {
      // Cmd/Ctrl+A — select all notes (not while editing)
      if ((e.metaKey || e.ctrlKey) && e.key === 'a') {
        const tag = document.activeElement.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA') return;
        e.preventDefault();
        notes.forEach(n => selectedNotes.add(n.id));
        selectedNote = null;
        markDirty(); return;
      }
      // Backspace on a selected note (not while typing in an input/textarea)
      if (e.key === 'Backspace' || e.key === 'Delete') {
        const tag = document.activeElement.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA') return;
        if (selectedNotes.size > 0) { e.preventDefault(); deleteMultiSelected(); return; }
        if (selectedNote) { e.preventDefault(); deleteNote(selectedNote); }
      }
      // Escape closes modal or panel
      if (e.key === 'Escape') {
        if (document.getElementById('deleteModal').classList.contains('open')) { cancelDelete(); return; }
        closeAllPanels();
      }
    });

    // ═══════════════════════════════════════════════════════════════════
    //  THEME
    // ═══════════════════════════════════════════════════════════════════
    let currentTheme = localStorage.getItem('garden_theme') || 'dark';

    function applyTheme(theme) {
      currentTheme = theme;
      if (theme === 'light') {
        document.documentElement.classList.add('light');
        document.getElementById('themeBtn').textContent = '○';
        document.getElementById('themeBtn').title = 'Switch to dark';
      } else {
        document.documentElement.classList.remove('light');
        document.getElementById('themeBtn').textContent = '☽';
        document.getElementById('themeBtn').title = 'Switch to light';
      }
      localStorage.setItem('garden_theme', theme);
      markDirty();
    }

    function toggleTheme() {
      applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
    }

    applyTheme(currentTheme);
    initColorMode();
    initAcBtn();
    initCM();
    applyAcAttrs();
    document.dispatchEvent(new Event('cmReady'));

    // ── close garden delete modal on backdrop click ──────────────────
    document.getElementById('gardenDeleteModal').addEventListener('click', e => {
      if (e.target.id === 'gardenDeleteModal') cancelGardenDelete();
    });

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    draw();
  </script>
</body>
