<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garden — Digital Notes</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0b0b12;
      --surface: #10101a;
      --lift: #16162a;
      --border: rgba(255, 255, 255, 0.07);
      --ink: #dcd8f0;
      --ink-mid: #8a859e;
      --ink-dim: #4e4a62;
      --cyan: #00AAAA;
      --purple: #8b7fcf;
      --green: #4ec994;
      --yellow: #c9a96e;
      --red: #e0786a;
      --icon-sz: 0.75rem;
    }

    * {
      font-feature-settings: "liga" 1, "calt" 1;
    }

    html.light {
      --bg: #f4f2ee;
      --surface: #eceae4;
      --lift: #e2dfd8;
      --border: rgba(0, 0, 0, 0.09);
      --ink: #1c1a26;
      --ink-mid: #5a5670;
      --ink-dim: #a09cba;
      --cyan: #007a7a;
      --purple: #6b5fbf;
      --green: #2e8f5e;
      --yellow: #a07830;
      --red: #c0503e;
    }

    /* THEME TOGGLE */
    .theme-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--ink-mid);
      padding: 7px 14px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.12em;
    }

    .theme-btn:hover {
      color: var(--cyan);
      border-color: var(--cyan);
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9000;
      opacity: 0.3;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    }

    /* TOPBAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 50px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      z-index: 100;
      position: relative;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: var(--cyan);
    }

    .garden-switcher {
      display: flex;
      align-items: center;
    }

    .garden-name-btn {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 300;
      color: var(--ink);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .garden-name-btn:hover {
      border-bottom-color: var(--purple);
    }

    .garden-dropdown-btn {
      background: none;
      border: none;
      color: var(--ink-dim);
      cursor: pointer;
      font-size: var(--icon-sz);
      padding: 2px 6px;
      transition: color 0.2s;
    }

    .garden-dropdown-btn:hover {
      color: var(--ink);
    }

    /* TAG FILTER BAR */
    .tag-filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 20px;
      height: 0;
      overflow: visible;
      background: var(--surface);
      border-bottom: 0px solid var(--border);
      transition: height 0.2s, padding 0.2s, border-width 0.2s;
      flex-shrink: 0;
      position: relative;
      z-index: 40;
    }

    .tag-filter-bar.has-tags {
      height: 36px;
      border-bottom-width: 1px;
    }

    .filter-label {
      font-size: 0.44rem;
      letter-spacing: 0.15em;
      color: var(--ink-dim);
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .filter-dropdown-wrap {
      position: relative;
    }

    .filter-dropdown-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.44rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border: 1px solid var(--border);
      background: none;
      color: var(--ink-dim);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-dropdown-btn:hover {
      color: var(--ink);
      border-color: var(--ink-dim);
    }

    .filter-dropdown-btn.active {
      color: var(--cyan);
      border-color: var(--cyan);
    }

    .filter-dropdown-btn .fdb-arrow {
      font-size: 0.5rem;
    }

    .filter-active-chips {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-wrap: nowrap;
      overflow: hidden;
    }

    .filter-chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.44rem;
      letter-spacing: 0.08em;
      padding: 2px 6px;
      border: 1px solid var(--ftag-color);
      color: var(--ftag-color);
      background: transparent;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .filter-chip:hover {
      background: rgba(0, 0, 0, 0.1);
    }

    .filter-chip .chip-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .filter-chip .chip-x {
      opacity: 0.6;
      margin-left: 2px;
    }

    .filter-clear {
      font-size: 0.44rem;
      color: var(--ink-dim);
      cursor: pointer;
      padding: 2px 6px;
      border: none;
      background: none;
      font-family: 'JetBrains Mono', monospace;
      transition: color 0.15s;
      white-space: nowrap;
    }

    .filter-clear:hover {
      color: var(--red);
    }

    .filter-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 300;
      background: var(--lift);
      border: 1px solid var(--border);
      min-width: 180px;
      max-height: 260px;
      overflow-y: auto;
      display: none;
      flex-direction: column;
    }

    .filter-dropdown.open {
      display: flex;
    }

    .filter-dropdown::-webkit-scrollbar {
      width: 3px;
    }

    .filter-dropdown::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    .filter-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      cursor: pointer;
      transition: background 0.15s;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.44rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-mid);
      border: none;
      background: none;
      text-align: left;
      width: 100%;
    }

    .filter-option:hover {
      background: var(--surface);
      color: var(--ink);
    }

    .filter-option.active {
      color: var(--ftag-color);
    }

    .filter-option .fo-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .filter-option .fo-check {
      margin-left: auto;
      font-size: 0.6rem;
      color: var(--ftag-color);
    }

    /* GARDEN POPUP */
    .garden-popup {
      position: absolute;
      top: 54px;
      left: 20px;
      z-index: 300;
      background: var(--surface);
      border: 1px solid var(--border);
      width: 280px;
      display: none;
    }

    .garden-popup.open {
      display: block;
    }

    .garden-popup-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.44rem;
      letter-spacing: 0.15em;
      color: var(--ink-dim);
      text-transform: uppercase;
    }

    .garden-list {
      max-height: 200px;
      overflow-y: auto;
    }

    .garden-item {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.15s;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .garden-item:last-child {
      border-bottom: none;
    }

    .garden-item:hover {
      background: var(--lift);
    }

    .garden-item.active {
      color: var(--cyan);
    }

    .garden-item-name {
      flex: 1;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
    }

    .garden-item-count {
      font-size: 0.44rem;
      color: var(--ink-dim);
    }

    .garden-item-del {
      font-size: var(--icon-sz);
      color: var(--ink-dim);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .garden-item:hover .garden-item-del {
      opacity: 0.5;
    }

    .garden-item-del:hover {
      color: var(--red) !important;
      opacity: 1 !important;
    }

    .garden-item-ren {
      font-size: var(--icon-sz);
      color: var(--ink-dim);
      opacity: 0;
      transition: opacity 0.15s;
      margin-right: 2px;
    }

    .garden-item:hover .garden-item-ren {
      opacity: 0.5;
    }

    .garden-item-ren:hover {
      color: var(--cyan) !important;
      opacity: 1 !important;
    }

    /* Inline rename input */
    .garden-rename-input {
      flex: 1;
      background: var(--bg);
      border: none;
      border-bottom: 1px solid var(--cyan);
      color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      padding: 1px 4px;
      outline: none;
    }

    .garden-popup-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .garden-new-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      padding: 6px 10px;
      outline: none;
    }

    .garden-new-input:focus {
      border-color: var(--purple);
    }

    .garden-new-input::placeholder {
      color: var(--ink-dim);
      font-style: italic;
    }

    .topbar-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .version-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.44rem;
      letter-spacing: 0.12em;
      color: var(--ink-dim);
      text-transform: uppercase;
      padding: 3px 7px;
      border: 1px solid var(--border);
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }

    .color-mode-wrap {
      position: relative;
    }

    .color-mode-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.44rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 7px 10px;
      border: 1px solid var(--border);
      background: none;
      color: var(--ink-dim);
      cursor: pointer;
      transition: all 0.2s;
    }

    .color-mode-btn:hover {
      color: var(--ink);
      border-color: var(--ink-dim);
    }

    .color-mode-btn .cm-swatch {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: conic-gradient(#00AAAA 0deg 120deg, #8b7fcf 120deg 240deg, #4ec994 240deg 360deg);
      flex-shrink: 0;
    }

    .color-mode-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      z-index: 300;
      background: var(--lift);
      border: 1px solid var(--border);
      min-width: 160px;
      display: none;
      flex-direction: column;
    }

    .color-mode-dropdown.open {
      display: flex;
    }

    .cm-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      transition: background 0.15s;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.44rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-mid);
      border: none;
      background: none;
      text-align: left;
      width: 100%;
    }

    .cm-option:hover {
      background: var(--surface);
      color: var(--ink);
    }

    .cm-option.active {
      color: var(--cyan);
    }

    .cm-option .cm-node-preview {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      overflow: hidden;
    }

    .cm-node-preview.cm-arc {
      background: conic-gradient(#00AAAA 0deg 120deg, #8b7fcf 120deg 240deg, #e0786a 240deg 360deg);
    }

    .cm-node-preview.cm-dominant {
      background: #00AAAA;
    }

    .cm-node-preview.cm-oklab {
      background: #6ca4af;
    }

    .cm-node-preview.cm-rgb {
      background: #786ca2;
    }

    .tb-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.12em;
      padding: 7px 14px;
      border: 1px solid var(--border);
      background: none;
      color: var(--ink-mid);
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .tb-btn:hover {
      color: var(--cyan);
      border-color: var(--cyan);
    }

    .tb-btn.primary {
      background: var(--cyan);
      color: var(--bg);
      border-color: var(--cyan);
    }

    .tb-btn.primary:hover {
      background: transparent;
      color: var(--cyan);
    }

    /* LAYOUT */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #graphCanvas {
      position: absolute;
      inset: 0;
      cursor: grab;
    }

    #graphCanvas.dragging {
      cursor: grabbing;
    }

    /* NOTE PANEL */
    .note-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 380px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 50;
      overflow: hidden;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    .note-panel.open {
      transform: translateX(0);
    }

    .panel-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .panel-id {
      font-size: 0.44rem;
      letter-spacing: 0.15em;
      color: var(--ink-dim);
      text-transform: uppercase;
    }

    .panel-close {
      font-size: 0.5rem;
      color: var(--ink-dim);
      cursor: pointer;
      letter-spacing: 0.1em;
      padding: 7px 14px;
      border: 1px solid var(--border);
      background: none;
      font-family: 'JetBrains Mono', monospace;
      transition: color 0.2s;
      text-transform: uppercase;
    }

    .panel-close:hover {
      color: var(--ink);
    }

    #noteTitle {
      width: 100%;
      background: none;
      border: none;
      outline: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      color: var(--ink);
      letter-spacing: -0.01em;
      resize: none;
      line-height: 1.2;
      padding: 0;
    }

    .panel-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .panel-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px 12px;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .panel-scroll::-webkit-scrollbar {
      width: 3px;
    }

    .panel-scroll::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    .panel-connections {
      flex-shrink: 0;
      padding: 10px 20px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 280px;
    }

    .panel-connections .sec-label {
      margin-bottom: 6px;
    }

    .panel-connections .link-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column-reverse;
      gap: 6px;
      margin-bottom: 0;
      min-height: 0;
    }

    .panel-connections .link-list::-webkit-scrollbar {
      width: 3px;
    }

    .panel-connections .link-list::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    /* POSITION VECTOR */
    .pos-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }

    .pos-field {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
    }

    .pos-axis {
      font-size: 0.44rem;
      letter-spacing: 0.12em;
      color: var(--cyan);
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .pos-input {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      outline: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem;
      color: var(--ink-mid);
      padding: 2px 4px;
      text-align: right;
      width: 0;
      transition: border-color 0.15s, color 0.15s;
    }

    .pos-input:focus {
      border-color: var(--cyan);
      color: var(--ink);
    }

    .pos-input:disabled {
      color: var(--ink-dim);
      cursor: default;
    }

    .pos-lock {
      font-size: 0.6rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--ink-dim);
      cursor: pointer;
      padding: 2px 6px;
      transition: all 0.15s;
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
      line-height: 1;
    }

    .pos-lock:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .pos-lock.unlocked {
      border-color: var(--yellow);
      color: var(--yellow);
    }

    /* CM WIDGET STYLES */
    .cm-task-checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 11px;
      height: 11px;
      border: 1px solid var(--border);
      background: none;
      cursor: pointer;
      vertical-align: middle;
      margin-right: 3px;
      position: relative;
      top: -1px;
      transition: all 0.15s;
    }

    .cm-task-checkbox:checked {
      background: var(--cyan);
      border-color: var(--cyan);
    }

    .cm-task-checkbox:checked::after {
      content: '';
      position: absolute;
      left: 2px;
      top: -1px;
      width: 5px;
      height: 8px;
      border: 2px solid var(--bg);
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .cm-link-widget {
      color: var(--cyan);
      cursor: pointer;
      text-decoration: underline;
      text-decoration-color: rgba(0, 170, 170, 0.4);
    }

    .cm-link-widget:hover {
      text-decoration-color: var(--cyan);
    }

    .cm-wikilink {
      color: var(--purple);
      cursor: pointer;
      border-bottom: 1px solid rgba(139, 127, 207, 0.4);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      transition: border-color 0.15s, color 0.15s;
    }

    .cm-wikilink:hover {
      color: var(--purple);
      border-bottom-color: var(--purple);
    }

    .cm-wikilink.missing {
      color: var(--ink-dim);
      border-bottom-style: dashed;
    }

    .cm-transclude {
      display: block;
      margin: 6px 0;
      border: 1px solid var(--border);
      border-left: 3px solid var(--purple);
      background: var(--lift);
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .cm-transclude:hover {
      border-color: var(--purple);
    }

    .cm-transclude-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-bottom: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.08em;
      color: var(--purple);
      text-transform: uppercase;
    }

    .cm-transclude-header .tc-icon {
      font-size: 0.7rem;
    }

    .cm-transclude-body {
      padding: 8px 12px;
      max-height: 160px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.74rem;
      line-height: 1.7;
      color: var(--ink-mid);
    }

    .cm-transclude-body::-webkit-scrollbar {
      width: 3px;
    }

    .cm-transclude-body::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    .cm-transclude-body h1,
    .cm-transclude-body h2,
    .cm-transclude-body h3 {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--ink);
      margin: 0.4em 0 0.2em;
    }

    .cm-transclude-body p {
      margin: 0 0 0.4em;
    }

    .cm-transclude-body p:last-child {
      margin: 0;
    }

    .cm-transclude-body code {
      color: var(--cyan);
      background: var(--surface);
      padding: 0 3px;
    }

    .cm-transclude-missing {
      padding: 8px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--ink-dim);
      font-style: italic;
    }

    /* CODEMIRROR THEME */
    .CodeMirror {
      flex: 1;
      height: 100%;
      min-height: 80px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      line-height: 1.8;
      background: transparent !important;
      color: var(--ink-mid) !important;
      border: none;
      padding: 0;
    }

    .CodeMirror-scroll {
      min-height: 80px;
    }

    .CodeMirror-lines {
      padding: 0;
    }

    .CodeMirror-cursor {
      border-left: 2px solid var(--cyan) !important;
    }

    .CodeMirror-selected {
      background: rgba(0, 170, 170, 0.15) !important;
    }

    .CodeMirror-focused .CodeMirror-selected {
      background: rgba(0, 170, 170, 0.2) !important;
    }

    .CodeMirror-gutters {
      display: none;
    }

    .CodeMirror-scrollbar-fixer {
      display: none;
    }

    /* Markdown token colours — scoped to garden theme */
    .cm-s-garden .cm-header,
    .cm-s-garden .cm-header-1,
    .cm-s-garden .cm-header-2,
    .cm-s-garden .cm-header-3,
    .cm-s-garden .cm-header-4,
    .cm-s-garden .cm-header-5,
    .cm-s-garden .cm-header-6 {
      color: var(--ink) !important;
      font-weight: 400;
    }

    .cm-s-garden .cm-header-1 {
      font-size: 1.4em !important;
      line-height: 1.4;
    }

    .cm-s-garden .cm-header-2 {
      font-size: 1.2em !important;
      line-height: 1.4;
    }

    .cm-s-garden .cm-header-3 {
      font-size: 1.08em !important;
    }

    /* Hide the # symbols in headers for cleaner look */
    .cm-s-garden .cm-formatting-header {
      color: var(--ink-dim) !important;
      font-size: 0.7em;
      opacity: 0.5;
    }

    .cm-s-garden .cm-strong {
      color: var(--ink) !important;
      font-weight: 700;
    }

    .cm-s-garden .cm-em {
      font-style: italic;
      color: var(--ink-mid) !important;
    }

    .cm-s-garden .cm-strikethrough {
      text-decoration: line-through;
      opacity: 0.5;
    }

    .cm-s-garden .cm-link {
      color: var(--cyan) !important;
    }

    .cm-s-garden .cm-url {
      color: var(--cyan) !important;
      opacity: 0.7;
    }

    .cm-s-garden .cm-comment {
      color: var(--ink-mid) !important;
    }

    /* Fenced code block line styling */
    .cm-s-garden .cm-fenced-code {
      background: var(--lift) !important;
      display: block;
      font-family: 'JetBrains Mono', monospace !important;
      border-left: 1px solid var(--border) !important;
      border-right: 1px solid var(--border) !important;
      padding: 0 10px !important;
      color: var(--ink-mid) !important;
      font-size: 0.88em;
      line-height: 1.7;
    }

    /* Fenced code block: open line becomes header bar */
    .cm-s-garden .cm-fenced-code-open {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-bottom: none !important;
      border-radius: 4px 4px 0 0 !important;
      margin-top: 6px !important;
      padding: 0 10px !important;
      font-size: 0.72em !important;
      color: var(--ink-dim) !important;
      display: flex !important;
      align-items: center !important;
    }

    .cm-s-garden .cm-fenced-code-close {
      background: var(--lift) !important;
      border: 1px solid var(--border) !important;
      border-top: none !important;
      border-radius: 0 0 4px 4px !important;
      margin-bottom: 6px !important;
      height: 8px !important;
      overflow: hidden !important;
      font-size: 0 !important;
    }

    .cm-fence-copy {
      position: absolute;
      right: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--border);
      color: var(--ink-dim);
      cursor: pointer;
      padding: 2px 6px;
      transition: all 0.15s;
      z-index: 10;
    }

    .cm-fence-copy:hover {
      color: var(--cyan);
      border-color: var(--cyan);
    }

    .cm-fence-header-widget {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      box-sizing: border-box;
      padding: 4px 10px;
      font-family: 'JetBrains Mono', monospace;
    }

    .cm-fence-lang {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--ink-dim);
      text-transform: lowercase;
    }

    .cm-s-garden .cm-quote {
      color: var(--ink-dim) !important;
      font-style: italic;
    }

    .cm-s-garden .cm-keyword,
    .cm-s-garden .cm-atom {
      color: var(--purple) !important;
    }

    .cm-s-garden .cm-string {
      color: var(--green) !important;
    }

    .cm-s-garden .cm-variable {
      color: var(--cyan) !important;
    }

    .cm-s-garden .cm-def {
      color: var(--yellow) !important;
    }

    .cm-s-garden .cm-inline-code,
    .cm-s-garden .cm-code {
      font-family: 'JetBrains Mono', monospace;
      color: var(--cyan) !important;
      background: var(--lift);
      padding: 0 3px;
      border-radius: 2px;
    }

    .cm-s-garden .cm-hr {
      color: var(--border) !important;
    }

    .cm-s-garden .cm-tag {
      color: var(--red) !important;
    }

    .cm-s-garden .cm-placeholder {
      color: var(--ink-dim) !important;
      font-style: italic;
    }

    /* Code block background */
    .cm-s-garden pre.CodeMirror-line>span {
      font-family: 'JetBrains Mono', monospace;
    }

    /* Light theme overrides */
    html.light .CodeMirror {
      color: var(--ink-mid) !important;
    }

    html.light .CodeMirror-cursor {
      border-left-color: var(--cyan) !important;
    }

    html.light .CodeMirror-selected {
      background: rgba(0, 120, 120, 0.12) !important;
    }

    html.light .cm-s-garden .cm-header {
      color: var(--ink) !important;
    }

    html.light .cm-s-garden .cm-strong {
      color: var(--ink) !important;
    }

    /* SECTION LABELS */
    .sec-label {
      font-size: 0.44rem;
      letter-spacing: 0.15em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sec-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* TAGS */
    .panel-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .meta-tag {
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      padding: 3px 8px;
      border: 1px solid var(--border);
      color: var(--ink-dim);
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .meta-tag .tag-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .meta-tag.selected {
      border-color: var(--tag-color);
      color: var(--tag-color);
    }

    .meta-tag-add {
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      padding: 3px 8px;
      border: 1px dashed var(--border);
      color: var(--ink-dim);
      cursor: pointer;
      transition: all 0.2s;
      background: none;
      font-family: 'JetBrains Mono', monospace;
    }

    .meta-tag-add:hover {
      border-color: var(--purple);
      color: var(--purple);
    }

    /* NEW TAG FORM */
    .new-tag-form {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin: 8px 0 12px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      background: var(--bg);
    }

    .new-tag-form.open {
      display: flex;
    }

    .new-tag-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .new-tag-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem;
      padding: 5px 8px;
      outline: none;
    }

    .new-tag-input:focus {
      border-color: var(--purple);
    }

    .new-tag-input::placeholder {
      color: var(--ink-dim);
    }

    .color-swatches {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .color-swatch {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s;
      flex-shrink: 0;
    }

    .color-swatch.selected {
      border-color: var(--ink);
    }

    /* BOX PANEL */
    .box-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 380px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 50;
      overflow: hidden;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    .box-panel.open {
      transform: translateX(0);
    }

    /* PANEL RESIZE HANDLE */
    .panel-resize {
      position: absolute;
      top: 0;
      left: -4px;
      bottom: 0;
      width: 8px;
      cursor: col-resize;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel-resize::after {
      content: '';
      width: 2px;
      height: 40px;
      background: var(--border);
      border-radius: 2px;
      transition: background 0.2s;
    }

    .panel-resize:hover::after,
    .panel-resize.dragging::after {
      background: var(--cyan);
    }

    /* CONTENT */
    .content-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    #cmEditor {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }


    .md-preview h1,
    .md-preview h2,
    .md-preview h3 {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      color: var(--ink);
      margin: 0.8em 0 0.3em;
      letter-spacing: -0.01em;
    }

    .md-preview h1 {
      font-size: 1.6rem;
    }

    .md-preview h2 {
      font-size: 1.3rem;
    }

    .md-preview h3 {
      font-size: 1.1rem;
    }

    .md-preview p {
      margin: 0 0 0.7em;
    }

    .md-preview p:last-child {
      margin-bottom: 0;
    }

    .md-preview strong {
      color: var(--ink);
      font-weight: 400;
    }

    .md-preview em {
      font-style: italic;
    }

    .md-preview code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78em;
      background: var(--lift);
      color: var(--cyan);
      padding: 1px 5px;
      border-radius: 2px;
    }

    .md-preview pre {
      background: var(--lift);
      padding: 10px 14px;
      margin: 0.6em 0;
      overflow-x: auto;
      border-left: 2px solid var(--cyan);
    }

    .md-preview pre code {
      background: none;
      padding: 0;
      color: var(--ink-mid);
      font-size: 0.82em;
    }

    .md-preview ul,
    .md-preview ol {
      padding-left: 1.4em;
      margin: 0.4em 0 0.7em;
    }

    .md-preview li {
      margin-bottom: 0.2em;
    }

    .md-preview blockquote {
      border-left: 2px solid var(--purple);
      margin: 0.6em 0;
      padding: 2px 0 2px 14px;
      color: var(--ink-dim);
      font-style: italic;
    }

    .md-preview hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.8em 0;
    }

    .md-preview a {
      color: var(--cyan);
      text-decoration: none;
    }

    .md-preview a:hover {
      text-decoration: underline;
    }

    /* GFM task list checkboxes */
    .md-preview ul.contains-task-list {
      list-style: none;
      padding-left: 0.4em;
    }

    .md-preview .task-list-item {
      display: flex;
      align-items: baseline;
      gap: 7px;
    }

    .md-preview .task-list-item input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 11px;
      height: 11px;
      border: 1px solid var(--border);
      background: none;
      cursor: default;
      flex-shrink: 0;
      margin: 0;
      position: relative;
      top: 1px;
      transition: all 0.15s;
    }

    .md-preview .task-list-item input[type="checkbox"]:checked {
      background: var(--cyan);
      border-color: var(--cyan);
    }

    .md-preview .task-list-item input[type="checkbox"]:checked::after {
      content: "";
      position: absolute;
      left: 2px;
      top: -1px;
      width: 5px;
      height: 8px;
      border: 2px solid var(--bg);
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .md-preview .task-list-item.checked>*:not(input) {
      opacity: 0.45;
      text-decoration: line-through;
    }

    /* highlight.js overrides to match design */
    .md-preview .hljs {
      background: var(--lift) !important;
      color: var(--ink-mid) !important;
      padding: 0 !important;
    }

    .md-preview img {
      max-width: 100%;
      height: auto;
      margin: 0.4em 0;
    }

    .md-preview del {
      opacity: 0.5;
      text-decoration: line-through;
    }

    .md-preview table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.6em 0;
      font-size: 0.92rem;
    }

    .md-preview th,
    .md-preview td {
      padding: 6px 12px;
      border: 1px solid var(--border);
      text-align: left;
    }

    .md-preview th {
      background: var(--lift);
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      font-weight: 400;
      text-transform: uppercase;
    }

    .md-preview td {
      color: var(--ink-mid);
    }

    .md-preview tr:nth-child(even) td {
      background: rgba(255, 255, 255, 0.02);
    }

    /* EDIT/PREVIEW TOGGLE */
    .sec-label--content::after {
      display: none;
    }

    .sec-divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .ac-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.44rem;
      letter-spacing: 0.1em;
      padding: 1px 7px;
      border: 1px solid var(--border);
      background: none;
      color: var(--ink-dim);
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .ac-btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .ac-btn.active {
      border-color: var(--cyan);
      color: var(--cyan);
      background: rgba(0, 170, 170, 0.08);
    }

    /* CONNECTIONS */
    .link-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      min-height: 36px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      color: var(--ink-mid);
      font-size: 0.75rem;
      font-family: 'Cormorant Garamond', serif;
    }

    .link-item:hover {
      border-color: var(--purple);
      color: var(--purple);
    }

    .link-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .link-remove {
      margin-left: auto;
      opacity: 0;
      font-size: var(--icon-sz);
      font-family: 'JetBrains Mono', monospace;
      line-height: 0;
      color: var(--red);
      transition: opacity 0.2s;
      flex-shrink: 0;
      padding: 0 4px;
      align-self: center;
    }

    .link-item:hover .link-remove {
      opacity: 0.7;
    }

    .link-search-wrap {
      position: relative;
      margin-top: 4px;
    }

    .link-search {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      padding: 9px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .link-search:focus {
      border-color: var(--purple);
    }

    .link-search::placeholder {
      color: var(--ink-dim);
      font-style: italic;
    }

    .link-results {
      position: absolute;
      bottom: 100%;
      left: 0;
      right: 0;
      z-index: 200;
      background: var(--lift);
      border: 1px solid var(--purple);
      border-bottom: none;
      border-top: 1px solid var(--purple);
      max-height: 180px;
      overflow-y: auto;
      display: none;
    }

    .link-results.open {
      display: block;
    }

    .link-result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      cursor: pointer;
      transition: background 0.15s;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      color: var(--ink-mid);
    }

    .link-result-item:hover {
      background: var(--surface);
      color: var(--ink);
    }

    .link-result-item.already-linked {
      background: rgba(0, 170, 170, 0.05);
    }

    .link-results::-webkit-scrollbar {
      width: 3px;
    }

    .link-results::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    .panel-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
    }

    .del-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      background: none;
      border: 1px solid rgba(224, 120, 106, 0.2);
      color: var(--red);
      padding: 7px 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .del-btn:hover {
      background: rgba(224, 120, 106, 0.1);
    }

    .save-note-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      background: var(--cyan);
      color: var(--bg);
      border: none;
      padding: 7px 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .save-note-btn:hover {
      opacity: 0.85;
    }

    /* MINIMAP */
    .minimap {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 50;
      width: 140px;
      height: 90px;
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .minimap canvas {
      width: 100%;
      height: 100%;
    }

    /* SEARCH */
    #searchInput {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.08em;
      padding: 7px 14px;
      outline: none;
      width: 200px;
      transition: border-color 0.2s;
    }

    #searchInput:focus {
      border-color: var(--purple);
    }

    #searchInput::placeholder {
      color: var(--ink-dim);
    }

    /* LEGEND */
    .legend {
      position: absolute;
      bottom: 20px;
      left: 170px;
      z-index: 50;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .legend-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.44rem;
      letter-spacing: 0.08em;
    }

    .legend-header:hover {
      background: var(--lift);
    }

    .legend-title {
      color: var(--ink-dim);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .legend-toggle {
      color: var(--ink-dim);
      font-size: var(--icon-sz);
    }

    .legend-body {
      padding: 6px 12px 10px;
    }

    .legend-body.hidden {
      display: none;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--ink-dim);
      margin-bottom: 5px;
      font-size: 0.46rem;
      letter-spacing: 0.08em;
    }

    .legend-row:last-child {
      margin-bottom: 0;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* DELETE MODAL */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 8000;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 32px 36px;
      max-width: 380px;
      width: 90%;
      transform: translateY(8px);
      transition: transform 0.2s;
    }

    .modal-backdrop.open .modal {
      transform: translateY(0);
    }

    .modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 300;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .modal-sub {
      font-size: 0.52rem;
      color: var(--ink-dim);
      letter-spacing: 0.06em;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .modal-note-name {
      color: var(--ink-mid);
      font-style: italic;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-bottom: 18px;
    }

    .modal-skip-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      color: var(--ink-dim);
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
    }

    .modal-skip-wrap:hover {
      color: var(--ink-mid);
    }

    .modal-checkbox {
      width: 11px;
      height: 11px;
      border: 1px solid var(--border);
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.15s;
    }

    .modal-checkbox.checked {
      border-color: var(--cyan);
      background: rgba(0, 170, 170, 0.15);
    }

    .modal-checkbox.checked::after {
      content: '✓';
      font-size: var(--icon-sz);
      color: var(--cyan);
      line-height: 1;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--cyan);
      color: var(--bg);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      padding: 8px 20px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 9999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>

    //  STORAGE
    // ═══════════════════════════════════════════════════════════════════
    function saveAll() {
      if (currentGardenId && gardens[currentGardenId]) {
        gardens[currentGardenId].notes = notes;
        gardens[currentGardenId].links = links;
        gardens[currentGardenId].nextId = nextId;
        gardens[currentGardenId].customTags = customTags;
        gardens[currentGardenId].boxes = boxes;
        gardens[currentGardenId].boxLinks = boxLinks;
        gardens[currentGardenId].viewport = { vpX, vpY, vpScale };
      }
      try {
        localStorage.setItem('gdn_v3_data', JSON.stringify({ gardens, gardenIds, currentGardenId }));
      } catch (e) { }
    }

    function loadAll() {
      try {
        const raw = localStorage.getItem('gdn_v3_data');
        if (raw) {
          const d = JSON.parse(raw);
          gardens = d.gardens || {};
          gardenIds = d.gardenIds || [];
          currentGardenId = d.currentGardenId && gardens[d.currentGardenId] ? d.currentGardenId : gardenIds[0];
          return gardenIds.length > 0;
        }
      } catch (e) { }
      return false;
    }

    // ═══════════════════════════════════════════════════════════════════
    //  GARDEN ACTIVATION
    // ═══════════════════════════════════════════════════════════════════
    function activateGarden(id) {
      // Flush current only when switching away from a different garden
      if (currentGardenId && currentGardenId !== id && gardens[currentGardenId]) {
        gardens[currentGardenId].notes = notes;
        gardens[currentGardenId].links = links;
        gardens[currentGardenId].nextId = nextId;
        gardens[currentGardenId].customTags = customTags;
      }
      currentGardenId = id;
      const g = gardens[id];
      notes = g.notes || [];
      links = g.links || [];
      nextId = g.nextId || 1;
      customTags = g.customTags || [];
      boxes = g.boxes || [];
      boxLinks = g.boxLinks || [];

      // Restore saved viewport or fall through to resetView
      const savedVp = gardens[id].viewport;
      if (savedVp) { vpX = savedVp.vpX; vpY = savedVp.vpY; vpScale = savedVp.vpScale; }
      else { vpX = 0; vpY = 0; vpScale = 1; }

      selectedBox = null;

      document.getElementById('notePanel').classList.remove('open');

      renderLegend();
      if (!gardens[id].viewport) resetView();

    if (!loadAll()) {

      gardenIds = [id];

    }

    function startRenameGarden(id) {
      const item = document.querySelector(`.garden-item[data-garden-id="${id}"]`);
      if (!item) return;
      const nameSpan = item.querySelector('.garden-item-name');
      const current = gardens[id].name;
      const inp = document.createElement('input');
      inp.className = 'garden-rename-input';
      inp.value = current;
      nameSpan.replaceWith(inp);
      inp.focus(); inp.select();
      // Hide action buttons while renaming
      item.querySelectorAll('.garden-item-ren,.garden-item-del,.garden-item-count').forEach(el => el.style.visibility = 'hidden');
      item.onclick = null;

      function commit() {
        const val = inp.value.trim();
        if (val) { gardens[id].name = val; saveAll(); }
        if (currentGardenId === id) document.getElementById('gardenNameBtn').textContent = gardens[id].name;
        renderGardenList();
      }
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); commit(); }
        if (e.key === 'Escape') { renderGardenList(); }
        e.stopPropagation();

      inp.addEventListener('blur', commit);
      inp.addEventListener('click', e => e.stopPropagation());

        gardens[currentGardenId].nextId = nextId;

    // ═══════════════════════════════════════════════════════════════════
    //  TAGS
    // ═══════════════════════════════════════════════════════════════════
    function allTags() { return [...DEFAULT_TAGS, ...customTags]; }

    function tagColor(id) {
      const t = allTags().find(t => t.id === id);
      return t ? t.color : '#4e4a62';
    }

    // ── Color mode ──────────────────────────────────────────────────────
    let colorMode = localStorage.getItem('garden_color_mode') || 'arc';

    function hexToRgb(hex) {
      const h = hex.replace('#', '');
      return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
    }
    function rgbToHex(r, g, b) {
      return '#' + [r, g, b].map(v => Math.round(Math.max(0, Math.min(255, v))).toString(16).padStart(2, '0')).join('');
    }
    function rgbToOklab([r, g, b]) {
      r /= 255; g /= 255; b /= 255;
      r = r > 0.04045 ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
      g = g > 0.04045 ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
      b = b > 0.04045 ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;
      const l = Math.cbrt(0.4122214708 * r + 0.5363325363 * g + 0.0514459929 * b);
      const m = Math.cbrt(0.2119034982 * r + 0.6806995451 * g + 0.1073969566 * b);
      const s = Math.cbrt(0.0883024619 * r + 0.2817188376 * g + 0.6299787005 * b);
      return [0.2104542553 * l + 0.7936177850 * m - 0.0040720468 * s,
      1.9779984951 * l - 2.4285922050 * m + 0.4505937099 * s,
      0.0259040371 * l + 0.7827717662 * m - 0.8086757660 * s];
    }
    function oklabToRgb([L, a, b]) {
      const l = L + 0.3963377774 * a + 0.2158037573 * b;
      const m = L - 0.1055613458 * a - 0.0638541728 * b;
      const s = L - 0.0894841775 * a - 1.2914855480 * b;
      const rl = l * l * l, rm = m * m * m, rs = s * s * s;
      const gm = v => v > 0.0031308 ? 1.055 * Math.pow(v, 1 / 2.4) - 0.055 : 12.92 * v;
      return [gm(4.0767416621 * rl - 3.3077115913 * rm + 0.2309699292 * rs) * 255,
      gm(-1.2684380046 * rl + 2.6097574011 * rm - 0.3413193965 * rs) * 255,
      gm(-0.0041960863 * rl - 0.7034186147 * rm + 1.7076147010 * rs) * 255];
    }
    function blendOklab(hexColors) {
      const labs = hexColors.map(h => rgbToOklab(hexToRgb(h)));
      const avg = [0, 1, 2].map(i => labs.reduce((s, c) => s + c[i], 0) / labs.length);
      return rgbToHex(...oklabToRgb(avg));
    }
    function blendRgb(hexColors) {
      const rgbs = hexColors.map(hexToRgb);
      return rgbToHex(...[0, 1, 2].map(i => rgbs.reduce((s, c) => s + c[i], 0) / rgbs.length));
    }
    function boxColor(box) {
      if (!box.tags || !box.tags.length) return box.color || '#4e4a62';
      const colors = box.tags.map(tagColor);
      if (colors.length === 1 || colorMode === 'dominant') return colors[0];
      if (colorMode === 'rgb') return blendRgb(colors);
      // arc mode: blend with Oklab (arc segments not applicable to rectangles)
      if (colorMode === 'arc') return blendOklab(colors);
      return blendOklab(colors); // default / oklab
    }

    function nodeColor(note) {
      if (!note.tags || !note.tags.length) return '#4e4a62';
      const colors = note.tags.map(tagColor);
      if (colors.length === 1 || colorMode === 'dominant') return colors[0];
      if (colorMode === 'rgb') return blendRgb(colors);
      if (colorMode === 'arc') return colors[0];
      return blendOklab(colors);
    }
    function drawArcNode(ctx, sx, sy, r, colors, isSel) {
      if (colors.length <= 1) {
        ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.fillStyle = isSel ? colors[0] : colors[0] + '33'; ctx.fill(); return;
      }
      const slice = (Math.PI * 2) / colors.length;
      colors.forEach((c, i) => {
        ctx.beginPath(); ctx.moveTo(sx, sy);
        ctx.arc(sx, sy, r, -Math.PI / 2 + i * slice, -Math.PI / 2 + (i + 1) * slice);
        ctx.closePath(); ctx.fillStyle = isSel ? c : c + '55'; ctx.fill();
      });
    }
    function setColorMode(mode) {
